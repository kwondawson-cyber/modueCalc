<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>D-Day 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #0095ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --danger: #ff6b6b;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }
    .nav { text-align: center; margin-bottom: 32px; }
    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--text-muted); font-size: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .input-group { margin-bottom: 16px; }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 7px;
    }
    .input-group input[type="text"],
    .input-group input[type="date"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 16px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    /* 빠른 선택 태그 */
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 16px;
    }
    .tag {
      padding: 5px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .tag:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,212,170,0.05); }
    .add-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #000;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,170,0.3); }
    /* 디데이 목록 */
    .dday-list { display: flex; flex-direction: column; gap: 12px; }
    .dday-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      animation: fadeUp 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .dday-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .dday-item.future::before { background: var(--accent); }
    .dday-item.past::before { background: var(--text-muted); }
    .dday-item.today::before { background: #ffd54f; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .dday-left { flex: 1; min-width: 0; }
    .dday-emoji { font-size: 20px; margin-right: 8px; }
    .dday-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .dday-date { font-size: 12px; color: var(--text-muted); }
    .dday-right { text-align: right; flex-shrink: 0; }
    .dday-number {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 900;
      line-height: 1;
    }
    .dday-item.future .dday-number { color: var(--accent); }
    .dday-item.past .dday-number { color: var(--text-muted); }
    .dday-item.today .dday-number { color: #ffd54f; }
    .dday-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .delete-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .dday-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); background: rgba(255,107,107,0.1); }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    /* 오늘 날짜 표시 */
    .today-bar {
      text-align: center;
      padding: 10px;
      background: var(--surface2);
      border-radius: 10px;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .today-bar span { color: var(--accent); font-weight: 700; }
    @media (max-width: 480px) {
      .card { padding: 20px 16px; }
      .dday-item { padding: 16px 18px; }
      .dday-number { font-size: 26px; }
    }

    /* ── 홈 버튼 ── */
    
    
    
    
    
      .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">⏳</span>
    <div><h1>D-Day 계산기</h1><p>날짜 카운트다운 계산</p></div>
  </div>



<div class="today-bar">오늘은 <span id="todayStr">-</span> 입니다</div>
<div class="card">
<div class="card-title">디데이 추가</div>
<div class="input-group">
<label>이름</label>
<input id="ddayName" maxlength="20" placeholder="예: 수능, 결혼기념일, 졸업식" type="text"/>
</div>
<div class="input-group">
<label>날짜</label>
<input id="ddayDate" type="date"/>
</div>
<div class="quick-tags">
<button class="tag" onclick="setQuick('수능 📚')">📚 수능</button>
<button class="tag" onclick="setQuick('생일 🎂')">🎂 생일</button>
<button class="tag" onclick="setQuick('결혼기념일 💍')">💍 결혼기념일</button>
<button class="tag" onclick="setQuick('여행 ✈️')">✈️ 여행</button>
<button class="tag" onclick="setQuick('입사일 💼')">💼 입사일</button>
<button class="tag" onclick="setQuick('크리스마스 🎄')">🎄 크리스마스</button>
</div>
<button class="add-btn" onclick="addDday()">📅 디데이 추가</button>
</div>
<div class="dday-list" id="ddayList">
<div class="empty-state">
<div class="empty-icon">📆</div>
        디데이를 추가해보세요
      </div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/date_diff" class="toss-nav-item"><span class="ni-emoji">📅</span><span class="ni-label">날짜차이</span></a>
      <a href="/age" class="toss-nav-item"><span class="ni-emoji">🎂</span><span class="ni-label">나이</span></a>
      <a href="/pregnancy" class="toss-nav-item"><span class="ni-emoji">🤱</span><span class="ni-label">임신</span></a>
      <a href="/ovulation" class="toss-nav-item"><span class="ni-emoji">📆</span><span class="ni-label">배란일</span></a>
    </div>
  </div>
</div>
<script>
const today = new Date();
    today.setHours(0, 0, 0, 0);

    // 오늘 날짜 표시
    const weekdays = ['일','월','화','수','목','금','토'];
    document.getElementById('todayStr').textContent =
      `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${weekdays[today.getDay()]})`;

    // 기본 날짜 = 오늘
    const pad = n => String(n).padStart(2, '0');
    document.getElementById('ddayDate').value =
      `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

    let ddayItems = JSON.parse(localStorage.getItem('everycalc_dday') || '[]');

    function setQuick(name) {
      document.getElementById('ddayName').value = name;
    }

    function save() {
      localStorage.setItem('everycalc_dday', JSON.stringify(ddayItems));
    }

    function getDiff(dateStr) {
      const target = new Date(dateStr);
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / (1000 * 60 * 60 * 24));
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${weekdays[d.getDay()]})`;
    }

    function addDday() {
      const name = document.getElementById('ddayName').value.trim();
      const date = document.getElementById('ddayDate').value;
      if (!name) { alert('이름을 입력해주세요.'); return; }
      if (!date) { alert('날짜를 선택해주세요.'); return; }

      ddayItems.unshift({ id: Date.now(), name, date });
      save();
      render();

      document.getElementById('ddayName').value = '';
    }

    function deleteDday(id) {
      ddayItems = ddayItems.filter(i => i.id !== id);
      save();
      render();
    }

    function render() {
      const list = document.getElementById('ddayList');
      if (ddayItems.length === 0) {
        list.innerHTML = `<div class="empty-state"><div class="empty-icon">📆</div>디데이를 추가해보세요</div>`;
        return;
      }

      // 정렬: 오늘 → 미래(가까운순) → 지난날(최근순)
      const sorted = [...ddayItems].sort((a, b) => {
        const da = getDiff(a.date), db = getDiff(b.date);
        if (da === 0) return -1;
        if (db === 0) return 1;
        if (da >= 0 && db >= 0) return da - db;
        if (da < 0 && db < 0) return db - da;
        return da >= 0 ? -1 : 1;
      });

      list.innerHTML = sorted.map(item => {
        const diff = getDiff(item.date);
        let cls, label, numStr;

        if (diff === 0) {
          cls = 'today'; label = '🎉 오늘!'; numStr = 'D-DAY';
        } else if (diff > 0) {
          cls = 'future'; label = '남은 날'; numStr = `D-${diff}`;
        } else {
          cls = 'past'; label = '지난 날'; numStr = `D+${Math.abs(diff)}`;
        }

        return `
          <div class="dday-item ${cls}">
            <button class="delete-btn" onclick="deleteDday(${item.id})">✕</button>
            <div class="dday-left">
              <div class="dday-name">${item.name}</div>
              <div class="dday-date">${formatDate(item.date)}</div>
            </div>
            <div class="dday-right">
              <div class="dday-number">${numStr}</div>
              <div class="dday-label">${label}</div>
            </div>
          </div>`;
      }).join('');
    }

    // 크리스마스 퀵태그 클릭 시 자동으로 연도 맞춰서 날짜 설정
    function setQuick(name) {
      document.getElementById('ddayName').value = name;
      if (name.includes('크리스마스')) {
        const y = today.getMonth() === 11 && today.getDate() > 25
          ? today.getFullYear() + 1 : today.getFullYear();
        document.getElementById('ddayDate').value = `${y}-12-25`;
      }
    }

    render();
</script>
</body>
</html>
