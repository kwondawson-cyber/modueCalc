<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>사업자 부가세 신고 계산기</title>
  <!-- TODO: 앱인토스 SDK — 콘솔 발급 코드로 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--warn:#f5a623;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:28px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badges{text-align:center;margin-bottom:16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .badge{padding:3px 12px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);border-radius:20px;font-size:11px;color:var(--accent);font-weight:700}
    .type-tabs{display:flex;gap:8px;margin-bottom:16px}
    .type-tab{flex:1;padding:12px 8px;text-align:center;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all .2s;font-family:'Noto Sans KR',sans-serif;line-height:1.4}
    .type-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border-color:transparent}
    .type-tab small{display:block;font-size:11px;font-weight:400;margin-top:2px;opacity:.8}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .cost-row{display:grid;grid-template-columns:1fr 160px 36px;gap:8px;align-items:center;margin-bottom:8px}
    .cost-row input{margin:0;padding:10px 12px;font-size:14px}
    .btn-del{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:8px;width:36px;height:36px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-del:hover{background:rgba(255,107,107,0.1)}
    .btn-add{width:100%;padding:10px;border:1px dashed var(--border);border-radius:10px;background:transparent;color:var(--text-muted);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-add:hover{border-color:var(--accent);color:var(--accent)}
    .section-total{display:flex;justify-content:flex-end;gap:8px;padding:8px 0 2px;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border);margin-top:6px}
    .section-total .v{font-weight:700;color:var(--accent)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:8px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:42px;font-weight:900}
    .result-value.pay{color:var(--danger)}
    .result-value.refund{color:var(--accent)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .pnl{background:var(--surface2);border-radius:12px;overflow:hidden;margin-top:14px}
    .pnl-row{display:flex;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px}
    .pnl-row:last-child{border-bottom:none}
    .pnl-row.sub{background:rgba(0,212,170,0.06);font-weight:700}
    .pnl-row.pay-row{background:rgba(255,107,107,0.06);font-weight:900;font-size:15px;color:var(--danger)}
    .pnl-row.refund-row{background:rgba(0,212,170,0.1);font-weight:900;font-size:15px;color:var(--accent)}
    .pnl-row .neg{color:var(--danger)}
    .deadline-box{background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.25);border-radius:10px;padding:12px 14px;margin-top:14px;font-size:13px;color:var(--warn);line-height:1.8}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.row2{grid-template-columns:1fr}.cost-row{grid-template-columns:1fr 120px 36px}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  












    /* ── 토스 헤더 ── */

    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    /* ── 토스 하단 네비 ── */
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    /* ── max-scale 방지 ── */
    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">

  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🧾</span>
    <div>
      <h1>사업자 부가세 신고 계산기</h1>
      <p>매출세액 − 매입세액 납부세액 계산</p>
    </div>
  </div>


<div class="badges"><span class="badge">💼 사업자</span><span class="badge">일반·간이과세</span><span class="badge">2026년 기준</span></div>
<!-- 과세 유형 탭 -->
<div class="type-tabs">
<button class="type-tab active" id="tab-general" onclick="switchType('general')">일반과세자<small>연 매출 8,000만원↑</small></button>
<button class="type-tab" id="tab-simple" onclick="switchType('simple')">간이과세자<small>연 매출 8,000만원↓</small></button>
</div>
<!-- 일반과세 섹션 -->
<div id="section-general">
<div class="card">
<h2>💰 매출세액 (신고기간 합계)</h2>
<div id="sales-list">
<div class="cost-row"><input type="text" value="과세 매출 (10%)"/><input placeholder="공급가액(원)" type="number"/><button class="btn-del" onclick="delRow(this)">✕</button></div>
<div class="cost-row"><input type="text" value="카드·현금영수증 매출"/><input placeholder="공급가액(원)" type="number"/><button class="btn-del" onclick="delRow(this)">✕</button></div>
</div>
<button class="btn-add" onclick="addRow('sales-list')">＋ 매출 항목 추가 (영세율 등)</button>
<div class="section-total">매출 합계 <span class="v" id="sales-ttl">0원</span></div>
</div>
<div class="card">
<h2>🧾 매입세액 공제 항목</h2>
<div id="input-list">
<div class="cost-row"><input type="text" value="세금계산서 수취분"/><input placeholder="공급가액(원)" type="number"/><button class="btn-del" onclick="delRow(this)">✕</button></div>
<div class="cost-row"><input type="text" value="신용카드 매입분"/><input placeholder="공급가액(원)" type="number"/><button class="btn-del" onclick="delRow(this)">✕</button></div>
<div class="cost-row"><input type="text" value="의제매입세액 (식재료 등)"/><input placeholder="공급가액(원)" type="number"/><button class="btn-del" onclick="delRow(this)">✕</button></div>
</div>
<button class="btn-add" onclick="addRow('input-list')">＋ 매입 항목 추가</button>
<div class="section-total">매입 합계 <span class="v" id="input-ttl">0원</span></div>
</div>
<div class="card">
<h2>🚫 불공제 매입세액 (선택)</h2>
<div id="nonded-list">
<div class="cost-row"><input type="text" value="접대비 관련 매입"/><input placeholder="VAT 금액(원)" type="number"/><div></div></div>
<div class="cost-row"><input type="text" value="비영업용 승용차 유지비"/><input placeholder="VAT 금액(원)" type="number"/><div></div></div>
</div>
<div style="font-size:12px;color:var(--text-muted);margin-top:4px">※ 불공제 항목은 VAT 금액 직접 입력</div>
</div>
</div>
<!-- 간이과세 섹션 -->
<div id="section-simple" style="display:none">
<div class="card">
<h2>💰 신고기간 매출 합계</h2>
<div class="row2">
<div class="form-group">
<label>총 매출 (부가세 포함, 원)</label>
<input id="simple-sales" placeholder="예: 50000000" type="number"/>
</div>
<div class="form-group">
<label>업종 구분</label>
<select id="simple-type">
<option value="0.4">소매업·음식점·숙박 (40%)</option>
<option value="0.3">제조업·농업·어업 (30%)</option>
<option value="0.2">건설업·운수업·창고 (20%)</option>
<option value="0.15">금융·보험·서비스 (15%)</option>
</select>
</div>
</div>
<div class="form-group">
<label>세금계산서 수취 매입 VAT 합계 (원)</label>
<input id="simple-input" placeholder="세금계산서 발급분 VAT만" type="number" value="0"/>
</div>
</div>
</div>
<button class="btn" onclick="calc()">부가세 신고세액 계산하기</button>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label" id="r-label">납부할 부가세</div>
<div class="result-value" id="r-amount">0원</div>
<div class="result-sub" id="r-sub"></div>
</div>
<div class="pnl" id="r-pnl"></div>
<div class="deadline-box" id="r-deadline"></div>
</div>


    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">📌 사업자 세금 계산기</div>
    <div class="toss-nav-grid">
      <a href="/vat" class="toss-nav-item"><span class="ni-emoji">🧾</span><span class="ni-label">부가세</span></a>
      <a href="/income_tax" class="toss-nav-item"><span class="ni-emoji">📋</span><span class="ni-label">소득세</span></a>
      <a href="/corporate_tax" class="toss-nav-item"><span class="ni-emoji">🏢</span><span class="ni-label">법인세</span></a>
      <a href="/margin" class="toss-nav-item"><span class="ni-emoji">💹</span><span class="ni-label">마진율</span></a>
    </div>
  </div>

</div>
<script>
const fw = n => Math.round(n).toLocaleString() + '원';
let vatType = 'general';

function switchType(type) {
  vatType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  const tabEl = document.getElementById('tab-' + type);
  if (tabEl) tabEl.classList.add('active');
  document.getElementById('section-general').style.display = type === 'general' ? 'block' : 'none';
  document.getElementById('section-simple').style.display = type === 'simple' ? 'block' : 'none';
}

function addRow(listId, isDeductible) {
  const list = document.getElementById(listId);
  if (!list) return;
  const row = document.createElement('div');
  row.className = 'cost-row';
  row.innerHTML = `<input type="text" placeholder="항목명" /><input type="number" placeholder="금액(원)" /><button class="btn-del" onclick="delRow(this)">✕</button>`;
  list.appendChild(row);
}

function delRow(btn) {
  btn.closest('.cost-row').remove();
  updateTotal();
}

function getTotal(listId) {
  const rows = document.querySelectorAll(`#${listId} .cost-row input[type="number"]`);
  return Array.from(rows).reduce((s, i) => s + (+i.value || 0), 0);
}

function updateTotal() {
  const sales = getTotal('sales-list');
  const input = getTotal('input-list');
  const st = document.getElementById('sales-ttl');
  const it = document.getElementById('input-ttl');
  if (st) st.textContent = fw(sales * 0.1) + ' (부가세)';
  if (it) it.textContent = fw(input * 0.1) + ' (공제액)';
}

function calc() {
  if (vatType === 'general') {
    const sales = getTotal('sales-list');
    const input = getTotal('input-list');
    const nonded = getTotal('nonded-list');
    const salesVat = sales * 0.1;
    const inputVat = input * 0.1;
    const nondedVat = nonded * 0.1;
    const payable = salesVat - inputVat + nondedVat;

    document.getElementById('r-sales-vat') && (document.getElementById('r-sales-vat').textContent = fw(salesVat));
    document.getElementById('r-input-vat') && (document.getElementById('r-input-vat').textContent = '-' + fw(inputVat));
    document.getElementById('r-nonded-vat') && (document.getElementById('r-nonded-vat').textContent = fw(nondedVat));
    document.getElementById('r-payable') && (document.getElementById('r-payable').textContent = fw(Math.abs(payable)));
    document.getElementById('r-type') && (document.getElementById('r-type').textContent = payable >= 0 ? '납부세액' : '환급세액');
  } else {
    const sales = +document.getElementById('simple-sales').value * 10000 || 0;
    const type = document.getElementById('simple-type').value;
    const rates = { retail: 0.15, mfg: 0.20, construct: 0.30, service: 0.40 };
    const rate = rates[type] || 0.15;
    const vat = sales * 0.1 * rate;
    document.getElementById('simple-result') && (document.getElementById('simple-result').textContent = fw(vat));
  }
  document.getElementById('result') && (document.getElementById('result').style.display = 'block');
}

// 입력 이벤트
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#sales-list input, #input-list input').forEach(i => i.addEventListener('input', updateTotal));
});
</script>
</body>
</html>
