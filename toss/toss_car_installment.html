<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>자동차 할부 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    .container{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header{text-align:center;margin-bottom:48px}
    .header h1{font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:15px;font-weight:300}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px}
    .card-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:24px}
    .input-group{margin-bottom:24px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:8px}
    .input-wrapper{position:relative}
    .input-wrapper input,.input-wrapper select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 70px 16px 20px;font-size:22px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper select{font-size:16px;font-family:'Noto Sans KR',sans-serif;cursor:pointer}
    .input-wrapper input:focus,.input-wrapper select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-wrapper select option{background:var(--surface2)}
    .input-unit{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:480px){.row2{grid-template-columns:1fr}}
    .btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:17px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:32px;margin-top:20px;display:none}
    .result-card.visible{display:block}
    .result-main{text-align:center;margin-bottom:24px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:8px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:42px;font-weight:900;color:var(--accent)}
    .result-value span{font-size:20px;font-weight:700}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:6px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}}
    .result-item{background:var(--surface2);border-radius:10px;padding:16px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
    .result-item-value{font-size:18px;font-weight:700;color:var(--text);font-family:'Montserrat',sans-serif}
    
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden}
    details summary{padding:14px 18px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    
    
    
    
    
  










































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🚙</span>
    <div><h1>자동차 할부 계산기</h1><p>할부 이자·월납입금 계산</p></div>
  </div>



<div class="card">
<div class="card-title">🚘 차량 정보 입력</div>
<div class="input-group">
<label>차량 가격</label>
<div class="input-wrapper"><input id="carPrice" placeholder="3500" type="number"/><span class="input-unit">만원</span></div>
</div>
<div class="row2">
<div class="input-group">
<label>선수금</label>
<div class="input-wrapper"><input id="downPayment" placeholder="0" type="number" value="0"/><span class="input-unit">만원</span></div>
</div>
<div class="input-group">
<label>잔존가치 (선택)</label>
<div class="input-wrapper"><input id="residual" placeholder="0이면 일반 할부" type="number" value="0"/><span class="input-unit">만원</span></div>
</div>
</div>
<div class="row2">
<div class="input-group">
<label>할부 기간</label>
<div class="input-wrapper"><select id="term"><option value="24">24개월</option><option selected="" value="36">36개월</option><option value="48">48개월</option><option value="60">60개월</option><option value="72">72개월</option></select></div>
</div>
<div class="input-group">
<label>할부 금리 (연)</label>
<div class="input-wrapper"><input id="rate" placeholder="5.9" step="0.1" type="number" value="5.9"/><span class="input-unit">%</span></div>
</div>
</div>
<button class="btn" onclick="calcHalbu()">계산하기</button>
</div>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">월 납입금</div>
<div class="result-value" id="rMonthly">0<span>만원</span></div>
<div class="result-sub" id="rSub"></div>
</div>
<div class="result-grid">
<div class="result-item"><div class="result-item-label">할부 원금</div><div class="result-item-value" id="rPrincipal">-</div></div>
<div class="result-item"><div class="result-item-label">총 이자</div><div class="result-item-value" id="rInterest">-</div></div>
<div class="result-item"><div class="result-item-label">총 납입액</div><div class="result-item-value" id="rTotalPay">-</div></div>
<div class="result-item"><div class="result-item-label">실제 구매비용</div><div class="result-item-value" id="rRealCost">-</div></div>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/car_tax" class="toss-nav-item"><span class="ni-emoji">🚗</span><span class="ni-label">자동차세</span></a>
      <a href="/toss/car_lease" class="toss-nav-item"><span class="ni-emoji">🔑</span><span class="ni-label">리스렌트</span></a>
      <a href="/toss/fuel_economy" class="toss-nav-item"><span class="ni-emoji">⛽</span><span class="ni-label">연비</span></a>
      <a href="/toss/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
    </div>
  </div>
</div>
<script>
function fmt(n) { return Math.round(n).toLocaleString() + '만원'; }
function calcHalbu() {
  const price    = +document.getElementById('carPrice').value;
  const down     = +document.getElementById('downPayment').value || 0;
  const n        = +document.getElementById('term').value;
  const annRate  = +document.getElementById('rate').value;
  const residual = +document.getElementById('residual').value || 0;
  if (!price || !annRate) { alert('차량 가격과 금리를 입력해주세요.'); return; }
  const principal = price - down - residual;
  const r = annRate / 100 / 12;
  const monthly = r === 0 ? principal / n : principal * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
  const totalPay = monthly * n + residual;
  const totalInt = totalPay - principal - residual;
  const realCost = down + totalPay;
  document.getElementById('rMonthly').innerHTML = Math.round(monthly).toLocaleString() + '<span>만원</span>';
  document.getElementById('rSub').textContent   = `${n}개월 · 연 ${annRate}%`;
  document.getElementById('rPrincipal').textContent = fmt(principal);
  document.getElementById('rInterest').textContent  = fmt(totalInt);
  document.getElementById('rTotalPay').textContent  = fmt(totalPay);
  document.getElementById('rRealCost').textContent  = fmt(realCost);
  document.getElementById('result').classList.add('visible');
}
</script>
</body>
</html>
