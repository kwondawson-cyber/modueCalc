<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>학자금 대출 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}.input-comma{font-size:12px;color:var(--accent);margin-top:5px;font-weight:700;min-height:15px;letter-spacing:.3px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px}
    .card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .type-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
    .type-btn{padding:14px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
    .type-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4)}
    .type-name{font-size:14px;font-weight:700;color:var(--text)}
    .type-rate{font-size:12px;color:var(--text-muted);margin-top:4px}
    .type-btn.active .type-name{color:var(--accent)}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 70px 13px 16px;font-size:17px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none}
    select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;cursor:pointer}
    .info-box{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--text-muted);line-height:1.8}
    .info-box strong{color:var(--accent)}
    .calc-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,170,0.3)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;display:none}
    .result-card.visible{display:block}
    .result-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}}
    .result-item{background:var(--surface2);border-radius:12px;padding:16px 18px;text-align:center}
    .result-item .label{font-size:12px;color:var(--text-muted);margin-bottom:5px}
    .result-item .value{font-size:20px;font-weight:900;font-family:'Montserrat',sans-serif}
    .result-item .value.ok{color:var(--accent)}
    .result-item .value.warn{color:var(--danger)}
    .grace-box{margin-top:16px;padding:14px 16px;background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.2);border-radius:10px;font-size:13px;color:var(--text-muted);line-height:1.8}
    .grace-box strong{color:var(--accent2)}
    






    
    
    
    
    
  

























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🎓</span>
    <div><h1>학자금 대출 계산기</h1><p>학자금 대출 이자 상환</p></div>
  </div>



<div class="card">
<div class="card-title">대출 유형 선택</div>
<div class="type-grid">
<div class="type-btn active" id="t-ipo" onclick="setType('ipo')">
<div class="type-name">든든학자금</div>
<div class="type-rate">취업 후 상환 · 연 1.7%</div>
</div>
<div class="type-btn" id="t-gen" onclick="setType('gen')">
<div class="type-name">일반 학자금</div>
<div class="type-rate">재학 중 상환 · 연 1.7%</div>
</div>
</div>
<div class="info-box" id="typeInfo">
<strong>든든학자금(취업 후 상환형)</strong> — 재학 중 이자 발생하지 않음(소득 1~3분위 무이자). 졸업·취업 후 연소득이 상환기준소득(2026년 약 2,795만 원)을 초과하면 자동 원천징수로 상환합니다.
    </div>
<div class="input-group">
<label>대출 원금</label>
<div class="input-wrapper">
<input id="principal" min="0" oninput="showComma(this)" type="number" value="15000000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="principal_c"></div>
</div>
<div id="genOptions">
<div class="input-group">
<label>대출 기간</label>
<select id="period">
<option value="5">5년</option>
<option selected="" value="10">10년</option>
<option value="15">15년</option>
<option value="20">20년</option>
</select>
</div>
<div class="input-group">
<label>재학 중 거치 기간 (이자만 납부)</label>
<select id="grace">
<option value="0">거치 없음</option>
<option selected="" value="2">2년 (재학 기간)</option>
<option value="4">4년 (재학 기간)</option>
</select>
</div>
</div>
<div id="ipoOptions" style="display:none">
<div class="input-group">
<label>연 소득 (취업 후 예상)</label>
<div class="input-wrapper">
<input id="income" oninput="showComma(this)" type="number" value="35000000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="income_c"></div>
</div>
<div class="input-group">
<label>소득 분위</label>
<select id="incomeLevel">
<option value="0">1~3분위 (무이자 혜택)</option>
<option selected="" value="1">4~8분위 (연 1.7%)</option>
<option value="2">9~10분위 (연 1.7%)</option>
</select>
</div>
</div>
<button class="calc-btn" onclick="calc()">🎓 이자 · 상환액 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-title">계산 결과</div>
<div class="result-grid">
<div class="result-item">
<div class="label">월 납입액</div>
<div class="value ok" id="r-monthly">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원</div>
</div>
<div class="result-item">
<div class="label">총 이자</div>
<div class="value warn" id="r-interest">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원</div>
</div>
<div class="result-item">
<div class="label">총 상환액</div>
<div class="value ok" id="r-total">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원</div>
</div>
<div class="result-item">
<div class="label">적용 금리</div>
<div class="value ok" id="r-rate">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">연</div>
</div>
</div>
<div class="grace-box" id="graceBox"></div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
      <a href="/toss/loan_limit" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출한도</span></a>
      <a href="/toss/savings" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">적금</span></a>
      <a href="/toss/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
    </div>
  </div>
</div>
<script>
let loanType = 'ipo';
  const RATE = 0.017; // 2026년 1학기 기준 연 1.7%

  window.addEventListener('DOMContentLoaded', function() {
    ['principal'].forEach(id => showComma(document.getElementById(id)));
  });

  function setType(t) {
    loanType = t;
    ['ipo','gen'].forEach(id => document.getElementById('t-'+id).classList.toggle('active', id === t));
    document.getElementById('genOptions').style.display = t === 'gen' ? '' : 'none';
    document.getElementById('ipoOptions').style.display = t === 'ipo' ? '' : 'none';
    document.getElementById('typeInfo').innerHTML = t === 'ipo'
      ? '<strong>든든학자금(취업 후 상환형)</strong> — 소득 1~3분위 무이자. 연소득이 상환기준소득(약 2,795만 원)을 초과해야 상환 의무 발생.'
      : '<strong>일반 학자금 대출</strong> — 재학 중 이자 발생, 거치기간(재학 중) 이후 원리금균등 상환. 소득 1분위는 무이자.';
  }

  function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }


  function showComma(el) {
    const v = parseFloat(el.value) || 0;
    const cid = el.id + '_c';
    const disp = document.getElementById(cid);
    if (!disp) return;
    if (v === 0) { disp.textContent = ''; return; }
    let s = '';
    const abs = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 100000000) {
      const eok = Math.floor(abs / 100000000);
      const man = Math.round((abs % 100000000) / 10000);
      s = man > 0 ? sign + eok + '억 ' + man.toLocaleString('ko-KR') + '만 원' : sign + eok + '억 원';
    } else if (abs >= 10000) {
      s = sign + Math.round(abs / 10000).toLocaleString('ko-KR') + '만 원';
    } else {
      s = sign + abs.toLocaleString('ko-KR') + ' 원';
    }
    disp.textContent = s;
  }
  function calc() {
    const P = parseFloat(document.getElementById('principal').value) || 0;
    if (P <= 0) { alert('대출 원금을 입력해주세요.'); return; }

    let monthly, totalInterest, totalPay, rateLabel, graceHtml;

    if (loanType === 'gen') {
      const years = parseInt(document.getElementById('period').value) || 10;
      const graceYears = parseInt(document.getElementById('grace').value) || 0;
      const repayYears = years - graceYears;
      const repayN = repayYears * 12;
      const r12 = RATE / 12;

      // 거치 기간 이자
      const graceInterestTotal = P * RATE * graceYears;
      // 원리금균등 상환
      monthly = r12 === 0 ? P / repayN : P * r12 * Math.pow(1+r12,repayN) / (Math.pow(1+r12,repayN)-1);
      totalInterest = monthly * repayN - P + graceInterestTotal;
      totalPay = P + totalInterest;
      rateLabel = '연 1.7%';
      const graceMo = Math.round(P * RATE / 12);
      graceHtml = `<strong>📋 상환 구조</strong><br>거치기간 ${graceYears}년: 월 이자만 <strong>${fmt(graceMo)}원</strong> 납부<br>상환기간 ${repayYears}년: 월 원리금 <strong>${fmt(monthly)}원</strong> 납부`;
    } else {
      // 든든학자금: 취업 후 소득 기준 상환
      const income = parseFloat(document.getElementById('income').value) || 0;
      const lvl = parseInt(document.getElementById('incomeLevel').value);
      const THRESHOLD = 27950000; // 2026년 상환기준소득 약 2,795만 원
      const REPAY_RATE = 0.20; // 상환율 20%

      if (lvl === 0) { // 무이자
        rateLabel = '0% (무이자)';
        totalInterest = 0;
        totalPay = P;
        const overIncome = Math.max(0, income - THRESHOLD);
        const annualRepay = overIncome * REPAY_RATE;
        monthly = annualRepay > 0 ? annualRepay / 12 : 0;
        const estimatedYears = annualRepay > 0 ? Math.ceil(P / annualRepay) : 0;
        graceHtml = `<strong>📋 취업 후 상환 (무이자 혜택 적용)</strong><br>
          기준소득 초과분: <strong>${fmt(overIncome)}원/년</strong><br>
          예상 연간 상환액: <strong>${fmt(annualRepay)}원 (월 ${fmt(monthly)}원)</strong><br>
          총 이자: <strong>0원 (무이자)</strong><br>
          ${estimatedYears > 0 ? `예상 상환 완료: 약 <strong>${estimatedYears}년</strong>` : '소득이 기준 미달이면 상환 의무 없음'}`;
      } else {
        rateLabel = '연 1.7%';
        // 든든학자금: 재학 4년 이자 발생, 이후 소득 기준 상환
        const studyYears = 4;
        const studyInterest = P * RATE * studyYears;
        totalInterest = studyInterest; // 근사치 (상환 기간 이자 별도)
        totalPay = P + totalInterest;

        const overIncome = Math.max(0, income - THRESHOLD);
        const annualRepay = overIncome * REPAY_RATE;
        monthly = annualRepay > 0 ? annualRepay / 12 : 0;
        const estimatedYears = annualRepay > 0 ? Math.ceil(totalPay / annualRepay) : 0;
        graceHtml = `<strong>📋 취업 후 상환 (연 1.7% 적용)</strong><br>
          기준소득 초과분: <strong>${fmt(overIncome)}원/년</strong><br>
          예상 연간 상환액: <strong>${fmt(annualRepay)}원 (월 ${fmt(monthly)}원)</strong><br>
          재학 4년간 예상 이자: <strong>${fmt(studyInterest)}원</strong><br>
          ${estimatedYears > 0 ? `예상 상환 완료: 약 <strong>${estimatedYears}년</strong>` : '소득이 기준 미달이면 상환 의무 없음'}`;
      }
    }

    document.getElementById('r-monthly').textContent = fmt(monthly);
    document.getElementById('r-interest').textContent = fmt(totalInterest);
    document.getElementById('r-total').textContent = fmt(totalPay);
    document.getElementById('r-rate').textContent = rateLabel;
    document.getElementById('graceBox').innerHTML = graceHtml;
    document.getElementById('resultCard').classList.add('visible');
  }
</script>
</body>
</html>
