<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>은퇴 설계 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}.input-comma{font-size:12px;color:var(--accent);margin-top:5px;font-weight:700;min-height:15px;letter-spacing:.3px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px}
    .card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:22px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:480px){.row2{grid-template-columns:1fr}}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 70px 13px 16px;font-size:17px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none}
    .calc-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,170,0.3)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;display:none}
    .result-card.visible{display:block}
    .result-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .main-result{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:14px;padding:20px 24px;margin-bottom:18px;text-align:center}
    .main-result .label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .main-result .big{font-size:36px;font-weight:900;color:var(--accent);font-family:'Montserrat',sans-serif}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}}
    .result-item{background:var(--surface2);border-radius:12px;padding:16px 18px}
    .result-item .label{font-size:12px;color:var(--text-muted);margin-bottom:4px}
    .result-item .value{font-size:18px;font-weight:900;font-family:'Montserrat',sans-serif}
    .result-item .value.ok{color:var(--accent)}
    .result-item .value.warn{color:#ffd700}
    .result-item .value.danger{color:var(--danger)}
    .status-bar{margin-top:18px;padding:14px 16px;border-radius:10px;font-size:13px;line-height:1.8}
    .status-ok{background:rgba(0,212,170,0.07);border:1px solid rgba(0,212,170,0.2);color:var(--text-muted)}
    .status-warn{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.25);color:var(--text-muted)}
    .status-danger{background:rgba(255,107,107,0.07);border:1px solid rgba(255,107,107,0.2);color:var(--text-muted)}
    /* progress bar */
    .progress-wrap{margin-top:16px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px}
    .progress-bar{height:10px;background:var(--surface2);border-radius:10px;overflow:hidden}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width .5s}
    /* rel */
    






    
    
    
    
    
  

























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📊</span>
    <div><h1>은퇴 설계 계산기</h1><p>은퇴 자금 목표 계산</p></div>
  </div>



<div class="card">
<div class="card-title">나이 &amp; 은퇴 목표</div>
<div class="row2">
<div class="input-group">
<label>현재 나이</label>
<div class="input-wrapper">
<input id="currentAge" max="70" min="20" type="number" value="35"/>
<span class="input-unit">세</span>
</div>
</div>
<div class="input-group">
<label>목표 은퇴 나이</label>
<div class="input-wrapper">
<input id="retireAge" max="80" min="40" type="number" value="60"/>
<span class="input-unit">세</span>
</div>
</div>
</div>
<div class="row2">
<div class="input-group">
<label>은퇴 후 기대 수명</label>
<div class="input-wrapper">
<input id="lifeExpect" max="100" min="60" type="number" value="85"/>
<span class="input-unit">세</span>
</div>
</div>
<div class="input-group">
<label>은퇴 후 월 필요 생활비</label>
<div class="input-wrapper">
<input id="monthlyNeed" oninput="showComma(this)" type="number" value="3000000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="monthlyNeed_c"></div>
</div>
</div>
</div>
<div class="card">
<div class="card-title">현재 자산 &amp; 적립 계획</div>
<div class="input-group">
<label>현재 은퇴 준비 자산 (저축·투자 합계)</label>
<div class="input-wrapper">
<input id="currentAsset" oninput="showComma(this)" type="number" value="50000000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="currentAsset_c"></div>
</div>
<div class="input-group">
<label>매월 저축·투자액</label>
<div class="input-wrapper">
<input id="monthlySave" oninput="showComma(this)" type="number" value="1500000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="monthlySave_c"></div>
</div>
<div class="row2">
<div class="input-group">
<label>기대 연 수익률</label>
<div class="input-wrapper">
<input id="returnRate" max="20" min="0" step="0.5" type="number" value="5.0"/>
<span class="input-unit">%</span>
</div>
</div>
<div class="input-group">
<label>물가상승률 (인플레이션)</label>
<div class="input-wrapper">
<input id="inflation" max="10" min="0" step="0.5" type="number" value="2.5"/>
<span class="input-unit">%</span>
</div>
</div>
</div>
<button class="calc-btn" onclick="calc()">📊 은퇴 계획 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-title">은퇴 계획 분석 결과</div>
<div class="main-result">
<div class="label">필요 은퇴 자산 (인플레이션 반영)</div>
<div class="big" id="r-need">—</div>
<div style="font-size:13px;color:var(--text-muted);margin-top:6px">4% 룰 + 은퇴 후 생활비 기준</div>
</div>
<div class="result-grid">
<div class="result-item">
<div class="label">현재 계획 시 예상 자산</div>
<div class="value ok" id="r-projected">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원</div>
</div>
<div class="result-item">
<div class="label">부족/여유 금액</div>
<div class="value" id="r-gap">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원</div>
</div>
<div class="result-item">
<div class="label">목표 달성을 위한 필요 월 저축</div>
<div class="value warn" id="r-needed-save">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">원/월</div>
</div>
<div class="result-item">
<div class="label">저축 기간</div>
<div class="value ok" id="r-years">—</div>
<div style="font-size:11px;color:var(--text-muted);margin-top:3px">년</div>
</div>
</div>
<div class="progress-wrap">
<div class="progress-label">
<span>목표 달성률</span>
<span id="r-pct">0%</span>
</div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<div class="status-bar" id="statusBar"></div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/retirement_pension" class="toss-nav-item"><span class="ni-emoji">💎</span><span class="ni-label">퇴직연금</span></a>
      <a href="/toss/pension" class="toss-nav-item"><span class="ni-emoji">👴</span><span class="ni-label">국민연금</span></a>
      <a href="/toss/compound" class="toss-nav-item"><span class="ni-emoji">📊</span><span class="ni-label">복리</span></a>
      <a href="/toss/savings" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">적금</span></a>
    </div>
  </div>
</div>
<script>
function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
  function fmtEok(n) {
    const abs = Math.abs(n);
    const eok = Math.floor(abs / 100000000);
    const man = Math.round((abs % 100000000) / 10000);
    const sign = n < 0 ? '-' : '';
    if (eok > 0 && man > 0) return sign + `${eok}억 ${man.toLocaleString()}만`;
    if (eok > 0) return sign + `${eok}억`;
    return sign + `${man.toLocaleString()}만`;
  }


  function showComma(el) {
    const v = parseFloat(el.value) || 0;
    const cid = el.id + '_c';
    const disp = document.getElementById(cid);
    if (!disp) return;
    if (v === 0) { disp.textContent = ''; return; }
    let s = '';
    const abs = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 100000000) {
      const eok = Math.floor(abs / 100000000);
      const man = Math.round((abs % 100000000) / 10000);
      s = man > 0 ? sign + eok + '억 ' + man.toLocaleString('ko-KR') + '만 원' : sign + eok + '억 원';
    } else if (abs >= 10000) {
      s = sign + Math.round(abs / 10000).toLocaleString('ko-KR') + '만 원';
    } else {
      s = sign + abs.toLocaleString('ko-KR') + ' 원';
    }
    disp.textContent = s;
  }
  window.addEventListener('DOMContentLoaded', function() {
    ['monthlyNeed','currentAsset','monthlySave'].forEach(id => showComma(document.getElementById(id)));
  });

  function calc() {
    const curAge = parseInt(document.getElementById('currentAge').value) || 35;
    const retAge = parseInt(document.getElementById('retireAge').value) || 60;
    const lifeAge = parseInt(document.getElementById('lifeExpect').value) || 85;
    const monthlyNeed = parseFloat(document.getElementById('monthlyNeed').value) || 3000000;
    const curAsset = parseFloat(document.getElementById('currentAsset').value) || 0;
    const monthlySave = parseFloat(document.getElementById('monthlySave').value) || 0;
    const returnRate = parseFloat(document.getElementById('returnRate').value) / 100;
    const inflRate = parseFloat(document.getElementById('inflation').value) / 100;

    if (retAge <= curAge) { alert('목표 은퇴 나이는 현재 나이보다 커야 합니다.'); return; }

    const years = retAge - curAge;
    const retireYears = lifeAge - retAge;
    const months = years * 12;

    // 은퇴 시점의 인플레이션 반영 월 생활비
    const futureMonthlyNeed = monthlyNeed * Math.pow(1 + inflRate, years);
    // 필요 은퇴 자산 (4% 룰 + 은퇴 기간 고려)
    const needed = futureMonthlyNeed * 12 * retireYears;

    // 현재 자산 복리 성장
    const realReturn = (1 + returnRate) / (1 + inflRate) - 1; // 실질 수익률
    const growthFactor = Math.pow(1 + returnRate / 12, months);
    const assetGrown = curAsset * growthFactor;

    // 월 저축 복리 적립 (FV of annuity)
    const r12 = returnRate / 12;
    const savingsGrown = r12 === 0 ? monthlySave * months : monthlySave * (growthFactor - 1) / r12;
    const projected = assetGrown + savingsGrown;

    // 필요 월 저축 역산
    const neededMinusCurrent = Math.max(0, needed - assetGrown);
    const neededSave = r12 === 0 ? neededMinusCurrent / months : neededMinusCurrent * r12 / (growthFactor - 1);

    const gap = projected - needed;
    const pct = Math.min(Math.round(projected / needed * 100), 200);

    document.getElementById('r-need').textContent = fmtEok(needed) + '원';
    document.getElementById('r-projected').textContent = fmtEok(projected) + '원';
    document.getElementById('r-gap').textContent = (gap >= 0 ? '+' : '') + fmtEok(gap) + '원';
    document.getElementById('r-gap').className = 'value ' + (gap >= 0 ? 'ok' : 'danger');
    document.getElementById('r-needed-save').textContent = fmt(Math.round(neededSave));
    document.getElementById('r-years').textContent = years + '년';
    document.getElementById('r-pct').textContent = pct + '%';
    document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';

    const statusEl = document.getElementById('statusBar');
    if (pct >= 100) {
      statusEl.className = 'status-bar status-ok';
      statusEl.innerHTML = `✅ <strong>목표 달성 가능!</strong> 현재 계획을 유지하면 은퇴 시 목표 자산을 충족할 수 있습니다.`;
    } else if (pct >= 70) {
      statusEl.className = 'status-bar status-warn';
      statusEl.innerHTML = `⚠️ 목표의 <strong>${pct}%</strong> 수준입니다. 월 저축을 <strong>${fmt(Math.round(neededSave - monthlySave))}원</strong> 늘리거나 은퇴 나이를 조정해 보세요.`;
    } else {
      statusEl.className = 'status-bar status-danger';
      statusEl.innerHTML = `🚨 목표의 <strong>${pct}%</strong>에 불과합니다. 목표 달성을 위해 월 <strong>${fmt(Math.round(neededSave))}원</strong> 저축이 필요합니다.`;
    }

    document.getElementById('resultCard').classList.add('visible');
  }
</script>
</body>
</html>
