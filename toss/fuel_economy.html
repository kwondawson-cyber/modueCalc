<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>연비 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    .container{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:48px}
    .header h1{font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:15px;font-weight:300}
    .tab-group{display:flex;gap:4px;background:var(--surface2);border-radius:12px;padding:4px;margin-bottom:20px}
    .tab-btn{flex:1;padding:12px;background:transparent;border:none;border-radius:9px;color:var(--text-muted);font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
    .tab-btn.active{background:var(--surface);color:var(--accent);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px}
    .card-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:24px}
    .input-group{margin-bottom:24px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:8px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 80px 16px 20px;font-size:22px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none;white-space:nowrap}
    .seg-group{display:flex;gap:8px;flex-wrap:wrap}
    .seg-btn{flex:1;min-width:60px;padding:12px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center}
    .seg-btn.active{background:rgba(0,212,170,0.15);border-color:var(--accent);color:var(--accent)}
    .info-box{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:14px 18px;font-size:14px;color:var(--text-muted);line-height:1.8;margin-bottom:20px}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:17px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;margin-top:4px}
    .calc-btn:hover{opacity:.9;transform:translateY(-1px)}
    .result-card{display:none}
    .result-card.visible{display:block}
    .big-result{text-align:center;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .br-label{font-size:13px;color:var(--text-muted);margin-bottom:8px}
    .br-value{font-family:'Montserrat',sans-serif;font-size:clamp(42px,10vw,64px);font-weight:900;color:var(--accent);line-height:1}
    .br-unit{font-size:16px;color:var(--text-muted);margin-top:8px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .d-label{color:var(--text-muted)}
    .d-value{font-weight:700}
    .d-value.accent{color:var(--accent)}
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">⛽</span>
    <div><h1>연비 계산기</h1><p>연료비·주유비 계산</p></div>
  </div>



<div class="card">
<div class="tab-group">
<button class="tab-btn active" onclick="switchTab('real',this)">실제 연비 계산</button>
<button class="tab-btn" onclick="switchTab('trip',this)">목적지 비용 계산</button>
<button class="tab-btn" onclick="switchTab('annual',this)">연간 유류비 계산</button>
</div>
<div class="tab-panel active" id="tab-real">
<div class="card-title">⛽ 실제 연비 계산</div>
<div class="info-box">💡 주유 후 주행 거리와 주유량을 입력하면 실제 연비를 계산합니다. 만탱크 → 주행 → 만탱크 방식이 가장 정확합니다.</div>
<div class="input-group"><label>주행 거리</label><div class="input-wrapper"><input id="r1-distance" placeholder="450" type="number"/><span class="input-unit">km</span></div></div>
<div class="input-group"><label>주유량</label><div class="input-wrapper"><input id="r1-fuel" placeholder="40" type="number"/><span class="input-unit">리터 (L)</span></div></div>
<div class="input-group"><label>연료 종류</label><div class="seg-group" id="r1-fuelType"><button class="seg-btn active" data-fuel="휘발유" onclick="selectFuel(this,'r1-fuelType')">휘발유</button><button class="seg-btn" data-fuel="경유" onclick="selectFuel(this,'r1-fuelType')">경유</button><button class="seg-btn" data-fuel="LPG" onclick="selectFuel(this,'r1-fuelType')">LPG</button></div></div>
<div class="input-group"><label>리터당 유가 (선택)</label><div class="input-wrapper"><input id="r1-price" placeholder="1650" type="number"/><span class="input-unit">원/L</span></div></div>
<button class="calc-btn" onclick="calcReal()">⛽ 연비 계산하기</button>
</div>
<div class="tab-panel" id="tab-trip">
<div class="card-title">🗺 목적지 주유 비용</div>
<div class="input-group"><label>이동 거리</label><div class="input-wrapper"><input id="r2-distance" placeholder="300" type="number"/><span class="input-unit">km</span></div></div>
<div class="input-group"><label>차량 연비</label><div class="input-wrapper"><input id="r2-mpg" placeholder="12" type="number"/><span class="input-unit">km/L</span></div></div>
<div class="input-group"><label>연료 종류</label><div class="seg-group" id="r2-fuelType"><button class="seg-btn active" data-fuel="휘발유" onclick="selectFuel(this,'r2-fuelType')">휘발유</button><button class="seg-btn" data-fuel="경유" onclick="selectFuel(this,'r2-fuelType')">경유</button><button class="seg-btn" data-fuel="LPG" onclick="selectFuel(this,'r2-fuelType')">LPG</button><button class="seg-btn" data-fuel="전기" onclick="selectFuel(this,'r2-fuelType')">전기차</button></div></div>
<div class="input-group"><label id="r2-priceLabel">리터당 유가</label><div class="input-wrapper"><input id="r2-price" placeholder="1650" type="number"/><span class="input-unit" id="r2-unit">원/L</span></div></div>
<button class="calc-btn" onclick="calcTrip()">🗺 비용 계산하기</button>
</div>
<div class="tab-panel" id="tab-annual">
<div class="card-title">📅 연간 유류비 계산</div>
<div class="input-group"><label>월 주행 거리</label><div class="input-wrapper"><input id="r3-monthly" placeholder="1500" type="number"/><span class="input-unit">km/월</span></div></div>
<div class="input-group"><label>차량 연비</label><div class="input-wrapper"><input id="r3-mpg" placeholder="12" type="number"/><span class="input-unit">km/L</span></div></div>
<div class="input-group"><label>연료 종류</label><div class="seg-group" id="r3-fuelType"><button class="seg-btn active" data-fuel="휘발유" onclick="selectFuel(this,'r3-fuelType')">휘발유</button><button class="seg-btn" data-fuel="경유" onclick="selectFuel(this,'r3-fuelType')">경유</button><button class="seg-btn" data-fuel="LPG" onclick="selectFuel(this,'r3-fuelType')">LPG</button><button class="seg-btn" data-fuel="전기" onclick="selectFuel(this,'r3-fuelType')">전기차</button></div></div>
<div class="input-group"><label id="r3-priceLabel">리터당 유가</label><div class="input-wrapper"><input id="r3-price" placeholder="1650" type="number"/><span class="input-unit" id="r3-unit">원/L</span></div></div>
<button class="calc-btn" onclick="calcAnnual()">📅 연간 비용 계산하기</button>
</div>
</div>
<div class="card result-card" id="resultCard">
<div class="card-title">📊 계산 결과</div>
<div class="big-result">
<div class="br-label" id="r-mainLabel">실제 연비</div>
<div class="br-value" id="r-mainValue">—</div>
<div class="br-unit" id="r-mainUnit">km/L</div>
</div>
<div id="r-details"></div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/car_tax" class="toss-nav-item"><span class="ni-emoji">🚗</span><span class="ni-label">자동차세</span></a>
      <a href="/car_installment" class="toss-nav-item"><span class="ni-emoji">🚙</span><span class="ni-label">자동차할부</span></a>
      <a href="/car_lease" class="toss-nav-item"><span class="ni-emoji">🔑</span><span class="ni-label">리스렌트</span></a>
      <a href="/inflation" class="toss-nav-item"><span class="ni-emoji">📈</span><span class="ni-label">물가상승률</span></a>
    </div>
  </div>
</div>
<script>
let currentTab = 'real';
const fuelTypes = {};
function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('resultCard').classList.remove('visible');
}
function selectFuel(btn, groupId) {
  document.querySelectorAll('#' + groupId + ' .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  fuelTypes[groupId] = btn.dataset.fuel;
  if (groupId === 'r2-fuelType') {
    const isEv = btn.dataset.fuel === '전기';
    document.getElementById('r2-priceLabel').textContent = isEv ? '전기 요금' : '리터당 유가';
    document.getElementById('r2-unit').textContent = isEv ? '원/kWh' : '원/L';
    document.getElementById('r2-price').placeholder = isEv ? '310' : '1650';
  }
  if (groupId === 'r3-fuelType') {
    const isEv = btn.dataset.fuel === '전기';
    document.getElementById('r3-priceLabel').textContent = isEv ? '전기 요금' : '리터당 유가';
    document.getElementById('r3-unit').textContent = isEv ? '원/kWh' : '원/L';
    document.getElementById('r3-price').placeholder = isEv ? '310' : '1650';
  }
}
function detailRow(label, value, accent) {
  return `<div class="detail-item"><span class="d-label">${label}</span><span class="d-value ${accent?'accent':''}">${value}</span></div>`;
}
function fmt(n, decimals=0) {
  return n.toLocaleString('ko-KR', {minimumFractionDigits:decimals, maximumFractionDigits:decimals});
}
function calcReal() {
  const dist  = parseFloat(document.getElementById('r1-distance').value) || 0;
  const fuel  = parseFloat(document.getElementById('r1-fuel').value) || 0;
  const price = parseFloat(document.getElementById('r1-price').value) || 0;
  if (!dist || !fuel) { alert('주행 거리와 주유량을 입력하세요.'); return; }
  const mpg = dist / fuel;
  const costPerKm = price > 0 ? (price / mpg) : 0;
  const costTotal = fuel * price;
  document.getElementById('r-mainLabel').textContent = '실제 연비';
  document.getElementById('r-mainValue').textContent = fmt(mpg, 1);
  document.getElementById('r-mainUnit').textContent  = 'km/L';
  document.getElementById('r-details').innerHTML =
    detailRow('주행 거리', fmt(dist) + ' km') +
    detailRow('소비 연료', fmt(fuel, 1) + ' L') +
    (price > 0 ? detailRow('이번 주유 비용', fmt(costTotal) + ' 원') : '') +
    (price > 0 ? detailRow('km당 연료비', fmt(costPerKm, 1) + ' 원/km', true) : '') +
    detailRow('공인 연비 추정', `약 ${fmt(mpg/0.77, 1)} km/L 차량 (실연비 77% 가정)`);
  document.getElementById('resultCard').classList.add('visible');
}
function calcTrip() {
  const dist  = parseFloat(document.getElementById('r2-distance').value) || 0;
  const mpg   = parseFloat(document.getElementById('r2-mpg').value) || 0;
  const price = parseFloat(document.getElementById('r2-price').value) || 0;
  const fuel  = fuelTypes['r2-fuelType'] || '휘발유';
  if (!dist || !mpg || !price) { alert('거리, 연비, 유가를 모두 입력하세요.'); return; }
  const fuelUsed = dist / mpg;
  const cost = fuelUsed * price;
  const unit = fuel === '전기' ? 'kWh' : 'L';
  document.getElementById('r-mainLabel').textContent = '목적지 주유 비용';
  document.getElementById('r-mainValue').textContent = fmt(cost);
  document.getElementById('r-mainUnit').textContent  = '원';
  document.getElementById('r-details').innerHTML =
    detailRow('이동 거리', fmt(dist) + ' km') +
    detailRow('연비', fmt(mpg, 1) + ' km/' + unit) +
    detailRow(`필요 ${fuel==='전기'?'전력량':'연료'}`, fmt(fuelUsed, 1) + ' ' + unit) +
    detailRow('단가', fmt(price) + ' 원/' + unit) +
    detailRow('왕복 비용', fmt(cost * 2) + ' 원', true);
  document.getElementById('resultCard').classList.add('visible');
}
function calcAnnual() {
  const monthly = parseFloat(document.getElementById('r3-monthly').value) || 0;
  const mpg     = parseFloat(document.getElementById('r3-mpg').value) || 0;
  const price   = parseFloat(document.getElementById('r3-price').value) || 0;
  const fuel    = fuelTypes['r3-fuelType'] || '휘발유';
  if (!monthly || !mpg || !price) { alert('월 주행거리, 연비, 유가를 모두 입력하세요.'); return; }
  const annualDist = monthly * 12;
  const annualFuel = annualDist / mpg;
  const annualCost = annualFuel * price;
  const monthlyCost = annualCost / 12;
  const unit = fuel === '전기' ? 'kWh' : 'L';
  document.getElementById('r-mainLabel').textContent = '연간 유류비';
  document.getElementById('r-mainValue').textContent = fmt(annualCost);
  document.getElementById('r-mainUnit').textContent  = '원/년';
  document.getElementById('r-details').innerHTML =
    detailRow('월 주행 거리', fmt(monthly) + ' km') +
    detailRow('연간 주행 거리', fmt(annualDist) + ' km') +
    detailRow(`연간 ${fuel==='전기'?'전력':'연료'} 소비`, fmt(annualFuel, 0) + ' ' + unit) +
    detailRow('월 평균 유류비', fmt(monthlyCost) + ' 원', true) +
    detailRow('하루 평균 유류비', fmt(annualCost / 365, 0) + ' 원');
  document.getElementById('resultCard').classList.add('visible');
}
fuelTypes['r1-fuelType'] = '휘발유';
fuelTypes['r2-fuelType'] = '휘발유';
fuelTypes['r3-fuelType'] = '휘발유';
</script>
</body>
</html>
