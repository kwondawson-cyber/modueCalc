<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>모기지 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}.input-comma{font-size:12px;color:var(--accent);margin-top:5px;font-weight:700;min-height:15px;letter-spacing:.3px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px}
    .card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:22px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 70px 13px 16px;font-size:17px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none}
    .tab-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
    .tab-btn{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .2s;text-align:center}
    .tab-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4);color:var(--accent)}
    select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:16px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;cursor:pointer}
    .calc-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,170,0.3)}
    .info-box{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--text-muted)}
    .info-box strong{color:var(--accent)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;display:none}
    .result-card.visible{display:block}
    .result-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}}
    .result-item{background:var(--surface2);border-radius:12px;padding:16px 18px;text-align:center}
    .result-item .label{font-size:12px;color:var(--text-muted);margin-bottom:6px}
    .result-item .value{font-size:22px;font-weight:900;color:var(--accent);font-family:'Montserrat',sans-serif}
    .result-item .value.danger{color:var(--danger)}
    .result-item .sub{font-size:11px;color:var(--text-muted);margin-top:4px}
    .prepay-section{margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}
    .prepay-section h3{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px}
    .prepay-result{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.2);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--text-muted);line-height:1.9}
    .prepay-result strong{color:var(--accent)}
    /* rel-section */
    






    /* aff */
    
    
    
    
    
    
    
    
    
  

























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🏠</span>
    <div><h1>모기지 계산기</h1><p>주택담보대출 상환 계산</p></div>
  </div>



<div class="card">
<div class="card-title">대출 조건 입력</div>
<div class="input-group">
<label>주택 가격</label>
<div class="input-wrapper">
<input id="homePrice" min="0" oninput="updateLoanAmount();showComma(this)" type="number" value="500000000"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="homePrice_c"></div>
</div>
<div class="input-group">
<label>계약금 비율 — <span id="downLabel">20</span>%</label>
<input id="downRate" max="80" min="5" oninput="onDownSlide(this.value)" step="5" style="width:100%;margin-top:6px" type="range" value="20"/>
<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px"><span>5%</span><span>40%</span><span>80%</span></div>
</div>
<div class="info-box">
      계약금 <strong id="downAmt">1억 0,000만 원</strong> → 대출금액 <strong id="loanAmt">4억 0,000만 원</strong>
</div>
<div class="input-group">
<label>연 금리</label>
<div class="input-wrapper">
<input id="rate" max="20" min="0.1" step="0.1" type="number" value="4.0"/>
<span class="input-unit">%</span>
</div>
</div>
<div class="input-group">
<label>대출 기간</label>
<select id="period">
<option value="10">10년</option>
<option value="15">15년</option>
<option value="20">20년</option>
<option value="25">25년</option>
<option selected="" value="30">30년</option>
<option value="35">35년</option>
</select>
</div>
<div class="card-title" style="margin-top:8px;margin-bottom:12px">상환 방식</div>
<div class="tab-group">
<button class="tab-btn active" id="tab-equal" onclick="setMethod('equal')">원리금균등</button>
<button class="tab-btn" id="tab-principal" onclick="setMethod('principal')">원금균등</button>
</div>
<button class="calc-btn" onclick="calc()">💰 월 납입액 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-title">계산 결과</div>
<div class="result-grid">
<div class="result-item">
<div class="label">월 납입액 (첫 달)</div>
<div class="value" id="r-monthly">—</div>
<div class="sub">원</div>
</div>
<div class="result-item">
<div class="label">총 이자</div>
<div class="value danger" id="r-interest">—</div>
<div class="sub">원</div>
</div>
<div class="result-item">
<div class="label">총 상환액</div>
<div class="value" id="r-total">—</div>
<div class="sub">원</div>
</div>
<div class="result-item">
<div class="label">이자 비율</div>
<div class="value danger" id="r-ratio">—</div>
<div class="sub">원금 대비</div>
</div>
</div>
<div class="prepay-section">
<h3>🔥 조기상환 시뮬레이션</h3>
<div class="input-group">
<label>매달 추가 납입액</label>
<div class="input-wrapper">
<input id="extraPayment" min="0" oninput="calcPrepay();showComma(this)" placeholder="0" type="number" value="0"/>
<span class="input-unit">원</span>
</div>
<div class="input-comma" id="extraPayment_c"></div>
</div>
<div class="prepay-result" id="prepayResult" style="display:none"></div>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
      <a href="/loan_limit" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출한도</span></a>
      <a href="/jeonse_loan" class="toss-nav-item"><span class="ni-emoji">🏘️</span><span class="ni-label">전세대출</span></a>
      <a href="/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
    </div>
  </div>
</div>
<script>
let method = 'equal';
  let calcedPrincipal = 0, calcedRate = 0, calcedN = 0;

  function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
  function fmtEok(n) {
    const eok = Math.floor(n / 100000000);
    const man = Math.round((n % 100000000) / 10000);
    if (eok > 0 && man > 0) return `${eok}억 ${man.toLocaleString()}만 원`;
    if (eok > 0) return `${eok}억 원`;
    return `${man.toLocaleString()}만 원`;
  }

  function updateLoanAmount() {
    const price = parseFloat(document.getElementById('homePrice').value) || 0;
    const rate = parseInt(document.getElementById('downRate').value) || 20;
    const down = price * rate / 100;
    const loan = price - down;
    document.getElementById('downAmt').textContent = fmtEok(down);
    document.getElementById('loanAmt').textContent = fmtEok(loan);
  }

  function onDownSlide(v) {
    document.getElementById('downLabel').textContent = v;
    updateLoanAmount();
  }

  function setMethod(m) {
    method = m;
    document.getElementById('tab-equal').classList.toggle('active', m === 'equal');
    document.getElementById('tab-principal').classList.toggle('active', m === 'principal');
  }


  function showComma(el) {
    const v = parseFloat(el.value) || 0;
    const cid = el.id + '_c';
    const disp = document.getElementById(cid);
    if (!disp) return;
    if (v === 0) { disp.textContent = ''; return; }
    let s = '';
    const abs = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if (abs >= 100000000) {
      const eok = Math.floor(abs / 100000000);
      const man = Math.round((abs % 100000000) / 10000);
      s = man > 0 ? sign + eok + '억 ' + man.toLocaleString('ko-KR') + '만 원' : sign + eok + '억 원';
    } else if (abs >= 10000) {
      s = sign + Math.round(abs / 10000).toLocaleString('ko-KR') + '만 원';
    } else {
      s = sign + abs.toLocaleString('ko-KR') + ' 원';
    }
    disp.textContent = s;
  }
  function calc() {
    const homePrice = parseFloat(document.getElementById('homePrice').value) || 0;
    const downRate = parseInt(document.getElementById('downRate').value) || 20;
    const P = homePrice * (1 - downRate / 100);
    const annualRate = parseFloat(document.getElementById('rate').value) || 0;
    const years = parseInt(document.getElementById('period').value) || 30;
    const n = years * 12;
    const r = annualRate / 100 / 12;

    if (P <= 0 || annualRate <= 0) { alert('올바른 값을 입력해주세요.'); return; }

    calcedPrincipal = P; calcedRate = r; calcedN = n;

    let firstMonthly, totalInterest;
    if (method === 'equal') {
      firstMonthly = r === 0 ? P / n : P * r * Math.pow(1+r,n) / (Math.pow(1+r,n)-1);
      totalInterest = firstMonthly * n - P;
    } else {
      const principalPayment = P / n;
      firstMonthly = principalPayment + P * r;
      let rem = P, ti = 0;
      for (let i = 0; i < n; i++) { ti += rem * r; rem -= principalPayment; }
      totalInterest = ti;
    }

    document.getElementById('r-monthly').textContent = fmt(firstMonthly);
    document.getElementById('r-interest').textContent = fmt(totalInterest);
    document.getElementById('r-total').textContent = fmt(P + totalInterest);
    document.getElementById('r-ratio').textContent = (totalInterest / P * 100).toFixed(1) + '%';
    document.getElementById('resultCard').classList.add('visible');
    calcPrepay();
  }

  function calcPrepay() {
    const extra = parseFloat(document.getElementById('extraPayment').value) || 0;
    const el = document.getElementById('prepayResult');
    if (!calcedPrincipal || extra <= 0) { el.style.display = 'none'; return; }

    const P = calcedPrincipal, r = calcedRate;
    const monthlyBase = r === 0 ? P/calcedN : P*r*Math.pow(1+r,calcedN)/(Math.pow(1+r,calcedN)-1);
    const totalMonthly = monthlyBase + extra;

    // 조기상환 시뮬레이션
    let rem = P, months = 0, totalPaid = 0;
    while (rem > 0 && months < calcedN * 2) {
      const interestThis = rem * r;
      const principalThis = Math.min(totalMonthly - interestThis, rem);
      if (principalThis <= 0) break;
      totalPaid += totalMonthly < rem + interestThis ? totalMonthly : rem + interestThis;
      rem -= principalThis;
      months++;
    }
    const origTotal = monthlyBase * calcedN;
    const savedInterest = origTotal - totalPaid;
    const savedMonths = calcedN - months;

    el.innerHTML = `매달 <strong>${fmt(extra)}원</strong> 추가 납입 시:<br>
      🕐 상환 기간 <strong>${Math.floor(savedMonths/12)}년 ${savedMonths%12}개월</strong> 단축<br>
      💰 총 이자 <strong>${fmt(Math.max(0,savedInterest))}원</strong> 절감`;
    el.style.display = 'block';
  }

  window.onload = () => { updateLoanAmount(); ['homePrice'].forEach(id => showComma(document.getElementById(id))); };
</script>
</body>
</html>
