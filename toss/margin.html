<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>마진율 계산기</title>
  <!-- TODO: 앱인토스 SDK — 콘솔 발급 코드로 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 60px 13px 16px;font-size:20px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}.result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .margin-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .m-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
    .m-box.main{border-color:rgba(0,212,170,0.4);background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.04))}
    .m-box .m-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:8px}
    .m-box .m-value{font-family:'Montserrat',sans-serif;font-size:30px;font-weight:900}
    .m-box.main .m-value{color:var(--accent)}
    .m-box .m-unit{font-size:12px;color:var(--text-muted);margin-top:4px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .detail-item .d-label{color:var(--text-muted)}
    .detail-item .d-value{font-weight:700}.detail-item .d-value.accent{color:var(--accent)}
    .industry-table{width:100%;border-collapse:collapse;font-size:13px}
    .industry-table th{text-align:left;padding:8px 10px;color:var(--text-muted);font-size:11px;border-bottom:1px solid var(--border)}
    .industry-table td{padding:10px;border-bottom:1px solid rgba(48,54,61,0.5)}
    .industry-table tr:last-child td{border-bottom:none}
    @media(max-width:480px){.card{padding:20px 16px}.margin-grid{grid-template-columns:1fr}}

    /* ── 홈 버튼 ── */
    
    
    
    
    
  

















































    /* ── 토스 헤더 ── */

    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    /* ── 토스 하단 네비 ── */
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    /* ── max-scale 방지 ── */
    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">

  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">💹</span>
    <div>
      <h1>마진율 계산기</h1>
      <p>원가·판매가·마진율 계산</p>
    </div>
  </div>


<div class="card">
<div class="card-title">가격 정보</div>
<div class="input-group">
<label>원가 (매입가)</label>
<div class="input-wrapper"><input id="cost" type="number" value="8000"/><span class="input-unit">원</span></div>
</div>
<div class="input-group">
<label>판매가</label>
<div class="input-wrapper"><input id="price" type="number" value="10000"/><span class="input-unit">원</span></div>
</div>
<button class="calc-btn" onclick="calculate()">📊 마진율 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="margin-grid">
<div class="m-box main"><div class="m-label">마진율</div><div class="m-value" id="r-margin">-</div><div class="m-unit">%</div></div>
<div class="m-box"><div class="m-label">마크업률</div><div class="m-value" id="r-markup" style="color:#ffd54f">-</div><div class="m-unit">%</div></div>
</div>
<div class="card">
<div class="card-title">상세 내역</div>
<div class="detail-item"><span class="d-label">원가</span><span class="d-value" id="d-cost">-</span></div>
<div class="detail-item"><span class="d-label">판매가</span><span class="d-value" id="d-price">-</span></div>
<div class="detail-item"><span class="d-label">순이익</span><span class="d-value accent" id="d-profit">-</span></div>
<div class="detail-item"><span class="d-label">마진율 (이익/판매가)</span><span class="d-value accent" id="d-margin">-</span></div>
<div class="detail-item"><span class="d-label">마크업률 (이익/원가)</span><span class="d-value" id="d-markup">-</span></div>
</div>
<div class="card">
<div class="card-title">업종별 평균 마진율</div>
<table class="industry-table">
<thead><tr><th>업종</th><th>평균 마진율</th></tr></thead>
<tbody>
<tr><td>음식점/카페</td><td>60~70%</td></tr>
<tr><td>화장품</td><td>60~80%</td></tr>
<tr><td>의류/패션</td><td>50~60%</td></tr>
<tr><td>온라인 쇼핑몰</td><td>30~50%</td></tr>
<tr><td>가구/인테리어</td><td>40~60%</td></tr>
<tr><td>편의점/마트</td><td>15~25%</td></tr>
<tr><td>전자제품</td><td>10~20%</td></tr>
</tbody>
</table>
</div>
</div>


    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">📌 사업자 세금 계산기</div>
    <div class="toss-nav-grid">
      <a href="/product_cost" class="toss-nav-item"><span class="ni-emoji">🏷️</span><span class="ni-label">원가계산</span></a>
      <a href="/breakeven" class="toss-nav-item"><span class="ni-emoji">⚖️</span><span class="ni-label">손익분기점</span></a>
      <a href="/operating_profit" class="toss-nav-item"><span class="ni-emoji">📈</span><span class="ni-label">영업이익</span></a>
      <a href="/card_fee" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">카드수수료</span></a>
    </div>
  </div>

</div>
<script>
function fmt(n){return n.toLocaleString('ko-KR')}
  function calculate(){
    const cost=parseFloat(document.getElementById('cost').value)||0;
    const price=parseFloat(document.getElementById('price').value)||0;
    if(price<=0){alert('판매가를 입력해주세요.');return;}
    const profit=price-cost;
    const margin=(profit/price*100).toFixed(2);
    const markup=(profit/cost*100).toFixed(2);
    document.getElementById('r-margin').textContent=margin;
    document.getElementById('r-markup').textContent=markup;
    document.getElementById('d-cost').textContent=`${fmt(cost)}원`;
    document.getElementById('d-price').textContent=`${fmt(price)}원`;
    document.getElementById('d-profit').textContent=`${fmt(profit)}원`;
    document.getElementById('d-margin').textContent=`${margin}%`;
    document.getElementById('d-markup').textContent=`${markup}%`;
    const rc=document.getElementById('resultCard');rc.classList.add('visible');
  }
  window.onload=()=>calculate();
</script>
</body>
</html>
