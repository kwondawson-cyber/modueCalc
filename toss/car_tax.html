<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>자동차세 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    .container{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:48px}
    .header h1{font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:15px;font-weight:300}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;margin-bottom:20px}
    .card-title{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:24px}
    .input-group{margin-bottom:24px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:8px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 70px 16px 20px;font-size:22px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .seg-group{display:flex;gap:8px;flex-wrap:wrap}
    .seg-btn{flex:1;min-width:80px;padding:12px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;text-align:center}
    .seg-btn.active{background:rgba(0,212,170,0.15);border-color:var(--accent);color:var(--accent)}
    .info-box{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:14px 18px;font-size:14px;color:var(--text-muted);line-height:1.8;margin-bottom:20px}
    .warn-box{background:rgba(255,107,107,0.05);border:1px solid rgba(255,107,107,0.2);border-radius:10px;padding:14px 18px;font-size:13px;color:var(--text-muted);line-height:1.8;margin-top:16px}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:17px;font-weight:800;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s;margin-top:4px}
    .calc-btn:hover{opacity:.9;transform:translateY(-1px)}
    .result-card{display:none}
    .result-card.visible{display:block}
    .big-result{text-align:center;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .br-label{font-size:13px;color:var(--text-muted);margin-bottom:8px}
    .br-value{font-family:'Montserrat',sans-serif;font-size:clamp(36px,8vw,56px);font-weight:900;color:var(--accent);line-height:1}
    .br-unit{font-size:15px;color:var(--text-muted);margin-top:8px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .d-label{color:var(--text-muted)}
    .d-value{font-weight:700}
    .d-value.accent{color:var(--accent)}
    .d-value.red{color:var(--danger)}
    .total-row{background:rgba(0,212,170,0.06);border-radius:10px;padding:16px 20px;margin-top:16px;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:900}
    .total-row span:last-child{color:var(--accent);font-size:20px}
    .badge{display:inline-block;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700;background:rgba(0,212,170,0.15);color:var(--accent);margin-left:6px}
    .rate-tag{font-size:12px;color:var(--accent);background:rgba(0,212,170,0.1);padding:2px 8px;border-radius:20px}
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🚗</span>
    <div><h1>자동차세 계산기</h1><p>자동차세·연납 할인 계산</p></div>
  </div>



<div class="card">
<div class="card-title">🚗 차량 정보 입력</div>
<div class="input-group"><label>차량 종류</label><div class="seg-group" id="carTypeGroup"><button class="seg-btn active" data-type="일반" onclick="selectType(this)">일반 승용</button><button class="seg-btn" data-type="경차" onclick="selectType(this)">경차</button><button class="seg-btn" data-type="전기" onclick="selectType(this)">전기차</button><button class="seg-btn" data-type="하이브리드" onclick="selectType(this)">하이브리드</button><button class="seg-btn" data-type="승합" onclick="selectType(this)">승합/화물</button></div></div>
<div class="input-group"><label>신차 / 중고차</label><div class="seg-group" id="newUsedGroup"><button class="seg-btn active" data-used="new" onclick="selectUsed(this)">신차</button><button class="seg-btn" data-used="used" onclick="selectUsed(this)">중고차</button></div></div>
<div class="input-group"><label>차량 가격 (구매가)</label><div class="input-wrapper"><input id="carPrice" placeholder="35000000" type="number"/><span class="input-unit">원</span></div></div>
<div class="input-group" id="regionGroup"><label>등록 지역 (공채 매입 기준)</label><div class="seg-group"><button class="seg-btn active" data-region="서울" onclick="selectRegion(this)">서울</button><button class="seg-btn" data-region="경기" onclick="selectRegion(this)">경기</button><button class="seg-btn" data-region="기타" onclick="selectRegion(this)">기타 광역시</button><button class="seg-btn" data-region="지방" onclick="selectRegion(this)">기타 지방</button></div></div>
<div class="info-box" id="infoBox">📌 일반 승용차 취득세율 <strong>7%</strong> 적용 · 경차 4%, 전기차 취득세 감면 혜택 있음</div>
<button class="calc-btn" onclick="calcCarTax()">🚗 취득세 계산하기</button>
</div>
<div class="card result-card" id="resultCard">
<div class="card-title">💰 세금 계산 결과</div>
<div class="big-result">
<div class="br-label">취득세 (지방교육세 포함)</div>
<div class="br-value" id="totalTax">—</div>
<div class="br-unit">원</div>
</div>
<div class="detail-item"><span class="d-label">차량 가격</span><span class="d-value" id="r-price">—</span></div>
<div class="detail-item"><span class="d-label">취득세율 <span class="rate-tag" id="r-rate-badge">—</span></span><span class="d-value red" id="r-acq">—</span></div>
<div class="detail-item"><span class="d-label">지방교육세 (취득세의 10%)</span><span class="d-value red" id="r-edu">—</span></div>
<div class="detail-item"><span class="d-label">공채 매입비 (추정)</span><span class="d-value red" id="r-bond">—</span></div>
<div class="detail-item"><span class="d-label">공채 할인 손실 (즉시 매도 시)</span><span class="d-value red" id="r-bondloss">—</span></div>
<div class="total-row"><span>총 부대비용 (취득세+공채손실)</span><span id="r-total">—</span></div>
<div class="warn-box" id="r-note">⚠️ 실제 취득세는 과세표준(시가표준액)이 구매가보다 높으면 시가표준액 기준으로 부과됩니다.</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/car_installment" class="toss-nav-item"><span class="ni-emoji">🚙</span><span class="ni-label">자동차할부</span></a>
      <a href="/car_lease" class="toss-nav-item"><span class="ni-emoji">🔑</span><span class="ni-label">리스렌트</span></a>
      <a href="/fuel_economy" class="toss-nav-item"><span class="ni-emoji">⛽</span><span class="ni-label">연비</span></a>
      <a href="/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
    </div>
  </div>
</div>
<script>
let carType = '일반';
let isUsed = false;
let region = '서울';
const TAX_RATES = {'일반':0.07,'경차':0.04,'전기':0.07,'하이브리드':0.07,'승합':0.05};
const DISCOUNT  = {'전기':1400000,'하이브리드':400000};
const BOND_RATES = {
  '서울': {'일반':0.12,'경차':0.04,'전기':0.09,'하이브리드':0.09,'승합':0.05},
  '경기': {'일반':0.09,'경차':0.03,'전기':0.07,'하이브리드':0.07,'승합':0.04},
  '기타': {'일반':0.05,'경차':0.02,'전기':0.04,'하이브리드':0.04,'승합':0.03},
  '지방': {'일반':0.04,'경차':0.01,'전기':0.03,'하이브리드':0.03,'승합':0.02},
};
const BOND_DISCOUNT_RATE = 0.20;
const INFO = {
  '일반':    '📌 일반 승용차 취득세율 <strong>7%</strong> 적용 · 지방교육세 별도 10%',
  '경차':    '📌 경차 취득세율 <strong>4%</strong> · 100만원 한도 추가 감면 가능',
  '전기':    '📌 전기차 취득세율 7% → <strong>최대 140만원 감면</strong> 적용',
  '하이브리드':'📌 하이브리드 취득세율 7% → <strong>최대 40만원 감면</strong> 적용',
  '승합':    '📌 승합·화물차 취득세율 <strong>5%</strong> 적용',
};
function selectType(btn) {
  document.querySelectorAll('#carTypeGroup .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); carType = btn.dataset.type;
  document.getElementById('infoBox').innerHTML = INFO[carType];
}
function selectUsed(btn) {
  document.querySelectorAll('#newUsedGroup .seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); isUsed = btn.dataset.used === 'used';
}
function selectRegion(btn) {
  btn.closest('.seg-group').querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active'); region = btn.dataset.region;
}
function fmt(n) { return Math.round(n).toLocaleString('ko-KR') + '원'; }
function calcCarTax() {
  const price = parseFloat(document.getElementById('carPrice').value) || 0;
  if (price <= 0) { alert('차량 가격을 입력하세요.'); return; }
  const rate = TAX_RATES[carType];
  let acqTax = Math.floor(price * rate);
  if (carType === '경차') acqTax = Math.max(0, acqTax - 1000000);
  if (DISCOUNT[carType]) acqTax = Math.max(0, acqTax - DISCOUNT[carType]);
  const eduTax   = Math.floor(acqTax * 0.10);
  const bondRate = BOND_RATES[region]?.[carType] ?? 0.05;
  const bondAmt  = Math.floor(price * bondRate);
  const bondLoss = Math.floor(bondAmt * BOND_DISCOUNT_RATE);
  const totalCost = acqTax + eduTax + bondLoss;
  let rateLabel = (rate * 100) + '%';
  if (carType === '경차') rateLabel = '4% (감면 적용)';
  if (DISCOUNT[carType]) rateLabel = `7% (${(DISCOUNT[carType]/10000).toFixed(0)}만원 감면)`;
  document.getElementById('totalTax').textContent   = (acqTax + eduTax).toLocaleString('ko-KR');
  document.getElementById('r-price').textContent    = fmt(price);
  document.getElementById('r-rate-badge').textContent = rateLabel;
  document.getElementById('r-acq').textContent      = '-' + fmt(acqTax);
  document.getElementById('r-edu').textContent      = '-' + fmt(eduTax);
  document.getElementById('r-bond').textContent     = fmt(bondAmt) + ' 매입';
  document.getElementById('r-bondloss').textContent = '-' + fmt(bondLoss) + ' (약 20% 할인 손실)';
  document.getElementById('r-total').textContent    = fmt(totalCost);
  document.getElementById('r-note').textContent = isUsed
    ? '⚠️ 중고차는 실구매가와 보험개발원 시가표준액 중 높은 금액 기준 과세. 딜러사에서 정확한 금액을 확인하세요.'
    : '⚠️ 신차 취득세는 출고가(VAT 포함) 기준입니다. 딜러 할인가가 아닌 과세표준으로 부과될 수 있습니다.';
  document.getElementById('resultCard').classList.add('visible');
}
</script>
</body>
</html>
