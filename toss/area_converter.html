<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>넓이 변환기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root {
      --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
      --accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;
      --danger:#ff6b6b;--radius:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
    
    .container{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header{text-align:center;margin-bottom:48px}
    .site-name{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:4px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;opacity:.8;display:inline-block}
    .header h1{font-size:clamp(28px,6vw,48px);font-weight:900;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{font-size:14px;color:var(--text-muted)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px}
    .card-title{font-size:14px;font-weight:700;color:var(--text-muted);letter-spacing:1px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
    .input-group{margin-bottom:20px}
    .input-group label{display:block;font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:8px}
    .input-wrapper{position:relative;display:flex;align-items:center}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 52px 14px 16px;font-size:18px;font-weight:700;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;-moz-appearance:textfield}
    .input-wrapper input::-webkit-outer-spin-button,.input-wrapper input::-webkit-inner-spin-button{-webkit-appearance:none}
    .input-wrapper input:focus{border-color:rgba(0,212,170,.5);box-shadow:0 0 0 3px rgba(0,212,170,.08)}
    .input-unit{position:absolute;right:14px;font-size:14px;font-weight:600;color:var(--text-muted)}
    select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;appearance:none;cursor:pointer}
    select:focus{border-color:rgba(0,212,170,.5)}
    .btn{width:100%;padding:18px;border:none;border-radius:12px;font-size:17px;font-weight:800;cursor:pointer;transition:all .2s;font-family:'Noto Sans KR',sans-serif;margin-top:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,212,170,.3)}
    .result-section{display:none}
    .result-section.show{display:block}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,.08),rgba(0,149,255,.05));border:1px solid rgba(0,212,170,.2);border-radius:var(--radius);padding:28px;margin-bottom:20px;text-align:center}
    .result-label{font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:10px}
    .result-value{font-size:clamp(28px,5vw,44px);font-weight:900;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:8px}
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    .detail-item{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px}
    .detail-item .di-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .detail-item .di-value{font-size:16px;font-weight:700;color:var(--text)}
    .info-box{background:rgba(0,212,170,.05);border:1px solid rgba(0,212,170,.15);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:13px;color:var(--text-muted);line-height:1.8}
    .info-box strong{color:var(--accent)}
    .two-btn{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn-sub{background:var(--surface2);color:var(--accent);border:1px solid rgba(0,212,170,.3)}
    .btn-sub:hover{background:rgba(0,212,170,.1)}
    @media(max-width:600px){.detail-grid{grid-template-columns:1fr}.two-btn{grid-template-columns:1fr}}

    /* ── 홈 버튼 ── */
    
    
    
    
    
  



































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📐</span>
    <div><h1>넓이 변환기</h1><p>평 ↔ 제곱미터 변환</p></div>
  </div>


<div class="card">
<div class="card-title">📐 평수 입력</div>
<div class="input-group">
<label>평수 (평)</label>
<div class="input-wrapper">
<input id="pyeong" oninput="syncPyeong(this)" placeholder="예: 32" type="text"/>
<span class="input-unit">평</span>
</div>
</div>
<div class="input-group">
<label>제곱미터 (㎡)</label>
<div class="input-wrapper">
<input id="sqm" oninput="syncSqm(this)" placeholder="예: 105.79" type="text"/>
<span class="input-unit">㎡</span>
</div>
</div>
</div>
<div class="card" id="areaResult">
<div class="card-title">📊 변환 결과</div>
<div id="areaResultContent" style="color:#8b949e;font-size:14px;text-align:center;padding:20px">위에 숫자를 입력하면 자동 변환됩니다</div>
</div>
<div class="card">
<div class="card-title">🏠 아파트 평형별 면적 참고표</div>
<table style="width:100%;border-collapse:collapse;font-size:13px">
<thead><tr style="background:#21262d"><th style="padding:10px;border:1px solid #30363d;color:#e6edf3;text-align:left">평형</th><th style="padding:10px;border:1px solid #30363d;color:#e6edf3">공급면적(㎡)</th><th style="padding:10px;border:1px solid #30363d;color:#e6edf3">전용면적(㎡)</th><th style="padding:10px;border:1px solid #30363d;color:#e6edf3">전용면적(평)</th></tr></thead>
<tbody id="areaTable"></tbody>
</table>
</div>


    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/cm_inch" class="toss-nav-item"><span class="ni-emoji">📏</span><span class="ni-label">cm인치</span></a>
      <a href="/rent_yield" class="toss-nav-item"><span class="ni-emoji">🏡</span><span class="ni-label">임대수익률</span></a>
      <a href="/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
      <a href="/realestate" class="toss-nav-item"><span class="ni-emoji">🤝</span><span class="ni-label">중개수수료</span></a>
    </div>
  </div>
</div>
<script>
const AREA_DATA = [
  ['10평형',33.06,16.5,5],['15평형',49.59,33.06,10],['20평형',66.12,49.59,15],
  ['24평형',79.34,59.5,18],['30평형',99.18,79.34,24],['32평형',105.79,84.9,25.7],
  ['33평형',109.09,84.9,25.7],['34평형',112.4,84.9,25.7],['40평형',132.23,109.09,33],
  ['43평형',142.15,114.9,34.8],['50평형',165.29,132.23,40],['59평형',195.04,164.46,49.7],
];
const tbody = document.getElementById('areaTable');
AREA_DATA.forEach(([name,supply,excl,ep])=>{
  tbody.innerHTML+=`<tr><td style="padding:9px 10px;border:1px solid #30363d;color:#8b949e">${name}</td><td style="padding:9px;border:1px solid #30363d;color:#8b949e;text-align:center">${supply}</td><td style="padding:9px;border:1px solid #30363d;color:#8b949e;text-align:center">${excl}</td><td style="padding:9px;border:1px solid #30363d;color:#8b949e;text-align:center">${ep}평</td></tr>`;
});

function fmtN(n,d=2){return isNaN(n)?'':Number(n.toFixed(d)).toLocaleString('ko-KR');}

function syncPyeong(el){
  const v=parseFloat(el.value.replace(/,/g,''));
  document.getElementById('sqm').value=isNaN(v)?'':(v*3.30579).toFixed(2);
  renderArea();
}
function syncSqm(el){
  const v=parseFloat(el.value.replace(/,/g,''));
  document.getElementById('pyeong').value=isNaN(v)?'':(v/3.30579).toFixed(2);
  renderArea();
}
function renderArea(){
  const py=parseFloat(document.getElementById('pyeong').value)||0;
  const sq=parseFloat(document.getElementById('sqm').value)||0;
  if(!py&&!sq){document.getElementById('areaResultContent').innerHTML='<span style="color:#8b949e;font-size:14px">위에 숫자를 입력하면 자동 변환됩니다</span>';return;}
  document.getElementById('areaResultContent').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
      <div style="background:#21262d;border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:11px;color:#8b949e;margin-bottom:6px">평수</div>
        <div style="font-size:22px;font-weight:900;color:#00d4aa">${fmtN(py,2)}<span style="font-size:14px"> 평</span></div>
      </div>
      <div style="background:#21262d;border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:11px;color:#8b949e;margin-bottom:6px">제곱미터</div>
        <div style="font-size:22px;font-weight:900;color:#00d4aa">${fmtN(sq,2)}<span style="font-size:14px"> ㎡</span></div>
      </div>
      <div style="background:#21262d;border-radius:10px;padding:16px;text-align:center">
        <div style="font-size:11px;color:#8b949e;margin-bottom:6px">평형 참고</div>
        <div style="font-size:22px;font-weight:900;color:#e6edf3">약 ${Math.round(py)}<span style="font-size:14px"> 평형</span></div>
      </div>
    </div>`;
}
</script>
</body>
</html>
