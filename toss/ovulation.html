<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>배란일 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--warn:#f5a623;--pink:#ff6b9d;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:28px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--pink),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badges{text-align:center;margin-bottom:16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .badge{padding:3px 12px;background:rgba(255,107,157,0.1);border:1px solid rgba(255,107,157,0.25);border-radius:20px;font-size:11px;color:var(--pink);font-weight:700}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--pink)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--pink)}
    select option{background:var(--surface2)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pink),var(--accent));border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(255,107,157,0.08),rgba(0,212,170,0.05));border:1px solid rgba(255,107,157,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .result-item{background:var(--surface2);border-radius:12px;padding:16px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
    .result-item-value{font-size:18px;font-weight:700}
    .result-item-value.pink{color:var(--pink)}
    .result-item-value.accent{color:var(--accent)}
    .result-item-value.warn{color:var(--warn)}
    .calendar{background:var(--surface2);border-radius:12px;padding:16px;margin-top:4px}
    .calendar h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:14px}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-day{height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:500;cursor:default}
    .cal-day.header{color:var(--text-muted);font-size:11px;font-weight:700;height:24px}
    .cal-day.menstrual{background:rgba(255,107,157,0.2);color:var(--pink)}
    .cal-day.fertile{background:rgba(0,212,170,0.15);color:var(--accent)}
    .cal-day.ovulation{background:linear-gradient(135deg,var(--pink),var(--accent));color:#fff;font-weight:900;transform:scale(1.1)}
    .cal-day.today{outline:2px solid var(--warn);outline-offset:1px}
    .cal-day.other-month{opacity:.3}
    .legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--text-muted)}
    .legend-item{display:flex;align-items:center;gap:4px}
    .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
    .notice{background:rgba(255,107,157,0.06);border:1px solid rgba(255,107,157,0.2);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text-muted);margin-bottom:16px;line-height:1.7}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--pink);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  












    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📆</span>
    <div><h1>배란일 계산기</h1><p>배란일·가임기 계산</p></div>
  </div>



<div class="badges"><span class="badge">🌸 여성 건강</span><span class="badge">임신 준비</span><span class="badge">생리 주기 분석</span></div>
<div class="notice">⚠️ 이 계산기는 평균 주기를 기반으로 한 참고용 계산입니다. 실제 배란일은 개인차가 있으며, 의학적 진단을 대체하지 않습니다.</div>
<div class="card">
<h2>🗓️ 생리 주기 정보</h2>
<div class="form-group">
<label>마지막 생리 시작일</label>
<input id="lastPeriod" type="date"/>
</div>
<div class="row2">
<div class="form-group">
<label>평균 생리 주기 (일)</label>
<select id="cycle">
<option value="21">21일</option>
<option value="22">22일</option>
<option value="23">23일</option>
<option value="24">24일</option>
<option value="25">25일</option>
<option value="26">26일</option>
<option value="27">27일</option>
<option selected="" value="28">28일 (평균)</option>
<option value="29">29일</option>
<option value="30">30일</option>
<option value="31">31일</option>
<option value="32">32일</option>
<option value="33">33일</option>
<option value="34">34일</option>
<option value="35">35일</option>
</select>
</div>
<div class="form-group">
<label>생리 기간 (일)</label>
<select id="duration">
<option value="3">3일</option>
<option value="4">4일</option>
<option selected="" value="5">5일 (평균)</option>
<option value="6">6일</option>
<option value="7">7일</option>
</select>
</div>
</div>
<button class="btn" onclick="calc()">배란일 계산하기</button>
</div>
<div class="result-card" id="result">
<div class="result-grid">
<div class="result-item">
<div class="result-item-label">🌸 배란 예정일</div>
<div class="result-item-value pink" id="r-ovulation">-</div>
</div>
<div class="result-item">
<div class="result-item-label">💚 가임기 시작</div>
<div class="result-item-value accent" id="r-fertile-start">-</div>
</div>
<div class="result-item">
<div class="result-item-label">💚 가임기 종료</div>
<div class="result-item-value accent" id="r-fertile-end">-</div>
</div>
<div class="result-item">
<div class="result-item-label">📅 다음 생리 예정</div>
<div class="result-item-value warn" id="r-next-period">-</div>
</div>
</div>
<div class="calendar">
<h3>📅 이번 달 캘린더</h3>
<div class="cal-grid" id="calGrid"></div>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:rgba(255,107,157,0.4)"></div>생리 기간</div>
<div class="legend-item"><div class="legend-dot" style="background:rgba(0,212,170,0.3)"></div>가임기</div>
<div class="legend-item"><div class="legend-dot" style="background:linear-gradient(135deg,#ff6b9d,#00d4aa)"></div>배란 예정일</div>
<div class="legend-item"><div class="legend-dot" style="outline:2px solid #f5a623;background:transparent"></div>오늘</div>
</div>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/pregnancy" class="toss-nav-item"><span class="ni-emoji">🤱</span><span class="ni-label">임신</span></a>
      <a href="/age" class="toss-nav-item"><span class="ni-emoji">🎂</span><span class="ni-label">나이</span></a>
      <a href="/dday" class="toss-nav-item"><span class="ni-emoji">⏳</span><span class="ni-label">D-Day</span></a>
      <a href="/date_diff" class="toss-nav-item"><span class="ni-emoji">📅</span><span class="ni-label">날짜차이</span></a>
    </div>
  </div>
</div>
<script>
const fmtDate = d => `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
const fmtShort = d => `${d.getMonth()+1}/${d.getDate()}`;
const addDays = (d, n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const isSameDay = (a, b) => a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();

function calc() {
  const lp = document.getElementById('lastPeriod').value;
  if (!lp) { alert('마지막 생리 시작일을 입력해주세요.'); return; }

  const lastPeriod = new Date(lp);
  const cycle     = +document.getElementById('cycle').value;
  const duration  = +document.getElementById('duration').value;

  // 배란일 = 다음 생리 예정일 - 14일
  const nextPeriod  = addDays(lastPeriod, cycle);
  const ovulation   = addDays(nextPeriod, -14);
  const fertileStart = addDays(ovulation, -5);
  const fertileEnd  = addDays(ovulation, 1);

  document.getElementById('r-ovulation').textContent    = fmtDate(ovulation);
  document.getElementById('r-fertile-start').textContent = fmtDate(fertileStart);
  document.getElementById('r-fertile-end').textContent   = fmtDate(fertileEnd);
  document.getElementById('r-next-period').textContent   = fmtDate(nextPeriod);

  // 캘린더 생성
  drawCalendar(lastPeriod, duration, fertileStart, fertileEnd, ovulation);
}

function drawCalendar(lastPeriod, duration, fertileStart, fertileEnd, ovulation) {
  const today = new Date();
  const year  = lastPeriod.getMonth() === today.getMonth() ? today.getFullYear() : lastPeriod.getFullYear();
  const month = lastPeriod.getMonth() === today.getMonth() ? today.getMonth()    : lastPeriod.getMonth();

  const firstDay = new Date(year, month, 1);
  const lastDay  = new Date(year, month+1, 0);
  const grid     = document.getElementById('calGrid');
  if (!grid) return;

  // 요일 헤더
  const days = ['일','월','화','수','목','금','토'];
  let html = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // 빈 칸
  for (let i = 0; i < firstDay.getDay(); i++) html += '<div></div>';

  for (let d = 1; d <= lastDay.getDate(); d++) {
    const cur = new Date(year, month, d);
    let cls = 'cal-day';
    let style = '';

    // 생리 기간
    const periodEnd = new Date(lastPeriod); periodEnd.setDate(lastPeriod.getDate() + duration - 1);
    if (cur >= lastPeriod && cur <= periodEnd) style = 'background:rgba(255,107,157,0.35)';

    // 가임기
    if (cur >= fertileStart && cur <= fertileEnd) style = 'background:rgba(0,212,170,0.25)';

    // 배란일
    if (isSameDay(cur, ovulation)) style = 'background:linear-gradient(135deg,rgba(255,107,157,0.6),rgba(0,212,170,0.5));font-weight:900';

    // 오늘
    const todayOutline = isSameDay(cur, today) ? ';outline:2px solid #f5a623;border-radius:50%' : '';

    html += `<div class="${cls}" style="${style}${todayOutline}">${d}</div>`;
  }

  grid.innerHTML = html;
}

// 오늘 날짜 기본값
document.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  document.getElementById('lastPeriod').value = `${y}-${m}-01`;
});
</script>
</body>
</html>
