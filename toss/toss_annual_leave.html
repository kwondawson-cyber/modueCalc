<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>연차 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 60px 13px 16px;font-size:20px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .select-wrapper select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;cursor:pointer}
    .info-box{background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.15);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.8}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}.result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-highlight{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.3);border-radius:var(--radius);padding:24px 28px;text-align:center;margin-bottom:16px}
    .r-label{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;margin-bottom:8px}
    .r-amount{font-family:'Montserrat',sans-serif;font-size:clamp(34px,7vw,50px);font-weight:900;color:#fff}
    .r-amount span{font-size:18px;color:var(--text-muted)}
    .r-sub{font-size:13px;color:var(--text-muted);margin-top:6px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .detail-item .d-label{color:var(--text-muted)}
    .detail-item .d-value{font-weight:700}.detail-item .d-value.accent{color:var(--accent)}
    .annual-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
    .annual-table th{text-align:left;padding:8px 10px;color:var(--text-muted);font-size:11px;font-weight:600;border-bottom:1px solid var(--border)}
    .annual-table td{padding:10px;border-bottom:1px solid rgba(48,54,61,0.5)}
    .annual-table tr:last-child td{border-bottom:none}
    .annual-table tr.current td{background:rgba(0,212,170,0.07);color:var(--accent);font-weight:700}
    @media(max-width:480px){.card{padding:20px 16px}.input-row{grid-template-columns:1fr}}

    /* ── 홈 버튼 ── */
    
    
    
    
    
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🌴</span>
    <div><h1>연차 계산기</h1><p>연차 발생일수 자동 계산</p></div>
  </div>



<div class="card">
<div class="card-title">급여 정보</div>
<div class="input-group">
<label>월 기본급</label>
<div class="input-wrapper"><input id="monthly" type="number" value="3000000"/><span class="input-unit">원</span></div>
</div>
<div class="input-row">
<div class="input-group">
<label>미사용 연차 일수</label>
<div class="input-wrapper"><input id="unusedDays" max="25" min="1" type="number" value="5"/><span class="input-unit">일</span></div>
</div>
<div class="input-group">
<label>근속 연수</label>
<div class="select-wrapper">
<select id="years">
<option value="0">1년 미만</option>
<option selected="" value="1">1년 이상</option>
<option value="3">3년 이상</option>
<option value="5">5년 이상</option>
<option value="7">7년 이상</option>
<option value="10">10년 이상</option>
</select>
</div>
</div>
</div>
<div class="info-box">📌 1일 통상임금 = 월급 ÷ 209시간 × 8시간 (하루 소정근로시간 기준)</div>
<button class="calc-btn" onclick="calculate()">📋 연차수당 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-highlight">
<div class="r-label">미사용 연차수당</div>
<div class="r-amount" id="r-amount">-<span>원</span></div>
<div class="r-sub" id="r-sub">-</div>
</div>
<div class="card">
<div class="card-title">계산 상세</div>
<div class="detail-item"><span class="d-label">월 기본급</span><span class="d-value" id="d-monthly">-</span></div>
<div class="detail-item"><span class="d-label">시간당 통상임금</span><span class="d-value" id="d-hourly">-</span></div>
<div class="detail-item"><span class="d-label">1일 통상임금</span><span class="d-value" id="d-daily">-</span></div>
<div class="detail-item"><span class="d-label">미사용 연차</span><span class="d-value" id="d-unused">-</span></div>
<div class="detail-item"><span class="d-label">연차수당</span><span class="d-value accent" id="d-pay">-</span></div>
</div>
<div class="card">
<div class="card-title">연차 발생 기준표</div>
<table class="annual-table">
<thead><tr><th>근속연수</th><th>연차 일수</th></tr></thead>
<tbody id="annualBody"></tbody>
</table>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
      <a href="/toss/weekly_holiday" class="toss-nav-item"><span class="ni-emoji">📅</span><span class="ni-label">주휴수당</span></a>
      <a href="/toss/parental_leave" class="toss-nav-item"><span class="ni-emoji">👶</span><span class="ni-label">육아휴직</span></a>
      <a href="/toss/unemployment" class="toss-nav-item"><span class="ni-emoji">📋</span><span class="ni-label">실업급여</span></a>
    </div>
  </div>
</div>
<script>
const annualDays=[
    {label:'1년 미만',days:'월 1일 (최대 11일)',y:0},
    {label:'1~2년',days:'15일',y:1},
    {label:'3~4년',days:'16일',y:3},
    {label:'5~6년',days:'17일',y:5},
    {label:'7~8년',days:'18일',y:7},
    {label:'9~10년',days:'19일',y:9},
    {label:'10년 이상',days:'최대 25일',y:10},
  ];
  function fmt(n){return Math.round(n).toLocaleString('ko-KR')}
  function calculate(){
    const monthly=parseFloat(document.getElementById('monthly').value)||0;
    const unused=parseFloat(document.getElementById('unusedDays').value)||0;
    const years=parseInt(document.getElementById('years').value);
    const hourly=monthly/209;
    const daily=hourly*8;
    const pay=daily*unused;
    document.getElementById('r-amount').innerHTML=`${fmt(pay)}<span>원</span>`;
    document.getElementById('r-sub').textContent=`1일 통상임금 ${fmt(daily)}원 × ${unused}일`;
    document.getElementById('d-monthly').textContent=`${fmt(monthly)}원`;
    document.getElementById('d-hourly').textContent=`${fmt(hourly)}원`;
    document.getElementById('d-daily').textContent=`${fmt(daily)}원`;
    document.getElementById('d-unused').textContent=`${unused}일`;
    document.getElementById('d-pay').textContent=`${fmt(pay)}원`;
    const currentY=parseInt(document.getElementById('years').value);
    document.getElementById('annualBody').innerHTML=annualDays.map(r=>`
      <tr class="${r.y===currentY?'current':''}"><td>${r.label}</td><td>${r.days}</td></tr>`).join('');
    const rc=document.getElementById('resultCard');rc.classList.add('visible');
  }
  window.onload=()=>calculate();
</script>
</body>
</html>
