<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>주휴수당 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 60px 13px 16px;font-size:20px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .input-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    input[type="range"]{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:var(--surface2);outline:none;cursor:pointer;margin-top:8px}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer}
    .info-box{background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.15);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.8}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}.result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
    .s-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
    .s-box.main{border-color:rgba(0,212,170,0.4);background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.04))}
    .s-box .s-label{font-size:11px;color:var(--text-muted);font-weight:600;margin-bottom:6px}
    .s-box .s-value{font-family:'Montserrat',sans-serif;font-size:18px;font-weight:900}
    .s-box.main .s-value{color:var(--accent)}
    .s-box .s-unit{font-size:11px;color:var(--text-muted);margin-top:3px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .detail-item .d-label{color:var(--text-muted)}
    .detail-item .d-value{font-weight:700}.detail-item .d-value.accent{color:var(--accent)}
    .notice{margin-top:16px;padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}.summary-grid{grid-template-columns:1fr}.input-row{grid-template-columns:1fr}}

    /* ── 홈 버튼 ── */
    
    
    
    
    
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📅</span>
    <div><h1>주휴수당 계산기</h1><p>주휴수당 자동 계산</p></div>
  </div>



<div class="card">
<div class="card-title">근무 정보</div>
<div class="input-group">
<label>시급</label>
<div class="input-wrapper"><input id="hourly" type="number" value="10320"/><span class="input-unit">원</span></div>
<input id="hourlySlider" max="30000" min="10320" step="100" type="range" value="10320"/>
</div>
<div class="input-row">
<div class="input-group">
<label>주 근무일수</label>
<div class="input-wrapper"><input id="days" max="6" min="1" type="number" value="5"/><span class="input-unit">일</span></div>
</div>
<div class="input-group">
<label>1일 근무시간</label>
<div class="input-wrapper"><input id="hoursPerDay" max="12" min="1" step="0.5" type="number" value="8"/><span class="input-unit">시간</span></div>
</div>
</div>
<div class="info-box">📌 주 15시간 이상 근무 시 주휴수당 발생 · 2026년 최저시급 <strong style="color:var(--accent)">10,320원</strong></div>
<button class="calc-btn" onclick="calculate()">💰 주휴수당 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="card">
<div class="summary-grid">
<div class="s-box main"><div class="s-label">주휴수당</div><div class="s-value" id="s-holiday">-</div><div class="s-unit">원/주</div></div>
<div class="s-box"><div class="s-label">주급 합계</div><div class="s-value" id="s-weekly">-</div><div class="s-unit">원</div></div>
<div class="s-box"><div class="s-label">실질 시급</div><div class="s-value" id="s-real" style="color:#ffd54f">-</div><div class="s-unit">원</div></div>
</div>
<div class="detail-item"><span class="d-label">주 근무시간</span><span class="d-value" id="d-hours">-</span></div>
<div class="detail-item"><span class="d-label">주휴시간</span><span class="d-value" id="d-holiday-h">-</span></div>
<div class="detail-item"><span class="d-label">근무수당</span><span class="d-value" id="d-work">-</span></div>
<div class="detail-item"><span class="d-label">주휴수당</span><span class="d-value accent" id="d-holiday">-</span></div>
<div class="detail-item"><span class="d-label">월 환산 급여 (4.345주)</span><span class="d-value accent" id="d-monthly">-</span></div>
</div>
<div class="notice">⚠️ 주 15시간 미만 근무 시 주휴수당이 발생하지 않습니다. 단시간 근로자도 15시간 이상이면 적용됩니다.</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/hourly_salary" class="toss-nav-item"><span class="ni-emoji">⏰</span><span class="ni-label">시급</span></a>
      <a href="/part_time_cost" class="toss-nav-item"><span class="ni-emoji">🧑‍💼</span><span class="ni-label">알바비용</span></a>
      <a href="/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
      <a href="/annual_leave" class="toss-nav-item"><span class="ni-emoji">🌴</span><span class="ni-label">연차</span></a>
    </div>
  </div>
</div>
<script>
document.getElementById('hourlySlider').addEventListener('input',e=>{document.getElementById('hourly').value=e.target.value});
  document.getElementById('hourly').addEventListener('input',e=>{document.getElementById('hourlySlider').value=e.target.value});
  function fmt(n){return Math.round(n).toLocaleString('ko-KR')}
  function calculate(){
    const hourly=parseFloat(document.getElementById('hourly').value)||0;
    const days=parseFloat(document.getElementById('days').value)||0;
    const hpd=parseFloat(document.getElementById('hoursPerDay').value)||0;
    const weekHours=days*hpd;
    if(weekHours<15){alert('주 15시간 미만은 주휴수당이 발생하지 않습니다.');return;}
    const holidayHours=Math.min(hpd,8); // 1일 소정근로시간
    const holidayPay=hourly*holidayHours;
    const workPay=hourly*weekHours;
    const weeklyTotal=workPay+holidayPay;
    const realHourly=weeklyTotal/weekHours;
    const monthly=weeklyTotal*4.345;
    document.getElementById('s-holiday').textContent=fmt(holidayPay);
    document.getElementById('s-weekly').textContent=fmt(weeklyTotal);
    document.getElementById('s-real').textContent=fmt(realHourly);
    document.getElementById('d-hours').textContent=`${weekHours}시간`;
    document.getElementById('d-holiday-h').textContent=`${holidayHours}시간`;
    document.getElementById('d-work').textContent=`${fmt(workPay)}원`;
    document.getElementById('d-holiday').textContent=`${fmt(holidayPay)}원`;
    document.getElementById('d-monthly').textContent=`${fmt(monthly)}원`;
    const rc=document.getElementById('resultCard');rc.classList.add('visible');
  }
  window.onload=()=>calculate();
</script>
</body>
</html>
