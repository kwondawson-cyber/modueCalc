<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>연차 계산기 (HR용)</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:32px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badge{display:inline-block;padding:3px 10px;background:rgba(0,149,255,0.15);border:1px solid rgba(0,149,255,0.3);border-radius:20px;font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .btn-sm{padding:8px 16px;font-size:13px;border:none;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:700;background:var(--surface2);color:var(--text);transition:all .2s}
    .btn-sm:hover{background:rgba(0,212,170,0.15);color:var(--accent)}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:40px;font-weight:900;color:var(--accent)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:16px}
    .result-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .result-item-value{font-size:18px;font-weight:700;color:var(--text)}
    .result-item-value.warn{color:var(--danger)}
    .usage-log{background:var(--surface2);border-radius:12px;padding:16px;margin-top:16px}
    .usage-log h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .log-row:last-child{border-bottom:none}
    .log-type{padding:3px 8px;border-radius:6px;font-size:11px;font-weight:700}
    .log-type.full{background:rgba(0,212,170,0.15);color:var(--accent)}
    .log-type.half{background:rgba(0,149,255,0.15);color:var(--accent2)}
    .log-del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:0 4px}
    .add-row{display:flex;gap:8px;margin-top:12px;align-items:center}
    .add-row input{flex:1;margin:0}
    .progress-wrap{margin-top:16px}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);margin-bottom:6px}
    .progress-bar{background:var(--surface2);border-radius:8px;height:12px;overflow:hidden}
    .progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s}
    .schedule-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}
    .schedule-table th{background:var(--surface2);padding:8px 10px;text-align:center;color:var(--text-muted);font-weight:600;border:1px solid var(--border)}
    .schedule-table td{padding:8px 10px;text-align:center;border:1px solid var(--border);color:var(--text)}
    .schedule-table tr:hover td{background:rgba(0,212,170,0.04)}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr 1fr}.row2{grid-template-columns:1fr}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🌴</span>
    <div><h1>연차 계산기 (HR용)</h1><p>인사담당자용 연차 관리</p></div>
  </div>



<div style="text-align:center"><span class="badge">👔 인사담당자용</span></div>
<div class="card">
<h2>👤 직원 정보</h2>
<div class="row2">
<div class="form-group">
<label>입사일</label>
<input id="hireDate" type="date"/>
</div>
<div class="form-group">
<label>기준일 (오늘)</label>
<input id="baseDate" type="date"/>
</div>
</div>
<div class="form-group">
<label>연차 제도</label>
<select id="system">
<option value="labor">근로기준법 (입사일 기준)</option>
<option value="calendar">회계연도 기준 (1월 1일)</option>
</select>
</div>
<button class="btn" onclick="calcAnnual()">연차 계산</button>
</div>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">잔여 연차</div>
<div class="result-value" id="rRemain">0일</div>
<div class="result-sub" id="rSub"></div>
</div>
<div class="result-grid">
<div class="result-item"><div class="result-item-label">총 발생 연차</div><div class="result-item-value" id="rTotal">-</div></div>
<div class="result-item"><div class="result-item-label">사용 연차</div><div class="result-item-value" id="rUsed">-</div></div>
<div class="result-item"><div class="result-item-label">잔여 연차</div><div class="result-item-value" id="rLeft">-</div></div>
</div>
<div class="progress-wrap">
<div class="progress-label"><span>사용률</span><span id="rPct">0%</span></div>
<div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>
<!-- 연차 사용 입력 -->
<div class="usage-log" style="margin-top:20px">
<h3>✏️ 연차 사용 입력 (반차 포함)</h3>
<div id="logList"></div>
<div class="add-row">
<input id="addDate" style="flex:2" type="date"/>
<select id="addType" style="flex:1.2">
<option value="1">연차 (1일)</option>
<option value="0.5">반차 (0.5일)</option>
</select>
<button class="btn-sm" onclick="addLog()">추가</button>
</div>
</div>
<!-- 연도별 발생 스케줄 -->
<div style="margin-top:20px">
<div style="font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:8px">📋 연도별 연차 발생 내역</div>
<table class="schedule-table"><thead><tr><th>연도</th><th>발생 시점</th><th>발생 일수</th></tr></thead><tbody id="scheduleBody"></tbody></table>
</div>
</div>

    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/annual_leave" class="toss-nav-item"><span class="ni-emoji">🌴</span><span class="ni-label">연차</span></a>
      <a href="/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
      <a href="/weekly_holiday" class="toss-nav-item"><span class="ni-emoji">📅</span><span class="ni-label">주휴수당</span></a>
      <a href="/retirement" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">퇴직금</span></a>
    </div>
  </div>
</div>
<script>
let logs = []; // {date, type(1|0.5)}

function calcAnnual() {
  const hire = new Date(document.getElementById('hireDate').value);
  const base = new Date(document.getElementById('baseDate').value);
  if (!hire || !base || isNaN(hire) || isNaN(base)) { alert('날짜를 입력해주세요.'); return; }
  if (base < hire) { alert('기준일이 입사일보다 이릅니다.'); return; }

  const schedule = getSchedule(hire, base);
  const total = schedule.reduce((s, r) => s + r.days, 0);
  const used = logs.reduce((s, l) => s + l.type, 0);
  const remain = Math.max(total - used, 0);
  const pct = total > 0 ? Math.round(used / total * 100) : 0;

  const diffMs = base - hire;
  const months = Math.floor(diffMs / (1000 * 60 * 60 * 24 * 30.44));
  const years  = Math.floor(months / 12);
  document.getElementById('rRemain').textContent = remain + '일';
  document.getElementById('rSub').textContent = `입사 ${years}년 ${months % 12}개월차`;
  document.getElementById('rTotal').textContent = total + '일';
  document.getElementById('rUsed').textContent = used + '일';
  document.getElementById('rLeft').textContent = remain + '일';
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';

  renderLog();
  renderSchedule(schedule);
  document.getElementById('result').classList.add('show');
}

function getSchedule(hire, base) {
  const rows = [];
  const diffMs = base - hire;
  const totalDays = Math.floor(diffMs / 86400000);
  const totalMonths = Math.floor(totalDays / 30.44);

  // 1년 미만: 월 1일
  const firstYearMonths = Math.min(totalMonths, 11);
  if (firstYearMonths > 0) {
    for (let m = 1; m <= firstYearMonths; m++) {
      const d = new Date(hire);
      d.setMonth(d.getMonth() + m);
      if (d <= base) rows.push({ label: `${m}개월차`, date: fmtDate(d), days: 1 });
    }
  }
  // 1년 이상: 연 발생
  if (totalDays >= 365) {
    for (let y = 1; y <= 30; y++) {
      const d = new Date(hire);
      d.setFullYear(d.getFullYear() + y);
      if (d > base) break;
      const extra = y >= 3 ? Math.floor((y - 1) / 2) : 0;
      const days = Math.min(15 + extra, 25);
      rows.push({ label: `${y}년차`, date: fmtDate(d), days });
    }
  }
  return rows;
}

function fmtDate(d) { return d.toISOString().split('T')[0]; }

function renderLog() {
  const el = document.getElementById('logList');
  if (!logs.length) { el.innerHTML = '<div style="font-size:12px;color:var(--text-muted);padding:8px 0">사용 내역이 없습니다.</div>'; return; }
  el.innerHTML = logs.map((l, i) => `
    <div class="log-row">
      <span>${l.date}</span>
      <span class="log-type ${l.type === 1 ? 'full' : 'half'}">${l.type === 1 ? '연차' : '반차'}</span>
      <span>${l.type}일</span>
      <button class="log-del" onclick="delLog(${i})">✕</button>
    </div>`).join('');
}

function renderSchedule(rows) {
  document.getElementById('scheduleBody').innerHTML = rows.map(r =>
    `<tr><td>${r.label}</td><td>${r.date}</td><td><strong>${r.days}일</strong></td></tr>`
  ).join('');
}

function addLog() {
  const date = document.getElementById('addDate').value;
  const type = +document.getElementById('addType').value;
  if (!date) { alert('날짜를 선택해주세요.'); return; }
  logs.push({ date, type });
  logs.sort((a, b) => a.date.localeCompare(b.date));
  calcAnnual();
}

function delLog(i) {
  logs.splice(i, 1);
  calcAnnual();
}

// 오늘 날짜 기본값
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('baseDate').value = new Date().toISOString().split('T')[0];
});
</script>
</body>
</html>
