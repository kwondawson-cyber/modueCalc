<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>수면 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:36px}
    .header h1{font-size:clamp(26px,6vw,40px);font-weight:900;line-height:1.15;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .tab-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px}
    .tab-btn{padding:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:13px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .2s}
    .tab-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4);color:var(--accent)}
    .input-group{margin-bottom:20px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:8px}
    .time-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:28px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s;text-align:center}
    .time-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}
    .result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-title{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:14px;letter-spacing:1px}
    .cycle-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
    .cycle-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px 10px;text-align:center;cursor:default;transition:all .2s}
    .cycle-box.best{border-color:rgba(0,212,170,0.5);background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(0,149,255,0.05))}
    .cycle-box .cyc-label{font-size:10px;color:var(--text-muted);font-weight:600;margin-bottom:5px}
    .cycle-box .cyc-time{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:900;color:var(--text)}
    .cycle-box.best .cyc-time{color:var(--accent)}
    .cycle-box .cyc-cycle{font-size:11px;color:var(--text-muted);margin-top:4px}
    .cycle-box.best .cyc-cycle{color:rgba(0,212,170,0.8)}
    .notice{margin-top:12px;padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}.cycle-grid{grid-template-columns:repeat(2,1fr)}}
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">😴</span>
    <div><h1>수면 계산기</h1><p>기상시간·취침시간 계산</p></div>
  </div>



<div class="card">
<div class="card-title">계산 방식 선택</div>
<div class="tab-group">
<button class="tab-btn active" id="tab-wake" onclick="setMode('wake')">⏰ 기상 시간으로<br/>취침 시간 계산</button>
<button class="tab-btn" id="tab-sleep" onclick="setMode('sleep')">🌙 취침 시간으로<br/>기상 시간 계산</button>
</div>
<div class="input-group">
<label id="time-label">몇 시에 일어나야 하나요?</label>
<input class="time-input" id="timeInput" type="time" value="07:00"/>
</div>
<button class="calc-btn" onclick="calculate()">😴 최적 수면 시간 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="card">
<div class="result-title" id="result-title">💤 추천 취침 시간 (수면 사이클 기준)</div>
<div class="cycle-grid" id="cycleGrid"></div>
<div class="notice" id="result-notice">
        잠드는 데 평균 <strong>15분</strong>이 소요된다고 가정했습니다. 수면 사이클은 약 <strong>90분</strong>이며, 사이클이 끊기지 않는 시간에 일어나야 가장 개운합니다.
      </div>
</div>
</div>

    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/age" class="toss-nav-item"><span class="ni-emoji">🎂</span><span class="ni-label">나이</span></a>
      <a href="/dday" class="toss-nav-item"><span class="ni-emoji">⏳</span><span class="ni-label">D-Day</span></a>
      <a href="/bmi" class="toss-nav-item"><span class="ni-emoji">⚖️</span><span class="ni-label">BMI</span></a>
      <a href="/bmr" class="toss-nav-item"><span class="ni-emoji">🔥</span><span class="ni-label">기초대사량</span></a>
    </div>
  </div>
</div>
<script>
let mode = 'wake'; // wake: 기상→취침, sleep: 취침→기상

  function setMode(m) {
    mode = m;
    document.getElementById('tab-wake').classList.toggle('active', m === 'wake');
    document.getElementById('tab-sleep').classList.toggle('active', m === 'sleep');
    document.getElementById('time-label').textContent = m === 'wake'
      ? '몇 시에 일어나야 하나요?'
      : '몇 시에 잠자리에 드나요?';
    document.getElementById('resultCard').classList.remove('visible');
  }

  function fmtTime(totalMins) {
    let h = Math.floor(((totalMins % 1440) + 1440) % 1440 / 60);
    let m = ((totalMins % 1440) + 1440) % 1440 % 60;
    const ampm = h < 12 ? '오전' : '오후';
    let h12 = h % 12 || 12;
    return `${ampm} ${h12}:${String(m).padStart(2,'0')}`;
  }

  function calculate() {
    const val = document.getElementById('timeInput').value;
    if (!val) return;
    const [hh, mm] = val.split(':').map(Number);
    const baseMin = hh * 60 + mm;
    const fallAsleepMin = 15; // 잠드는 데 걸리는 시간
    const cycleMin = 90;

    const grid = document.getElementById('cycleGrid');
    grid.innerHTML = '';

    // 최적 사이클: 5~6개 권장 (7.5h~9h)
    const cycles = mode === 'wake'
      ? [6, 5, 4, 3, 2]   // 취침 시간 = 기상 - (사이클×90 + 15)
      : [2, 3, 4, 5, 6];  // 기상 시간 = 취침 + 사이클×90 + 15

    cycles.forEach((cyc, idx) => {
      const totalSleepMin = cyc * cycleMin;
      let targetMin;
      if (mode === 'wake') {
        targetMin = baseMin - totalSleepMin - fallAsleepMin;
      } else {
        targetMin = baseMin + totalSleepMin + fallAsleepMin;
      }

      const box = document.createElement('div');
      const isBest = cyc === 5 || cyc === 6;
      box.className = 'cycle-box' + (isBest && idx < 2 ? ' best' : '');

      const h = Math.floor(totalSleepMin / 60);
      const m = totalSleepMin % 60;
      const sleepStr = m === 0 ? `${h}시간` : `${h}시간 ${m}분`;

      box.innerHTML = `
        <div class="cyc-label">${cyc}사이클 · ${sleepStr}</div>
        <div class="cyc-time">${fmtTime(targetMin)}</div>
        <div class="cyc-cycle">${isBest && idx < 2 ? '✅ 추천' : (cyc >= 5 ? '양호' : '짧음')}</div>
      `;
      grid.appendChild(box);
    });

    const titleEl = document.getElementById('result-title');
    titleEl.textContent = mode === 'wake'
      ? '💤 추천 취침 시간 (이 시간에 잠드세요)'
      : '⏰ 추천 기상 시간 (이 시간에 일어나세요)';

    document.getElementById('resultCard').classList.add('visible');
  }

  window.onload = () => {};
</script>
</body>
</html>
