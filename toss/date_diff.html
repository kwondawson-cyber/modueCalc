<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>날짜 차이 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
      --border: #30363d; --accent: #00d4aa; --accent2: #0095ff;
      --text: #e6edf3; --text-muted: #8b949e; --danger: #ff6b6b; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    
    .container { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
    
    
    
    
    
    .header{text-align:center;margin-bottom:32px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,36px);font-weight:900;line-height:1.1;margin-bottom:8px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }
    .input-row { display: flex; gap: 12px; align-items: flex-end; margin-bottom: 16px; }
    .input-group { flex: 1; }
    .input-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
    .input-wrapper { position: relative; display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: border-color .2s; }
    .input-wrapper:focus-within { border-color: var(--accent); }
    .input-wrapper input[type="date"] { width: 100%; padding: 12px 14px; font-size: 15px; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Noto Sans KR', sans-serif; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    .swap-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; cursor: pointer; color: var(--accent); font-size: 18px; transition: all .2s; flex-shrink: 0; line-height: 1; }
    .swap-btn:hover { background: rgba(0,212,170,0.1); }
    .today-btn { background: transparent; border: 1px solid var(--accent); border-radius: 8px; padding: 5px 10px; font-size: 11px; color: var(--accent); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 6px; transition: all .2s; }
    .today-btn:hover { background: rgba(0,212,170,0.1); }
    .info-box { background: rgba(0,212,170,0.05); border: 1px solid rgba(0,212,170,0.15); border-radius: 10px; padding: 12px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 16px; }
    .calc-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #00b894); border: none; border-radius: 12px; color: #0d1117; font-size: 16px; font-weight: 900; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all .2s; margin-top: 4px; }
    .calc-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(0,212,170,0.3); }
    .result-card { display: none; }
    .result-card.visible { display: block; }
    .big-result { text-align: center; padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .br-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .br-value { font-family: 'Montserrat', sans-serif; font-size: clamp(42px,10vw,64px); font-weight: 900; color: var(--accent); line-height: 1; }
    .br-unit { font-size: 16px; color: var(--text-muted); margin-top: 6px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .detail-box { background: var(--surface2); border-radius: 12px; padding: 16px; text-align: center; }
    .detail-box .d-val { font-family: 'Montserrat', sans-serif; font-size: 24px; font-weight: 900; color: var(--text); }
    .detail-box .d-lbl { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .detail-item:last-child { border-bottom: none; }
    .d-label { color: var(--text-muted); }
    .d-value { font-weight: 700; color: var(--text); }
    .d-value.accent { color: var(--accent); }
    .breakdown-card { background: var(--surface2); border-radius: 12px; padding: 16px; margin-top: 12px; }
    .breakdown-title { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; font-weight: 600; }
    .breakdown-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; color: var(--text); }
    .breakdown-row span:last-child { color: var(--accent); font-weight: 700; }
    .ad-slot { margin: 16px 0; text-align: center; min-height: 0; background: rgba(255,255,255,0.02); border-radius: 10px; display: flex; align-items: center; justify-content: center; }
  





























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📅</span>
    <div><h1>날짜 차이 계산기</h1><p>두 날짜 사이 일수 계산</p></div>
  </div>



<div class="ad-slot">

</div>
<div class="card">
<div class="card-title">📅 날짜 입력</div>
<div class="input-row">
<div class="input-group">
<label>시작 날짜</label>
<div class="input-wrapper"><input id="startDate" type="date"/></div>
<button class="today-btn" onclick="setToday('startDate')">오늘로 설정</button>
</div>
<button class="swap-btn" onclick="swapDates()" title="날짜 교체">⇄</button>
<div class="input-group">
<label>종료 날짜</label>
<div class="input-wrapper"><input id="endDate" type="date"/></div>
<button class="today-btn" onclick="setToday('endDate')">오늘로 설정</button>
</div>
</div>
<div class="info-box">💡 시작일 포함 여부는 결과 카드에서 확인하세요. 날짜 순서가 바뀌어도 자동 계산됩니다.</div>
<button class="calc-btn" onclick="calcDiff()">📆 날짜 계산하기</button>
</div>
<div class="card result-card" id="resultCard">
<div class="card-title">📊 계산 결과</div>
<div class="big-result">
<div class="br-label">두 날짜 사이</div>
<div class="br-value" id="totalDays">—</div>
<div class="br-unit">일</div>
</div>
<div class="detail-grid">
<div class="detail-box"><div class="d-val" id="r-weeks">—</div><div class="d-lbl">주</div></div>
<div class="detail-box"><div class="d-val" id="r-months">—</div><div class="d-lbl">개월 (약)</div></div>
</div>
<div class="breakdown-card">
<div class="breakdown-title">상세 분해</div>
<div class="breakdown-row"><span>시작일 제외 (기본)</span><span id="r-excl">— 일</span></div>
<div class="breakdown-row"><span>시작일 포함</span><span id="r-incl">— 일</span></div>
<div class="breakdown-row"><span>완전한 주 수</span><span id="r-fullweeks">— 주 + — 일</span></div>
<div class="breakdown-row"><span>연 단위 (약)</span><span id="r-years">— 년</span></div>
</div>
<div style="margin-top:16px;">
<div class="detail-item"><span class="d-label">시작 날짜</span><span class="d-value" id="r-start">—</span></div>
<div class="detail-item"><span class="d-label">종료 날짜</span><span class="d-value" id="r-end">—</span></div>
<div class="detail-item"><span class="d-label">시작 요일</span><span class="d-value accent" id="r-startday">—</span></div>
<div class="detail-item"><span class="d-label">종료 요일</span><span class="d-value accent" id="r-endday">—</span></div>
</div>
</div>
<div class="ad-slot">

</div>

    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/dday" class="toss-nav-item"><span class="ni-emoji">⏳</span><span class="ni-label">D-Day</span></a>
      <a href="/age" class="toss-nav-item"><span class="ni-emoji">🎂</span><span class="ni-label">나이</span></a>
      <a href="/annual_leave" class="toss-nav-item"><span class="ni-emoji">🌴</span><span class="ni-label">연차</span></a>
      <a href="/retirement" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">퇴직금</span></a>
    </div>
  </div>
</div>
<script>
const DAYS = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];

function pad(n){ return String(n).padStart(2,'0'); }

function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function setToday(id){
  document.getElementById(id).value = todayStr();
}

function swapDates(){
  const s = document.getElementById('startDate');
  const e = document.getElementById('endDate');
  [s.value, e.value] = [e.value, s.value];
}

function fmtDate(d){
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

function calcDiff(){
  const sv = document.getElementById('startDate').value;
  const ev = document.getElementById('endDate').value;
  if(!sv || !ev){ alert('두 날짜를 모두 입력하세요.'); return; }

  let s = new Date(sv), e = new Date(ev);
  if(s > e){ [s,e] = [e,s]; }

  const diffMs = e - s;
  const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));
  const inclDays = diffDays + 1;
  const weeks = Math.floor(diffDays / 7);
  const remDays = diffDays % 7;
  const months = (diffDays / 30.44).toFixed(1);
  const years = (diffDays / 365.25).toFixed(2);

  document.getElementById('totalDays').textContent = diffDays.toLocaleString();
  document.getElementById('r-weeks').textContent = Math.floor(diffDays / 7).toLocaleString();
  document.getElementById('r-months').textContent = months;
  document.getElementById('r-excl').textContent = diffDays.toLocaleString() + '일';
  document.getElementById('r-incl').textContent = inclDays.toLocaleString() + '일';
  document.getElementById('r-fullweeks').textContent = `${weeks}주 + ${remDays}일`;
  document.getElementById('r-years').textContent = years + '년';
  document.getElementById('r-start').textContent = fmtDate(s);
  document.getElementById('r-end').textContent = fmtDate(e);
  document.getElementById('r-startday').textContent = DAYS[s.getDay()];
  document.getElementById('r-endday').textContent = DAYS[e.getDay()];

  document.getElementById('resultCard').classList.add('visible');
}

// 기본값: 오늘 ~ 오늘
document.getElementById('startDate').value = todayStr();
document.getElementById('endDate').value = todayStr();



</script>
</body>
</html>
