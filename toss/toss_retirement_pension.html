<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>퇴직연금 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:32px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:900;color:var(--accent)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .result-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .result-item-value{font-size:16px;font-weight:700;color:var(--text)}
    .compare-box{background:var(--surface2);border-radius:12px;padding:16px;margin-top:16px}
    .compare-box h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--text-muted)}
    .compare-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .compare-row:last-child{border-bottom:none}
    .compare-row .label{color:var(--text-muted)}
    .compare-row .val-annuity{color:var(--accent);font-weight:700}
    .compare-row .val-lump{color:var(--accent2);font-weight:700}
    .affiliate-box{background:linear-gradient(135deg,rgba(0,149,255,0.1),rgba(0,212,170,0.06));border:1px solid rgba(0,149,255,0.3);border-radius:12px;padding:18px;margin-top:16px;text-align:center}
    .affiliate-box p{font-size:13px;color:var(--text-muted);margin-bottom:12px}
    .affiliate-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
    .affiliate-btn{display:inline-block;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:800;text-decoration:none;font-family:'Noto Sans KR',sans-serif}
    .affiliate-btn-primary{background:linear-gradient(135deg,var(--accent2),var(--accent));color:#000}
    .affiliate-btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}

    .related-section h2{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text)}
    .related-card:hover{border-color:var(--accent);background:rgba(0,212,170,0.06);transform:translateY(-2px)}
    .related-card .rc-emoji{font-size:22px;display:block;margin-bottom:4px}
    .related-card .rc-name{font-size:12px;font-weight:700;color:var(--text)}
    
    .example-step .num{background:var(--accent);color:#000;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;margin-top:1px}
  
    
    
    
    
    
    
    .example-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .example-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .example-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .highlight-box strong{color:var(--accent)}
    .related-section h2{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text)}
    .related-card:hover{border-color:var(--accent);background:rgba(0,212,170,0.06);transform:translateY(-2px)}
    .related-card .rc-emoji{font-size:22px;display:block;margin-bottom:4px}
    .related-card .rc-name{font-size:12px;font-weight:700;color:var(--text)}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">💎</span>
    <div><h1>퇴직연금 계산기</h1><p>DB·DC·IRP 수령액 계산</p></div>
  </div>



<div class="card">
<h2>📋 퇴직연금 정보</h2>
<div class="row2">
<div class="form-group">
<label>퇴직연금 유형</label>
<select id="type">
<option value="db">DB형 (확정급여)</option>
<option value="dc">DC형 (확정기여)</option>
<option value="irp">IRP (개인형)</option>
</select>
</div>
<div class="form-group">
<label>재직 기간 (년)</label>
<input id="workYears" placeholder="예: 15" type="number"/>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>최종 3개월 평균 월급 (만원)</label>
<input id="salary" placeholder="예: 450" type="number"/>
</div>
<div class="form-group">
<label>연평균 수익률 (%)</label>
<input id="returnRate" placeholder="DC·IRP용" step="0.1" type="number" value="4.0"/>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>연금 수령 기간 (년)</label>
<select id="annuityPeriod">
<option value="10">10년</option>
<option selected="" value="15">15년</option>
<option value="20">20년</option>
<option value="25">25년</option>
</select>
</div>
<div class="form-group">
<label>추가 납입액 (만원, DC·IRP)</label>
<input id="extra" placeholder="연간 추가 납입" type="number" value="0"/>
</div>
</div>
<button class="btn" onclick="calcPension()">계산하기</button>
</div>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">예상 퇴직연금 총액</div>
<div class="result-value" id="rTotal">0만원</div>
<div class="result-sub" id="rSub"></div>
</div>
<div class="result-grid">
<div class="result-item"><div class="result-item-label">월 연금액</div><div class="result-item-value" id="rMonthly">-</div></div>
<div class="result-item"><div class="result-item-label">연간 연금액</div><div class="result-item-value" id="rYearly">-</div></div>
<div class="result-item"><div class="result-item-label">세후 일시금</div><div class="result-item-value" id="rLumpNet">-</div></div>
<div class="result-item"><div class="result-item-label">세후 연금 총액</div><div class="result-item-value" id="rAnnuityNet">-</div></div>
</div>
<div class="compare-box">
<h3>💰 연금 vs 일시금 세금 비교</h3>
<div class="compare-row"><span class="label">수령 방식</span><span class="val-annuity">연금 수령</span><span class="val-lump">일시금</span></div>
<div class="compare-row"><span class="label">세율</span><span class="val-annuity" id="cAnnuityRate">-</span><span class="val-lump" id="cLumpRate">-</span></div>
<div class="compare-row"><span class="label">세금</span><span class="val-annuity" id="cAnnuityTax">-</span><span class="val-lump" id="cLumpTax">-</span></div>
<div class="compare-row"><span class="label">실수령액</span><span class="val-annuity" id="cAnnuityNet">-</span><span class="val-lump" id="cLumpNet">-</span></div>
</div>
<div class="affiliate-box">
<p>💡 퇴직연금 수익률, 운용 전략이 중요합니다. 전문가 상담으로 더 많이 받으세요.</p>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/retirement" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">퇴직금</span></a>
      <a href="/toss/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
      <a href="/toss/pension" class="toss-nav-item"><span class="ni-emoji">👴</span><span class="ni-label">국민연금</span></a>
      <a href="/toss/savings" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">적금</span></a>
    </div>
  </div>
</div>
<script>

</script>
</body>
</html>
