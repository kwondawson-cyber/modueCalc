<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>전월세 전환율 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(24px,5vw,38px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .tab-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
    .tab-btn{padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .2s}
    .tab-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4);color:var(--accent)}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 60px 13px 16px;font-size:20px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none}
    input[type="range"]{width:100%;-webkit-appearance:none;height:4px;border-radius:4px;background:var(--surface2);outline:none;cursor:pointer;margin-top:8px}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--accent);cursor:pointer;box-shadow:0 0 8px rgba(0,212,170,0.5)}
    .slider-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px}
    .info-box{background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.15);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.7}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:4px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}
    .result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-highlight{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.3);border-radius:16px;padding:24px 28px;text-align:center;margin-bottom:16px}
    .r-label{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .r-amount{font-family:'Montserrat',sans-serif;font-size:clamp(34px,7vw,50px);font-weight:900;color:#fff}
    .r-amount span{font-size:18px;color:var(--text-muted)}
    .r-sub{font-size:13px;color:var(--text-muted);margin-top:6px}
    .compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
    .compare-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
    .compare-box .c-label{font-size:11px;color:var(--text-muted);margin-bottom:6px;font-weight:600}
    .compare-box .c-value{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:700}
    .notice{margin-top:16px;padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}.compare-grid{grid-template-columns:1fr}}

    /* ── 홈 버튼 ── */
    
    
    
    
    
  







































    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🔄</span>
    <div><h1>전월세 전환율 계산기</h1><p>전세 ↔ 월세 상호 전환</p></div>
  </div>



<div class="card">
<div class="card-title">전환 방향</div>
<div class="tab-group">
<button class="tab-btn active" id="tab-torent" onclick="setMode('to_rent')">🔑 전세 → 월세</button>
<button class="tab-btn" id="tab-tojeonse" onclick="setMode('to_jeonse')">🏠 월세 → 전세</button>
</div>
<div id="sec-torent">
<div class="input-group">
<label>현재 전세 보증금</label>
<div class="input-wrapper"><input id="jeonse" type="number" value="300000000"/><span class="input-unit">원</span></div>
</div>
<div class="input-group">
<label>월세 전환 시 보증금</label>
<div class="input-wrapper"><input id="newDeposit" type="number" value="50000000"/><span class="input-unit">원</span></div>
</div>
</div>
<div id="sec-tojeonse" style="display:none">
<div class="input-group">
<label>현재 보증금</label>
<div class="input-wrapper"><input id="curDeposit" type="number" value="50000000"/><span class="input-unit">원</span></div>
</div>
<div class="input-group">
<label>월 임대료</label>
<div class="input-wrapper"><input id="monthly" type="number" value="800000"/><span class="input-unit">원</span></div>
</div>
</div>
<div class="input-group">
<label>전월세 전환율</label>
<div class="input-wrapper"><input id="convRate" max="20" min="1" step="0.1" type="number" value="5.5"/><span class="input-unit">%</span></div>
<input id="rateSlider" max="15" min="2" step="0.1" type="range" value="5.5"/>
<div class="slider-labels"><span>2%</span><span>5%</span><span>10%</span><span>15%</span></div>
</div>
<div class="info-box">📌 법정 전월세 전환율 상한: <strong style="color:var(--accent)">기준금리 + 2%</strong> (현행 기준 약 5~6%)</div>
<button class="calc-btn" onclick="calculate()">🔄 전환 금액 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-highlight">
<div class="r-label" id="r-label">전환 월세</div>
<div class="r-amount" id="r-main">-<span id="r-unit">원/월</span></div>
<div class="r-sub" id="r-sub">-</div>
</div>
<div class="card">
<div class="card-title">비교 분석</div>
<div class="compare-grid">
<div class="compare-box">
<div class="c-label" id="c-l1">전세 보증금</div>
<div class="c-value" id="c-v1">-</div>
</div>
<div class="compare-box">
<div class="c-label" id="c-l2">전환 후 월세</div>
<div class="c-value" id="c-v2" style="color:var(--accent)">-</div>
</div>
</div>
<div id="analysisText" style="margin-top:14px;padding:14px;background:var(--surface2);border-radius:10px;font-size:13px;color:var(--text-muted);line-height:1.8"></div>
</div>
<div class="notice">
<strong style="color:orange">⚠️ 안내</strong> 법정 전환율은 주택임대차보호법 기준 상한선입니다. 집주인과 협의하여 결정하며, 법정 상한을 초과할 수 없습니다.
    </div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/jeonse_loan" class="toss-nav-item"><span class="ni-emoji">🏘️</span><span class="ni-label">전세자금대출</span></a>
      <a href="/toss/rent_yield" class="toss-nav-item"><span class="ni-emoji">🏡</span><span class="ni-label">임대수익률</span></a>
      <a href="/toss/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
      <a href="/toss/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
    </div>
  </div>
</div>
<script>
let mode='to_rent';
  document.getElementById('rateSlider').addEventListener('input',e=>{document.getElementById('convRate').value=e.target.value});
  document.getElementById('convRate').addEventListener('input',e=>{document.getElementById('rateSlider').value=e.target.value});

  function setMode(m){
    mode=m;
    document.getElementById('tab-torent').classList.toggle('active',m==='to_rent');
    document.getElementById('tab-tojeonse').classList.toggle('active',m==='to_jeonse');
    document.getElementById('sec-torent').style.display=m==='to_rent'?'block':'none';
    document.getElementById('sec-tojeonse').style.display=m==='to_jeonse'?'block':'none';
  }
  function fmt(n){return Math.round(n).toLocaleString('ko-KR')}

  function calculate(){
    const rate=parseFloat(document.getElementById('convRate').value)/100;
    if(mode==='to_rent'){
      const jeonse=parseFloat(document.getElementById('jeonse').value)||0;
      const newDep=parseFloat(document.getElementById('newDeposit').value)||0;
      const diff=jeonse-newDep;
      const monthlyRent=diff*rate/12;
      document.getElementById('r-label').textContent='전환 월세';
      document.getElementById('r-main').innerHTML=`${fmt(monthlyRent)}<span>원/월</span>`;
      document.getElementById('r-sub').textContent=`전환금액 ${fmt(diff)}원 기준`;
      document.getElementById('c-l1').textContent='전세 보증금';document.getElementById('c-v1').textContent=`${fmt(jeonse)}원`;
      document.getElementById('c-l2').textContent='월세 (보증금'+fmt(newDep)+'원)';document.getElementById('c-v2').textContent=`${fmt(monthlyRent)}원/월`;
      document.getElementById('analysisText').innerHTML=`전세 <strong style="color:var(--text)">${fmt(jeonse)}원</strong>을 보증금 <strong style="color:var(--text)">${fmt(newDep)}원</strong> + 월세 방식으로 전환하면<br>적정 월세는 <strong style="color:var(--accent)">${fmt(monthlyRent)}원</strong>입니다.<br>연간 총 월세 납부액: <strong style="color:var(--text)">${fmt(monthlyRent*12)}원</strong>`;
    } else {
      const dep=parseFloat(document.getElementById('curDeposit').value)||0;
      const monthly=parseFloat(document.getElementById('monthly').value)||0;
      const jeonseVal=dep+monthly*12/rate;
      document.getElementById('r-label').textContent='전세 환산액';
      document.getElementById('r-main').innerHTML=`${fmt(jeonseVal)}<span>원</span>`;
      document.getElementById('r-sub').textContent=`보증금 포함 전세 환산 금액`;
      document.getElementById('c-l1').textContent='현재 보증금+월세';document.getElementById('c-v1').textContent=`${fmt(dep)}원 + ${fmt(monthly)}원/월`;
      document.getElementById('c-l2').textContent='전세 환산액';document.getElementById('c-v2').textContent=`${fmt(jeonseVal)}원`;
      document.getElementById('analysisText').innerHTML=`보증금 <strong style="color:var(--text)">${fmt(dep)}원</strong> + 월세 <strong style="color:var(--text)">${fmt(monthly)}원</strong>을<br>전세로 환산하면 <strong style="color:var(--accent)">${fmt(jeonseVal)}원</strong>에 해당합니다.`;
    }
    const rc=document.getElementById('resultCard');
    rc.classList.add('visible');
  }
  window.onload=()=>calculate();
</script>
</body>
</html>
