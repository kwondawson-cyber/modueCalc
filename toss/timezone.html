<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>시간대 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}.input-comma{font-size:12px;color:var(--accent);margin-top:5px;font-weight:700;min-height:15px;letter-spacing:.3px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px}
    .card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .base-city{display:flex;align-items:center;gap:12px;margin-bottom:20px}
    .base-flag{font-size:28px}
    .base-name{font-size:18px;font-weight:700;color:var(--accent)}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    input[type="datetime-local"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:17px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    input[type="datetime-local"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .calc-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,170,0.3)}
    .now-btn{width:100%;padding:11px;background:transparent;border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;margin-bottom:10px;transition:all .2s}
    .now-btn:hover{border-color:rgba(0,212,170,0.4);color:var(--accent)}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}}
    .city-card{background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;transition:border-color .2s}
    .city-card.base{border-color:rgba(0,212,170,0.4);background:rgba(0,212,170,0.07)}
    .city-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .city-flag{font-size:20px}
    .city-name{font-size:13px;color:var(--text-muted);font-weight:600}
    .city-tz{font-size:10px;color:var(--text-muted);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2px 8px;margin-left:auto}
    .city-time{font-size:26px;font-weight:900;color:var(--text);font-family:'Montserrat',sans-serif}
    .city-date{font-size:12px;color:var(--text-muted);margin-top:3px}
    .city-diff{font-size:11px;color:var(--text-muted);margin-top:2px}
    .city-status{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px}
    .status-work{background:rgba(0,212,170,0.15);color:var(--accent)}
    .status-sleep{background:rgba(100,100,100,0.2);color:var(--text-muted)}
    .status-eve{background:rgba(0,149,255,0.15);color:var(--accent2)}
    /* rel/aff */
    






    
    
    
    
    
  























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🌍</span>
    <div><h1>시간대 계산기</h1><p>세계 시간대 변환</p></div>
  </div>



<div class="card">
<div class="card-title">기준 시간 (서울 / KST)</div>
<div class="base-city">
<span class="base-flag">🇰🇷</span>
<span class="base-name">서울 — KST (UTC+9)</span>
</div>
<button class="now-btn" onclick="setNow()">🕐 현재 시간으로 설정</button>
<div class="input-group">
<label>날짜 및 시간 입력</label>
<input id="seoulTime" type="datetime-local"/>
</div>
<button class="calc-btn" onclick="calc()">🌍 전 세계 시간 변환하기</button>
</div>
<div id="resultSection" style="display:none">
<div class="result-grid" id="cityGrid"></div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/dday" class="toss-nav-item"><span class="ni-emoji">⏳</span><span class="ni-label">D-Day</span></a>
      <a href="/date_diff" class="toss-nav-item"><span class="ni-emoji">📅</span><span class="ni-label">날짜차이</span></a>
      <a href="/age" class="toss-nav-item"><span class="ni-emoji">🎂</span><span class="ni-label">나이</span></a>
      <a href="/sleep" class="toss-nav-item"><span class="ni-emoji">😴</span><span class="ni-label">수면</span></a>
    </div>
  </div>
</div>
<script>
const CITIES = [
    { name: '서울', flag: '🇰🇷', tz: 'Asia/Seoul', base: true },
    { name: '도쿄', flag: '🇯🇵', tz: 'Asia/Tokyo' },
    { name: '베이징', flag: '🇨🇳', tz: 'Asia/Shanghai' },
    { name: '싱가포르', flag: '🇸🇬', tz: 'Asia/Singapore' },
    { name: '두바이', flag: '🇦🇪', tz: 'Asia/Dubai' },
    { name: '런던', flag: '🇬🇧', tz: 'Europe/London' },
    { name: '파리', flag: '🇫🇷', tz: 'Europe/Paris' },
    { name: '뉴욕', flag: '🇺🇸', tz: 'America/New_York' },
    { name: 'LA', flag: '🇺🇸', tz: 'America/Los_Angeles' },
    { name: '시드니', flag: '🇦🇺', tz: 'Australia/Sydney' },
  ];

  function setNow() {
    const now = new Date();
    const offset = now.getTimezoneOffset() * 60000;
    const localISO = new Date(now - offset).toISOString().slice(0, 16);
    document.getElementById('seoulTime').value = localISO;
  }

  function getStatus(h) {
    if (h >= 9 && h < 18) return { label: '업무 시간', cls: 'status-work' };
    if (h >= 18 && h < 22) return { label: '저녁 시간', cls: 'status-eve' };
    return { label: '취침 시간', cls: 'status-sleep' };
  }

  function getTzOffset(tz) {
    const fmt = new Intl.DateTimeFormat('en', { timeZone: tz, timeZoneName: 'short' });
    return fmt;
  }

  function calc() {
    const input = document.getElementById('seoulTime').value;
    if (!input) { alert('날짜와 시간을 입력해주세요.'); return; }

    // 서울 시간을 UTC로 변환 (KST = UTC+9)
    const seoulDate = new Date(input + ':00');
    const utcMs = seoulDate.getTime() - (9 * 60 * 60000);

    const grid = document.getElementById('cityGrid');
    grid.innerHTML = '';

    CITIES.forEach(city => {
      const cityDate = new Date(utcMs);
      const opts = { timeZone: city.tz, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false };
      const parts = new Intl.DateTimeFormat('ko-KR', opts).formatToParts(cityDate);
      const mp = {};
      parts.forEach(p => mp[p.type] = p.value);

      const timeStr = mp.hour + ':' + mp.minute;
      const dateStr = mp.year + '.' + mp.month + '.' + mp.day;
      const hourNum = parseInt(mp.hour);
      const status = getStatus(hourNum);

      // UTC 오프셋 계산
      const utcOffset = (new Date(utcMs).toLocaleString('en', { timeZone: city.tz, timeZoneName: 'short' })).split(' ').pop();

      const card = document.createElement('div');
      card.className = 'city-card' + (city.base ? ' base' : '');
      card.innerHTML = `
        <div class="city-top">
          <span class="city-flag">${city.flag}</span>
          <span class="city-name">${city.name}</span>
          <span class="city-tz">${city.tz.split('/').pop()}</span>
        </div>
        <div class="city-time">${timeStr}</div>
        <div class="city-date">${dateStr}</div>
        <span class="city-status ${status.cls}">${status.label}</span>
      `;
      grid.appendChild(card);
    });

    document.getElementById('resultSection').style.display = 'block';
  }

  window.onload = () => setNow();
</script>
</body>
</html>
