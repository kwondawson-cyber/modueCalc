<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>복리 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--warn:#f5a623;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:28px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badges{text-align:center;margin-bottom:16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .badge{padding:3px 12px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);border-radius:20px;font-size:11px;color:var(--accent);font-weight:700}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:38px;font-weight:900;color:var(--accent)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .result-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .result-item-value{font-size:16px;font-weight:700}
    .result-item-value.accent{color:var(--accent)}
    .result-item-value.warn{color:var(--warn)}
    .chart-wrap{background:var(--surface2);border-radius:12px;padding:16px;margin-top:14px}
    .chart-wrap h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:14px}
    canvas{width:100%!important;height:200px!important;display:block}
    .table-wrap{margin-top:14px;max-height:280px;overflow-y:auto;border-radius:10px;border:1px solid var(--border)}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:var(--surface2);padding:9px 12px;text-align:right;color:var(--text-muted);font-weight:600;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1}
    .tbl th:first-child{text-align:left}
    .tbl td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--border);font-size:12px}
    .tbl td:first-child{text-align:left;font-weight:600}
    .tbl tr:last-child td{border-bottom:none;color:var(--accent);font-weight:700}
    .tbl tr:hover td{background:rgba(0,212,170,0.04)}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}.row3{grid-template-columns:1fr 1fr}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📊</span>
    <div><h1>복리 계산기</h1><p>복리 수익·자산 성장 계산</p></div>
  </div>



<div class="badges"><span class="badge">📈 투자</span><span class="badge">복리 vs 단리</span><span class="badge">자산 성장 그래프</span></div>
<div class="card">
<h2>💰 투자 조건</h2>
<div class="row2">
<div class="form-group">
<label>초기 원금 (원)</label>
<input id="principal" placeholder="예: 10000000" type="number"/>
</div>
<div class="form-group">
<label>연 수익률 (%)</label>
<input id="rate" placeholder="예: 7" step="0.1" type="number"/>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>투자 기간 (년)</label>
<input id="years" max="50" min="1" placeholder="예: 20" type="number"/>
</div>
<div class="form-group">
<label>복리 계산 주기</label>
<select id="freq">
<option value="1">연 복리</option>
<option value="2">반기 복리</option>
<option value="4">분기 복리</option>
<option value="12">월 복리</option>
<option value="365">일 복리</option>
</select>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>매년 추가 적립 (원, 선택)</label>
<input id="addYear" placeholder="예: 1200000" type="number" value="0"/>
</div>
<div class="form-group">
<label>세금 공제 (%)</label>
<select id="tax">
<option value="0">비과세 (0%)</option>
<option selected="" value="15.4">이자소득세 (15.4%)</option>
<option value="9.9">세금우대 (9.9%)</option>
</select>
</div>
</div>
<button class="btn" onclick="calc()">복리 수익 계산하기</button>
</div>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">최종 원리합계 (세후)</div>
<div class="result-value" id="r-total">-</div>
<div class="result-sub" id="r-sub"></div>
</div>
<div class="result-grid">
<div class="result-item"><div class="result-item-label">초기 원금</div><div class="result-item-value" id="r-principal">-</div></div>
<div class="result-item"><div class="result-item-label">총 적립 원금</div><div class="result-item-value" id="r-invested">-</div></div>
<div class="result-item"><div class="result-item-label">세전 복리 수익</div><div class="result-item-value accent" id="r-gross-interest">-</div></div>
<div class="result-item"><div class="result-item-label">세후 순 수익</div><div class="result-item-value accent" id="r-net-interest">-</div></div>
<div class="result-item"><div class="result-item-label">단리 원리합계</div><div class="result-item-value warn" id="r-simple">-</div></div>
<div class="result-item"><div class="result-item-label">복리 추가 수익</div><div class="result-item-value accent" id="r-extra">-</div></div>
</div>
<div class="chart-wrap">
<h3>📈 연도별 자산 성장</h3>
<canvas id="growthChart"></canvas>
</div>
<div class="table-wrap">
<table class="tbl">
<thead><tr><th>연도</th><th>원금 합계</th><th>복리 잔액</th><th>단리 잔액</th><th>복리 수익</th></tr></thead>
<tbody id="tbl-body"></tbody>
</table>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/savings" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">적금</span></a>
      <a href="/toss/stock_return" class="toss-nav-item"><span class="ni-emoji">📉</span><span class="ni-label">주식수익률</span></a>
      <a href="/toss/inflation" class="toss-nav-item"><span class="ni-emoji">📈</span><span class="ni-label">물가상승률</span></a>
      <a href="/toss/etf_return" class="toss-nav-item"><span class="ni-emoji">📈</span><span class="ni-label">ETF수익률</span></a>
    </div>
  </div>
</div>
<script>
const fw = n => Math.round(n).toLocaleString() + '원';
const fx = n => n >= 1e8 ? (n/1e8).toFixed(1)+'억원' : Math.round(n).toLocaleString()+'원';

function calc() {
  const P = +document.getElementById('principal').value || 0;
  const r = +document.getElementById('rate').value / 100;
  const Y = +document.getElementById('years').value || 0;
  const n = +document.getElementById('freq').value;
  const add = +document.getElementById('addYear').value || 0;
  const taxRate = +document.getElementById('tax').value / 100;
  if (!P || !r || !Y) { alert('원금, 수익률, 기간을 입력해주세요.'); return; }

  // 연도별 계산
  const rows = [];
  let compound = P;
  let totalInvested = P;
  const simpleRate = r;

  for (let y = 1; y <= Y; y++) {
    compound = compound * Math.pow(1 + r/n, n) + add;
    totalInvested = P + add * y;
    const simple = P * (1 + simpleRate * y) + add * y;
    const interest = compound - totalInvested;
    rows.push({ y, totalInvested, compound, simple, interest });
  }

  const finalCompound = rows[Y-1].compound;
  const finalSimple   = rows[Y-1].simple;
  const grossInterest = finalCompound - (P + add*Y);
  const tax = grossInterest * taxRate;
  const netTotal = finalCompound - tax;
  const netInterest = netTotal - (P + add*Y);
  const extraVsSimple = netTotal - finalSimple;

  document.getElementById('r-total').textContent = fx(netTotal);
  document.getElementById('r-sub').textContent = `세전 ${fx(finalCompound)} → 세금 ${fw(tax)} 공제`;
  document.getElementById('r-principal').textContent = fw(P);
  document.getElementById('r-invested').textContent  = fw(P + add*Y);
  document.getElementById('r-gross-interest').textContent = fw(grossInterest);
  document.getElementById('r-net-interest').textContent   = fw(netInterest);
  document.getElementById('r-simple').textContent  = fx(finalSimple);
  document.getElementById('r-extra').textContent   = fw(Math.max(extraVsSimple, 0));

  // 테이블
  document.getElementById('tbl-body').innerHTML = rows.map(row =>
    `<tr><td>${row.y}년</td><td>${fw(row.totalInvested)}</td><td>${fx(row.compound)}</td><td>${fx(row.simple)}</td><td style="color:var(--accent)">${fw(row.interest)}</td></tr>`
  ).join('');

  // 차트
  drawChart(rows, P);
  document.getElementById('result').classList.add('show');
}

function drawChart(rows, P) {
  const canvas = document.getElementById('growthChart');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = (canvas.offsetWidth || 600) * dpr;
  canvas.height = 200 * dpr;
  ctx.scale(dpr, dpr);
  const W = canvas.offsetWidth || 600, H = 200;
  ctx.clearRect(0,0,W,H);

  const maxVal = Math.max(...rows.map(r => r.compound));
  const L=50, R=16, T=10, B=30;
  const pw = W-L-R, ph = H-T-B;
  const px = i => L + i/(rows.length-1)*pw;
  const py = v => T + (1 - v/maxVal)*ph;

  // 그리드
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  [0.25,0.5,0.75,1].forEach(r=>{
    ctx.beginPath(); ctx.moveTo(L, py(maxVal*r)); ctx.lineTo(W-R, py(maxVal*r)); ctx.stroke();
  });

  // 원금 영역
  ctx.beginPath();
  rows.forEach((row,i) => { i===0 ? ctx.moveTo(px(i),py(row.totalInvested)) : ctx.lineTo(px(i),py(row.totalInvested)); });
  ctx.lineTo(px(rows.length-1),T+ph); ctx.lineTo(L,T+ph); ctx.closePath();
  ctx.fillStyle='rgba(139,148,158,0.15)'; ctx.fill();

  // 단리 선
  ctx.beginPath(); ctx.strokeStyle='rgba(245,166,35,0.6)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
  rows.forEach((row,i) => { i===0 ? ctx.moveTo(px(i),py(row.simple)) : ctx.lineTo(px(i),py(row.simple)); });
  ctx.stroke(); ctx.setLineDash([]);

  // 복리 영역
  ctx.beginPath();
  rows.forEach((row,i) => { i===0 ? ctx.moveTo(px(i),py(row.compound)) : ctx.lineTo(px(i),py(row.compound)); });
  ctx.lineTo(px(rows.length-1),T+ph); ctx.lineTo(L,T+ph); ctx.closePath();
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'rgba(0,212,170,0.25)'); grad.addColorStop(1,'rgba(0,212,170,0.02)');
  ctx.fillStyle=grad; ctx.fill();

  // 복리 선
  ctx.beginPath(); ctx.strokeStyle='#00d4aa'; ctx.lineWidth=2.5;
  rows.forEach((row,i) => { i===0 ? ctx.moveTo(px(i),py(row.compound)) : ctx.lineTo(px(i),py(row.compound)); });
  ctx.stroke();

  // 레이블
  const fmt = v => v>=1e8 ? (v/1e8).toFixed(0)+'억' : (v/1e4).toFixed(0)+'만';
  ctx.fillStyle='#8b949e'; ctx.font=`10px Noto Sans KR`;
  [0,0.5,1].forEach(r=>{
    const v=maxVal*r; ctx.fillText(fmt(v), 2, py(v)+4);
  });
  // x축 레이블
  const step = rows.length<=10?1:rows.length<=20?5:10;
  rows.forEach((row,i)=>{
    if((row.y % step === 0)||(row.y===1)){
      ctx.fillText(row.y+'년', px(i)-8, H-4);
    }
  });

  // 범례
  ctx.strokeStyle='#00d4aa'; ctx.lineWidth=2; ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(L,T+ph+16); ctx.lineTo(L+20,T+ph+16); ctx.stroke();
  ctx.fillStyle='#00d4aa'; ctx.fillText('복리', L+22, T+ph+20);
  ctx.strokeStyle='rgba(245,166,35,0.6)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.moveTo(L+60,T+ph+16); ctx.lineTo(L+80,T+ph+16); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle='#f5a623'; ctx.fillText('단리', L+82, T+ph+20);
}
</script>
</body>
</html>
