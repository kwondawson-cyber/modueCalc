<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>환불 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:32px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .tab-wrap{display:flex;gap:8px;margin-bottom:16px}
    .tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all .2s}
    .tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border-color:transparent}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:900;color:var(--accent)}
    .result-value.danger{color:var(--danger)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .result-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .result-item-value{font-size:16px;font-weight:700;color:var(--text)}
    .breakdown{background:var(--surface2);border-radius:12px;padding:16px;margin-top:16px}
    .breakdown-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
    .breakdown-row:last-child{border-bottom:none;font-weight:700;color:var(--accent)}
    .breakdown-row.deduct{color:var(--danger)}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">💸</span>
    <div><h1>환불 계산기</h1><p>환불 수수료 실수령액 계산</p></div>
  </div>



<div class="tab-wrap">
<div class="tab active" onclick="switchTab('basic',this)">기본 환불</div>
<div class="tab" onclick="switchTab('academy',this)">학원 환불</div>
<div class="tab" onclick="switchTab('subscription',this)">구독 환불</div>
</div>
<!-- 기본 환불 -->
<div id="tab-basic">
<div class="card">
<h2>💳 기본 환불 계산</h2>
<div class="form-group"><label>결제 금액 (원)</label><input id="b-paid" placeholder="예: 500000" type="number"/></div>
<div class="row2">
<div class="form-group"><label>전체 기간 (일)</label><input id="b-total" placeholder="예: 90" type="number"/></div>
<div class="form-group"><label>사용 기간 (일)</label><input id="b-used" placeholder="예: 20" type="number"/></div>
</div>
<div class="row2">
<div class="form-group"><label>위약금 (원)</label><input id="b-penalty" placeholder="없으면 0" type="number" value="0"/></div>
<div class="form-group"><label>위약금 방식</label><select id="b-penalty-type"><option value="fixed">고정 금액</option><option value="pct">잔액 비율 (%)</option></select></div>
</div>
<div class="form-group" id="b-penalty-pct-wrap" style="display:none"><label>위약금 비율 (%)</label><input id="b-penalty-pct" placeholder="예: 10" type="number" value="10"/></div>
<button class="btn" onclick="calcBasic()">환불액 계산</button>
</div>
<div class="result-card" id="result-basic">
<div class="result-main">
<div class="result-label">예상 환불 금액</div>
<div class="result-value" id="rb-refund">0원</div>
<div class="result-sub" id="rb-sub"></div>
</div>
<div class="breakdown">
<div class="breakdown-row"><span>결제 금액</span><span id="rb-paid">-</span></div>
<div class="breakdown-row deduct"><span>사용 금액 (일할)</span><span id="rb-used-cost">-</span></div>
<div class="breakdown-row deduct"><span>위약금</span><span id="rb-penalty">-</span></div>
<div class="breakdown-row"><span>환불 예상액</span><span id="rb-final">-</span></div>
</div>
</div>
</div>
<!-- 학원 환불 -->
<div id="tab-academy" style="display:none">
<div class="card">
<h2>📚 학원 환불 계산 (할부거래법 기준)</h2>
<div class="form-group"><label>수강료 (원)</label><input id="a-paid" placeholder="예: 300000" type="number"/></div>
<div class="row2">
<div class="form-group"><label>총 수강 횟수</label><input id="a-total" placeholder="예: 20" type="number"/></div>
<div class="form-group"><label>수강한 횟수</label><input id="a-used" placeholder="예: 5" type="number"/></div>
</div>
<div class="form-group">
<label>수강 시작 후 경과</label>
<select id="a-period">
<option value="1">1개월 이내</option>
<option value="2">2개월 이내</option>
<option value="3">3개월 이내</option>
<option value="4">3개월 초과</option>
</select>
</div>
<button class="btn" onclick="calcAcademy()">환불액 계산</button>
</div>
<div class="result-card" id="result-academy">
<div class="result-main">
<div class="result-label">환불 예상액</div>
<div class="result-value" id="ra-refund">0원</div>
<div class="result-sub" id="ra-sub"></div>
</div>
<div class="breakdown">
<div class="breakdown-row"><span>납부 수강료</span><span id="ra-paid">-</span></div>
<div class="breakdown-row deduct"><span>공제액 (수강 비율)</span><span id="ra-used">-</span></div>
<div class="breakdown-row deduct"><span>위약금 (법정)</span><span id="ra-penalty">-</span></div>
<div class="breakdown-row"><span>환불 예상액</span><span id="ra-final">-</span></div>
</div>
</div>
</div>
<!-- 구독 환불 -->
<div id="tab-subscription" style="display:none">
<div class="card">
<h2>📱 구독 서비스 환불</h2>
<div class="form-group"><label>결제 금액 (원)</label><input id="s-paid" placeholder="예: 15900" type="number"/></div>
<div class="row2">
<div class="form-group"><label>구독 기간</label><select id="s-period"><option value="30">1개월(30일)</option><option value="90">3개월(90일)</option><option value="180">6개월(180일)</option><option value="365">1년(365일)</option></select></div>
<div class="form-group"><label>사용일 수</label><input id="s-used" placeholder="예: 10" type="number"/></div>
</div>
<div class="form-group"><label>환불 정책</label><select id="s-policy"><option value="daily">일할 계산 환불</option><option value="none">환불 불가</option><option value="full">전액 환불</option></select></div>
<button class="btn" onclick="calcSubscription()">환불액 계산</button>
</div>
<div class="result-card" id="result-sub">
<div class="result-main">
<div class="result-label">환불 예상액</div>
<div class="result-value" id="rs-refund">0원</div>
<div class="result-sub" id="rs-sub"></div>
</div>
<div class="breakdown">
<div class="breakdown-row"><span>결제 금액</span><span id="rs-paid">-</span></div>
<div class="breakdown-row deduct"><span>사용분 차감</span><span id="rs-used">-</span></div>
<div class="breakdown-row"><span>환불 예상액</span><span id="rs-final">-</span></div>
</div>
</div>
</div>

    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/margin" class="toss-nav-item"><span class="ni-emoji">💹</span><span class="ni-label">마진율</span></a>
      <a href="/card_fee" class="toss-nav-item"><span class="ni-emoji">💳</span><span class="ni-label">카드수수료</span></a>
      <a href="/vat" class="toss-nav-item"><span class="ni-emoji">🧾</span><span class="ni-label">부가세</span></a>
      <a href="/delivery_fee" class="toss-nav-item"><span class="ni-emoji">🛵</span><span class="ni-label">배달수수료</span></a>
    </div>
  </div>
</div>
<script>
function fmtW(n){return Math.round(n).toLocaleString()+'원';}
function switchTab(name,el){
  ['basic','academy','subscription'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

document.getElementById('b-penalty-type').addEventListener('change',function(){
  document.getElementById('b-penalty-pct-wrap').style.display=this.value==='pct'?'block':'none';
});

function calcBasic(){
  const paid    = +document.getElementById('b-paid').value;
  const total   = +document.getElementById('b-total').value;
  const used    = +document.getElementById('b-used').value;
  const pType   = document.getElementById('b-penalty-type').value;
  const penalty0= +document.getElementById('b-penalty').value||0;
  const penPct  = +document.getElementById('b-penalty-pct').value||0;
  if(!paid||!total||used===null){alert('값을 모두 입력해주세요.');return;}
  const dailyCost = paid/total;
  const usedCost  = dailyCost*Math.min(used,total);
  const remaining = paid-usedCost;
  const penalty   = pType==='fixed'?penalty0:remaining*penPct/100;
  const refund    = Math.max(remaining-penalty, 0);
  document.getElementById('rb-paid').textContent     = fmtW(paid);
  document.getElementById('rb-used-cost').textContent= '-'+fmtW(usedCost);
  document.getElementById('rb-penalty').textContent  = '-'+fmtW(penalty);
  document.getElementById('rb-final').textContent    = fmtW(refund);
  document.getElementById('rb-refund').textContent   = fmtW(refund);
  document.getElementById('rb-sub').textContent      = `사용 ${used}일 / 전체 ${total}일 (일할 ${Math.round(dailyCost).toLocaleString()}원/일)`;
  document.getElementById('result-basic').classList.add('show');
}

function calcAcademy(){
  const paid  = +document.getElementById('a-paid').value;
  const total = +document.getElementById('a-total').value;
  const used  = +document.getElementById('a-used').value;
  const period= +document.getElementById('a-period').value;
  if(!paid||!total){alert('값을 입력해주세요.');return;}
  // 법정 환불률
  const refundRates = {1:0.5, 2:0.333, 3:0.25, 4:0};
  const baseRefund  = paid * (refundRates[period]??0);
  const usedCost    = (paid/total)*used;
  const penalty     = paid*0.1; // 법정 위약금 10%
  const refund      = Math.max(baseRefund - penalty, 0);
  document.getElementById('ra-paid').textContent   = fmtW(paid);
  document.getElementById('ra-used').textContent   = '-'+fmtW(usedCost);
  document.getElementById('ra-penalty').textContent= '-'+fmtW(penalty);
  document.getElementById('ra-final').textContent  = fmtW(refund);
  document.getElementById('ra-refund').textContent = fmtW(refund);
  document.getElementById('ra-sub').textContent    = `수강 ${used}/${total}회 완료`;
  document.getElementById('result-academy').classList.add('show');
}

function calcSubscription(){
  const paid   = +document.getElementById('s-paid').value;
  const period = +document.getElementById('s-period').value;
  const used   = +document.getElementById('s-used').value;
  const policy = document.getElementById('s-policy').value;
  if(!paid||used===null){alert('값을 입력해주세요.');return;}
  let refund=0, usedCost=0;
  if(policy==='none'){ refund=0; usedCost=paid; }
  else if(policy==='full'){ refund=paid; usedCost=0; }
  else { usedCost=paid/period*Math.min(used,period); refund=Math.max(paid-usedCost,0); }
  document.getElementById('rs-paid').textContent  = fmtW(paid);
  document.getElementById('rs-used').textContent  = '-'+fmtW(usedCost);
  document.getElementById('rs-final').textContent = fmtW(refund);
  document.getElementById('rs-refund').textContent= fmtW(refund);
  document.getElementById('rs-sub').textContent   = `${used}일 사용 / 전체 ${period}일`;
  document.getElementById('result-sub').classList.add('show');
}
</script>
</body>
</html>
