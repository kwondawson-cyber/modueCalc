<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>임대수익률 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--warn:#f5a623;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:28px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badges{text-align:center;margin-bottom:16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
    .badge{padding:3px 12px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.25);border-radius:20px;font-size:11px;color:var(--accent);font-weight:700}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .type-tabs{display:flex;gap:8px;margin-bottom:16px}
    .type-tab{flex:1;padding:10px 8px;text-align:center;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);transition:all .2s;font-family:'Noto Sans KR',sans-serif}
    .type-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;border-color:transparent}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:44px;font-weight:900;color:var(--accent)}
    .result-sub{font-size:13px;color:var(--text-muted);margin-top:4px}
    .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    .result-item{background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
    .result-item-label{font-size:11px;color:var(--text-muted);margin-bottom:4px}
    .result-item-value{font-size:17px;font-weight:700;color:var(--text)}
    .result-item-value.good{color:var(--accent)}
    .result-item-value.warn{color:var(--warn)}
    .result-item-value.bad{color:var(--danger)}
    .breakdown{background:var(--surface2);border-radius:12px;padding:16px;margin-top:14px}
    .breakdown h3{font-size:13px;font-weight:700;color:var(--text-muted);margin-bottom:10px}
    .bd-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .bd-row:last-child{border-bottom:none;font-weight:700;font-size:15px;color:var(--accent);padding-top:12px}
    .bd-row.deduct span:last-child{color:var(--danger)}
    .gauge-wrap{margin-top:20px;text-align:center}
    .gauge-label{font-size:13px;color:var(--text-muted);margin-bottom:12px}
    .gauge{position:relative;width:200px;height:100px;margin:0 auto}
    .gauge-bg{fill:none;stroke:var(--surface2);stroke-width:20;stroke-linecap:round}
    .gauge-fill{fill:none;stroke-width:20;stroke-linecap:round;transition:stroke-dashoffset .8s;transform:rotate(180deg);transform-origin:center}
    .gauge-value{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:900;fill:var(--accent)}
    .gauge-sub{font-size:11px;fill:var(--text-muted)}
    .rating-box{display:inline-block;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-top:10px}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media(max-width:480px){.result-grid{grid-template-columns:1fr}.row2{grid-template-columns:1fr}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  












    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🏡</span>
    <div><h1>임대수익률 계산기</h1><p>월세·연수익률 계산</p></div>
  </div>



<div class="badges">
<span class="badge">🏪 상가</span><span class="badge">🏠 오피스텔·주택</span><span class="badge">📊 수익률 분석</span>
</div>
<div class="card">
<h2>🏢 임대 유형</h2>
<div class="type-tabs">
<button class="type-tab active" onclick="selectType('rent',this)">월세 수익률</button>
<button class="type-tab" onclick="selectType('full',this)">전세 수익률</button>
<button class="type-tab" onclick="selectType('compare',this)">전월세 비교</button>
</div>
</div>
<div class="card" id="rent-section">
<h2>💰 임대 조건</h2>
<div class="row2">
<div class="form-group">
<label>매입가(취득가) (만원)</label>
<input id="buyPrice" placeholder="예: 30000" type="number"/>
</div>
<div class="form-group">
<label>보증금 (만원)</label>
<input id="deposit" placeholder="예: 1000" type="number" value="0"/>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>월 임대료 (만원)</label>
<input id="monthly" placeholder="예: 150" type="number"/>
</div>
<div class="form-group">
<label>월 관리비 수입 (만원)</label>
<input id="mgmt" placeholder="예: 10" type="number" value="0"/>
</div>
</div>
<div class="card" style="background:var(--surface2);border-color:rgba(0,212,170,0.15);margin-top:4px;padding:16px">
<div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px">💸 연간 비용 (선택)</div>
<div class="row2">
<div class="form-group">
<label>재산세·종부세 (연, 만원)</label>
<input id="tax" placeholder="예: 80" type="number" value="0"/>
</div>
<div class="form-group">
<label>수선·유지비 (연, 만원)</label>
<input id="repair" placeholder="예: 30" type="number" value="0"/>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>공실 예상 기간 (개월/년)</label>
<input id="vacant" max="12" placeholder="예: 1" type="number" value="0"/>
</div>
<div class="form-group">
<label>취득세 등 거래비용 (만원)</label>
<input id="acqCost" placeholder="예: 400" type="number" value="0"/>
</div>
</div>
</div>
<button class="btn" onclick="calc()">수익률 계산하기</button>
</div>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">연 실질 수익률</div>
<div class="result-value" id="r-rate">0%</div>
<div class="result-sub" id="r-sub"></div>
</div>
<div class="gauge-wrap">
<svg class="gauge" viewbox="0 0 200 110">
<path class="gauge-bg" d="M 20 100 A 80 80 0 0 1 180 100"></path>
<path class="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" id="gauge-fill" stroke="url(#gGrad)" stroke-dasharray="251" stroke-dashoffset="251"></path>
<defs><lineargradient id="gGrad" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#00d4aa"></stop><stop offset="100%" stop-color="#0095ff"></stop></lineargradient></defs>
<text class="gauge-value" id="gauge-text" text-anchor="middle" x="100" y="90">0%</text>
<text class="gauge-sub" text-anchor="middle" x="100" y="108">연 수익률</text>
</svg>
<div class="rating-box" id="rating-box">-</div>
</div>
<div class="result-grid">
<div class="result-item"><div class="result-item-label">표면 수익률 (세전)</div><div class="result-item-value good" id="r-gross">-</div></div>
<div class="result-item"><div class="result-item-label">순 수익률 (비용 차감)</div><div class="result-item-value good" id="r-net">-</div></div>
<div class="result-item"><div class="result-item-label">연 임대 수입</div><div class="result-item-value" id="r-annual-inc">-</div></div>
<div class="result-item"><div class="result-item-label">연 순수익</div><div class="result-item-value" id="r-annual-net">-</div></div>
</div>
<div class="breakdown">
<h3>💡 수익률 상세 계산</h3>
<div class="bd-row"><span>매입가</span><span id="bd-buy">-</span></div>
<div class="bd-row"><span>실투자금 (매입가 − 보증금 + 거래비용)</span><span id="bd-invest">-</span></div>
<div class="bd-row"><span>연 임대수입 (월세+관리비 × 가동월)</span><span id="bd-income">-</span></div>
<div class="bd-row deduct"><span>(−) 연 비용 (세금+수선)</span><span id="bd-cost">-</span></div>
<div class="bd-row"><span>= 연 순수익</span><span id="bd-net">-</span></div>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/rent_conversion" class="toss-nav-item"><span class="ni-emoji">🔄</span><span class="ni-label">전월세전환</span></a>
      <a href="/toss/realestate" class="toss-nav-item"><span class="ni-emoji">🤝</span><span class="ni-label">중개수수료</span></a>
      <a href="/toss/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
      <a href="/toss/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
    </div>
  </div>
</div>
<script>
const fw = n => Math.round(n).toLocaleString() + '원';
const fp = n => n.toFixed(2) + '%';
let currentType = 'rent';

function selectType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // 월세 섹션만 있으므로 전세/비교는 안내
  const rs = document.getElementById('rent-section');
  if (rs) rs.style.display = (type === 'compare') ? 'none' : 'block';
}

function setGauge(rate) {
  const pct = Math.min(rate, 15) / 15;
  const total = 251;
  const fill = total * (1 - pct);
  const el = document.getElementById('gauge-fill');
  if (el) el.style.strokeDashoffset = fill;
  const t = document.getElementById('gauge-text');
  if (t) t.textContent = rate.toFixed(2) + '%';
}

function getRating(rate) {
  if (rate >= 6) return { text:'우수 수익률', cls:'good' };
  if (rate >= 4) return { text:'양호 수익률', cls:'good' };
  if (rate >= 2) return { text:'보통 수익률', cls:'' };
  return { text:'낮은 수익률', cls:'danger' };
}

function calc() {
  const buyPrice = (+document.getElementById('buyPrice').value || 0) * 10000;
  const deposit = (+document.getElementById('deposit').value || 0) * 10000;
  const monthly = (+document.getElementById('monthly').value || 0) * 10000;
  const mgmt = (+document.getElementById('mgmt').value || 0) * 10000;
  const tax = (+document.getElementById('tax').value || 0) * 10000;
  const repair = (+document.getElementById('repair').value || 0) * 10000;
  const vacant = +document.getElementById('vacant').value || 0;
  const acqCost = (+document.getElementById('acqCost').value || 0) * 10000;

  if (!buyPrice) { alert('매입가를 입력해주세요.'); return; }

  const activeMonths = 12 - vacant;
  const annualIncome = (monthly + mgmt) * activeMonths;
  const annualCost = tax + repair;
  const annualNet = annualIncome - annualCost;
  const investAmt = buyPrice - deposit + acqCost;
  const grossRate = buyPrice > 0 ? (annualIncome / buyPrice * 100) : 0;
  const netRate = investAmt > 0 ? (annualNet / investAmt * 100) : 0;

  document.getElementById('r-rate').textContent = netRate.toFixed(2) + '%';
  document.getElementById('r-sub').textContent = `실투자금 ${(investAmt/10000).toLocaleString()}만원 기준`;
  document.getElementById('r-gross').textContent = grossRate.toFixed(2) + '%';
  document.getElementById('r-net').textContent = netRate.toFixed(2) + '%';
  document.getElementById('r-annual-inc').textContent = fw(annualIncome);
  document.getElementById('r-annual-net').textContent = fw(annualNet);

  document.getElementById('bd-buy').textContent = fw(buyPrice);
  document.getElementById('bd-invest').textContent = fw(investAmt);
  document.getElementById('bd-income').textContent = fw(annualIncome);
  document.getElementById('bd-cost').textContent = fw(annualCost);
  document.getElementById('bd-net').textContent = fw(annualNet);

  setGauge(netRate);
  const r = getRating(netRate);
  const rb = document.getElementById('rating-box');
  if (rb) { rb.textContent = r.text; rb.className = 'rating-box ' + r.cls; }

  document.getElementById('result').style.display = 'block';
}
</script>
</body>
</html>
