<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>급여명세서 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:680px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}
    
    
    
    
    
    .header{text-align:center;margin-bottom:32px}
    .header h1{font-family:'Montserrat',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none;font-family:initial}
    .header p{color:var(--text-muted);font-size:14px}
    .badge{display:inline-block;padding:3px 10px;background:rgba(0,149,255,0.15);border:1px solid rgba(0,149,255,0.3);border-radius:20px;font-size:11px;color:var(--accent2);font-weight:700;margin-bottom:16px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px}
    .card h2{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--accent)}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:13px;color:var(--text-muted);margin-bottom:6px;font-weight:500}
    input,select{width:100%;padding:11px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s}
    input:focus,select:focus{border-color:var(--accent)}
    select option{background:var(--surface2)}
    .allowance-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    .allowance-row input{margin:0}
    .allowance-row input.name-inp{flex:1.2}
    .allowance-row input.amt-inp{flex:1.5}
    .allowance-row select{flex:1;margin:0;padding:11px 10px}
    .btn-del{background:none;border:1px solid var(--danger);color:var(--danger);border-radius:8px;padding:0 10px;height:44px;cursor:pointer;font-size:16px;flex-shrink:0}
    .btn-add{width:100%;padding:10px;border:1px dashed var(--border);border-radius:10px;background:transparent;color:var(--text-muted);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;margin-top:4px}
    .btn-add:hover{border-color:var(--accent);color:var(--accent)}
    .btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;color:#000;font-size:16px;font-weight:800;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:4px;transition:opacity .2s}
    .btn:hover{opacity:.9}
    .result-card{background:linear-gradient(135deg,rgba(0,212,170,0.08),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.25);border-radius:var(--radius);padding:24px;margin-top:16px;display:block}
    .result-card.show{display:block}
    .result-main{text-align:center;margin-bottom:20px}
    .result-label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .result-value{font-family:'Montserrat',sans-serif;font-size:36px;font-weight:900;color:var(--accent)}
    /* 급여명세서 스타일 */
    .payslip{background:#fff;color:#222;border-radius:12px;padding:24px;margin-top:16px;font-size:13px}
    .payslip-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px;color:#111}
    .payslip-sub{text-align:center;font-size:12px;color:#666;margin-bottom:16px}
    .payslip-section{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #ddd;border-radius:8px;overflow:hidden;margin-bottom:12px}
    .ps-col{border-right:1px solid #ddd}
    .ps-col:last-child{border-right:none}
    .ps-head{background:#f0fdf9;padding:8px 12px;font-weight:700;font-size:12px;color:#007a5e;border-bottom:1px solid #ddd}
    .ps-row{display:flex;justify-content:space-between;padding:6px 12px;border-bottom:1px solid #eee;font-size:12px;color:#333}
    .ps-row:last-child{border-bottom:none}
    .ps-total{display:flex;justify-content:space-between;padding:10px 12px;background:#f8f8f8;font-weight:700;font-size:13px;color:#111;border-top:2px solid #ddd}
    .ps-net{background:linear-gradient(135deg,#00d4aa,#0095ff);color:#fff;border-radius:8px;padding:14px;text-align:center;margin-top:8px}
    .ps-net-label{font-size:12px;opacity:.85}
    .ps-net-value{font-size:24px;font-weight:900;margin-top:2px}
    .btn-print{width:100%;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:12px;transition:all .2s}
    .btn-print:hover{border-color:var(--accent);color:var(--accent)}
    
    .ad-slot{min-height:0;text-align:center;margin:16px 0}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    details{border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    details summary{padding:12px 16px;cursor:pointer;font-size:14px;font-weight:600;list-style:none;display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
    details summary::after{content:'＋';color:var(--accent);font-size:16px}
    details[open] summary::after{content:'－'}
    details 
    @media print{body{background:#fff}.container{padding:0 20px}.card,.result-card{box-shadow:none;border:1px solid #ccc}.payslip{border:1px solid #ccc}}
    @media(max-width:480px){.row2{grid-template-columns:1fr}.payslip-section{grid-template-columns:1fr}.ps-col{border-right:none;border-bottom:1px solid #ddd}.ps-col:last-child{border-bottom:none}}

    
    
    
    
    
    
    
    .ex-table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}
    .ex-table th{background:rgba(0,212,170,0.1);padding:8px 12px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border)}
    .ex-table td{padding:8px 12px;border:1px solid var(--border);color:var(--text-muted);line-height:1.7}
    .ex-table tr:nth-child(even) td{background:rgba(255,255,255,0.02)}
    .hl-box{background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.25);border-radius:10px;padding:14px 16px;margin:14px 0;font-size:13px;color:var(--text);line-height:1.8}
    .hl-box strong{color:var(--accent)}
    
    
    
    
    
    
    
  


    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">📄</span>
    <div><h1>급여명세서 계산기</h1><p>월급 공제항목 상세 계산</p></div>
  </div>



<div style="text-align:center"><span class="badge">👔 인사담당자용</span></div>
<div class="card">
<h2>👤 기본 정보</h2>
<div class="row2">
<div class="form-group"><label>이름 (선택)</label><input id="empName" placeholder="홍길동" type="text"/></div>
<div class="form-group"><label>지급 연월</label><input id="payMonth" type="month"/></div>
</div>
<div class="row2">
<div class="form-group"><label>부양가족 수 (본인 포함)</label><input id="dependents" max="10" min="1" type="number" value="1"/></div>
<div class="form-group"><label>20세 이하 자녀 수</label><input id="children" min="0" type="number" value="0"/></div>
</div>
</div>
<div class="card">
<h2>💰 지급 항목</h2>
<div id="allowanceList">
<div class="allowance-row">
<input class="name-inp" readonly="" style="color:var(--text-muted)" type="text" value="기본급"/>
<input class="amt-inp" id="basicPay" placeholder="월 기본급 (원)" type="number"/>
<select style="flex:0.8;opacity:0"><option>과세</option></select>
<button class="btn-del" style="opacity:0;pointer-events:none">✕</button>
</div>
</div>
<button class="btn-add" onclick="addAllowance()">＋ 수당 항목 추가 (식대·교통비·야근수당 등)</button>
</div>
<div class="card">
<h2>📋 공제 설정</h2>
<div class="row2">
<div class="form-group">
<label>국민연금</label>
<select id="npOpt"><option value="auto">자동 (4.75%)</option><option value="skip">미적용</option></select>
</div>
<div class="form-group">
<label>건강보험</label>
<select id="hiOpt"><option value="auto">자동 (3.595%)</option><option value="skip">미적용</option></select>
</div>
</div>
<div class="row2">
<div class="form-group">
<label>고용보험</label>
<select id="eiOpt"><option value="auto">자동 (0.9%)</option><option value="skip">미적용</option></select>
</div>
<div class="form-group">
<label>소득세</label>
<select id="taxOpt"><option value="auto">자동 계산</option><option value="skip">미적용</option></select>
</div>
</div>
</div>
<button class="btn" onclick="calcPayslip()">급여명세서 계산</button>
<div class="result-card" id="result">
<div class="result-main">
<div class="result-label">실수령액</div>
<div class="result-value" id="rNet">0원</div>
<div class="result-sub" id="rSub"></div>
</div>
<div class="payslip" id="payslipBox">
<div class="payslip-title">급 여 명 세 서</div>
<div class="payslip-sub" id="ps-header"></div>
<div class="payslip-section">
<div class="ps-col">
<div class="ps-head">지급 항목</div>
<div id="ps-pay-rows"></div>
<div class="ps-total"><span>지급 합계</span><span id="ps-pay-total"></span></div>
</div>
<div class="ps-col">
<div class="ps-head">공제 항목</div>
<div id="ps-ded-rows"></div>
<div class="ps-total"><span>공제 합계</span><span id="ps-ded-total"></span></div>
</div>
</div>
<div class="ps-net">
<div class="ps-net-label">실수령액</div>
<div class="ps-net-value" id="ps-net-value"></div>
</div>
</div>
<button class="btn-print" onclick="window.print()">🖨️ 인쇄 / PDF 저장</button>
</div>

    <div style="text-align:center;padding:12px 16px 4px;font-size:12px;color:#6b7280;">
    본 계산기는 <strong>참고용</strong>이며, 실제 결과와 다를 수 있습니다.
  </div>
  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/salary" class="toss-nav-item"><span class="ni-emoji">💰</span><span class="ni-label">연봉</span></a>
      <a href="/hourly_salary" class="toss-nav-item"><span class="ni-emoji">⏰</span><span class="ni-label">시급</span></a>
      <a href="/income_tax" class="toss-nav-item"><span class="ni-emoji">🧮</span><span class="ni-label">소득세</span></a>
      <a href="/health_insurance" class="toss-nav-item"><span class="ni-emoji">🏥</span><span class="ni-label">건강보험</span></a>
    </div>
  </div>
</div>
<script>
const fmt = n => Math.round(n).toLocaleString();

// 2026년 요율
const NP_RATE   = 0.0475;   // 국민연금 4.75%
const NP_MAX    = 302575;   // 국민연금 상한
const HI_RATE   = 0.03595;  // 건강보험 3.595%
const LTC_RATE  = 0.1314;   // 장기요양 (건강보험료×13.14%)
const EI_RATE   = 0.009;    // 고용보험 0.9%

function addAllowance() {
  const div = document.createElement('div');
  div.className = 'allowance-row';
  div.innerHTML = `
    <input class="name-inp" type="text" placeholder="수당명 (예: 식대)" />
    <input class="amt-inp"  type="number" placeholder="금액 (원)" />
    <select style="flex:0.8">
      <option value="taxable">과세</option>
      <option value="nontax">비과세</option>
    </select>
    <button class="btn-del" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('allowanceList').appendChild(div);
}

function calcIncomeTax(annual, dependents, children) {
  let earned;
  if (annual <= 5000000)       earned = annual * 0.7;
  else if (annual <= 15000000) earned = 3500000 + (annual-5000000)*0.4;
  else if (annual <= 45000000) earned = 7500000 + (annual-15000000)*0.15;
  else if (annual <= 100000000)earned = 12000000 + (annual-45000000)*0.05;
  else                          earned = 14750000;

  let taxBase = annual - earned - dependents*1500000 - (children>=2?(children-1)*500000:0);
  taxBase = Math.max(0, taxBase);

  let tax;
  if (taxBase <= 14000000)       tax = taxBase*0.06;
  else if (taxBase <= 50000000)  tax = 840000+(taxBase-14000000)*0.15;
  else if (taxBase <= 88000000)  tax = 6240000+(taxBase-50000000)*0.24;
  else if (taxBase <= 150000000) tax = 15360000+(taxBase-88000000)*0.35;
  else if (taxBase <= 300000000) tax = 37060000+(taxBase-150000000)*0.38;
  else if (taxBase <= 500000000) tax = 94060000+(taxBase-300000000)*0.40;
  else                           tax = 174060000+(taxBase-500000000)*0.42;

  let credit = tax <= 1300000 ? tax*0.55 : 715000+(tax-1300000)*0.3;
  credit = Math.min(credit, dependents>=2?740000:660000);
  return Math.max(0, Math.round((tax-credit)/12));
}

function calcPayslip() {
  const rows = document.querySelectorAll('#allowanceList .allowance-row');
  let taxable = 0, nontax = 0;

  rows.forEach(row => {
    const amt = parseFloat(row.querySelector('.amt-inp')?.value) || 0;
    const sel = row.querySelector('select');
    const type = sel ? sel.value : 'taxable';
    if (type === 'nontax') nontax += amt;
    else taxable += amt;
  });

  const basicPay = parseFloat(document.getElementById('basicPay').value) || 0;
  taxable += basicPay;
  const totalPay = taxable + nontax;
  const baseForIns = taxable; // 비과세 제외 보수월액

  const npOpt = document.getElementById('npOpt').value;
  const hiOpt = document.getElementById('hiOpt').value;
  const eiOpt = document.getElementById('eiOpt').value;
  const taxOpt= document.getElementById('taxOpt').value;
  const dep   = parseInt(document.getElementById('dependents').value)||1;
  const child = parseInt(document.getElementById('children').value)||0;

  const np  = npOpt  === 'skip' ? 0 : Math.min(Math.round(baseForIns*NP_RATE), NP_MAX);
  const hi  = hiOpt  === 'skip' ? 0 : Math.round(baseForIns*HI_RATE);
  const ltc = hiOpt  === 'skip' ? 0 : Math.round(hi*LTC_RATE);
  const ei  = eiOpt  === 'skip' ? 0 : Math.round(baseForIns*EI_RATE);
  const it  = taxOpt === 'skip' ? 0 : calcIncomeTax(baseForIns*12, dep, child);
  const lit = Math.round(it*0.1);

  const totalDed = np+hi+ltc+ei+it+lit;
  const net = totalPay - totalDed;

  // 결과 표시
  document.getElementById('rNet').textContent = fmt(net) + '원';
  document.getElementById('rSub').textContent = `공제 합계 ${fmt(totalDed)}원`;

  const empName  = document.getElementById('empName').value || '홍길동';
  const payMonth = document.getElementById('payMonth').value || new Date().toISOString().slice(0,7);
  document.getElementById('ps-header').textContent = `${empName}  /  ${payMonth}  /  지급일 기준`;

  // 지급 항목 명세
  const payRows = document.getElementById('ps-pay-rows');
  payRows.innerHTML = '';
  rows.forEach(row => {
    const name = row.querySelector('.name-inp')?.value || '수당';
    const amt  = parseFloat(row.querySelector('.amt-inp')?.value)||0;
    if (!amt) return;
    const div = document.createElement('div');
    div.className = 'ps-row';
    div.innerHTML = `<span>${name}</span><span>${fmt(amt)}원</span>`;
    payRows.appendChild(div);
  });
  document.getElementById('ps-pay-total').textContent = fmt(totalPay)+'원';

  // 공제 항목 명세
  const items = [
    ['국민연금(4.75%)', np], ['건강보험(3.595%)', hi],
    ['장기요양(×13.14%)', ltc], ['고용보험(0.9%)', ei],
    ['소득세', it], ['지방소득세', lit]
  ];
  const dedRows = document.getElementById('ps-ded-rows');
  dedRows.innerHTML = '';
  items.forEach(([name, amt]) => {
    if (!amt) return;
    const div = document.createElement('div');
    div.className = 'ps-row';
    div.innerHTML = `<span>${name}</span><span>-${fmt(amt)}원</span>`;
    dedRows.appendChild(div);
  });
  document.getElementById('ps-ded-total').textContent = '-'+fmt(totalDed)+'원';
  document.getElementById('ps-net-value').textContent = fmt(net)+'원';

  document.getElementById('result').classList.add('show');
}
</script>
</body>
</html>
