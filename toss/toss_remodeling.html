<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>리모델링 비용 계산기</title>
  <!-- TODO: 앱인토스 SDK 교체 -->
  <!-- <script src="https://static.toss.im/ait/sdk.js"></script> -->
  <style>

    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    
    .container{max-width:700px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .header h1 .emoji{-webkit-text-fill-color:initial;background:none}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,6vw,42px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}.input-comma{font-size:12px;color:var(--accent);margin-top:5px;font-weight:700;min-height:15px;letter-spacing:.3px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px}
    .card-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:14px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input[type="number"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 70px 13px 16px;font-size:17px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);pointer-events:none}
    .grade-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
    .grade-btn{padding:12px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:center;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
    .grade-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4)}
    .grade-btn .gn{font-size:14px;font-weight:700;color:var(--text)}
    .grade-btn .gd{font-size:11px;color:var(--text-muted);margin-top:3px}
    .grade-btn.active .gn{color:var(--accent)}
    .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    @media(max-width:480px){.check-grid{grid-template-columns:1fr}}
    .check-item{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s}
    .check-item.checked{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.35)}
    .check-item input[type="checkbox"]{width:18px;height:18px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
    .check-item label{font-size:14px;font-weight:600;cursor:pointer;flex:1}
    .check-item .ci-price{font-size:11px;color:var(--text-muted);margin-top:2px}
    .check-item.checked label{color:var(--accent)}
    .calc-btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,212,170,0.3)}
    .result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 32px;margin-bottom:20px;display:none}
    .result-card.visible{display:block}
    .result-title{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .main-result{background:rgba(0,212,170,0.07);border:1px solid rgba(0,212,170,0.2);border-radius:14px;padding:20px 24px;margin-bottom:18px;text-align:center}
    .main-result .label{font-size:13px;color:var(--text-muted);margin-bottom:6px}
    .main-result .big{font-size:34px;font-weight:900;color:var(--accent);font-family:'Montserrat',sans-serif}
    .range-row{display:flex;justify-content:space-between;font-size:13px;color:var(--text-muted);margin-top:8px}
    .range-row span strong{color:var(--text)}
    .breakdown{margin-top:16px}
    .breakdown-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
    .bk-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px}
    .bk-row:last-child{border-bottom:none}
    .bk-name{color:var(--text-muted)}
    .bk-val{font-weight:700;color:var(--accent);font-family:'Montserrat',sans-serif}
    /* rel/aff */
    






  























    .home-btn-wrap{text-align:center;margin-bottom:8px}
    .home-btn{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:54px;height:54px;background:rgba(0,212,170,0.08);border:1.5px solid rgba(0,212,170,0.35);border-radius:50%;cursor:pointer;text-decoration:none;transition:all 0.2s}
    .home-btn:active{background:rgba(0,212,170,0.18);transform:translateY(-2px)}
    .home-btn-emoji{font-size:20px;line-height:1}
    .home-btn-label{font-size:8px;font-weight:800;letter-spacing:1.5px;color:#00d4aa}

    .toss-header{display:flex;align-items:center;gap:12px;padding:12px 0 20px;border-bottom:1px solid var(--border);margin-bottom:24px}
    .toss-header>.emoji{font-size:28px;flex-shrink:0}
    .toss-header h1{font-size:20px;font-weight:800;color:var(--text);margin:0}
    .toss-header p{font-size:12px;color:var(--text-muted);margin-top:3px}
    .toss-nav{margin-top:24px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
    .toss-nav-title{font-size:12px;font-weight:700;color:var(--text-muted);margin-bottom:12px}
    .toss-nav-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .toss-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-decoration:none;transition:all .2s}
    .toss-nav-item:active{background:rgba(0,212,170,0.08);border-color:rgba(0,212,170,0.3)}
    .ni-emoji{font-size:20px}
    .ni-label{font-size:10px;font-weight:600;color:var(--text-muted);text-align:center;line-height:1.3}

    @media(max-width:360px){.card{padding:18px 14px}.toss-nav-grid{grid-template-columns:repeat(2,1fr)}}

  </style>
</head>
<body>
<div class="container">
  <div class="home-btn-wrap"><a href="/toss/" class="home-btn"><span class="home-btn-emoji">🏠</span><span class="home-btn-label">HOME</span></a></div>
  <div class="toss-header">
    <span class="emoji">🔨</span>
    <div><h1>리모델링 비용 계산기</h1><p>인테리어 공사 비용 계산</p></div>
  </div>



<div class="card">
<div class="card-title">기본 정보</div>
<div class="input-group">
<label>전용 면적</label>
<div class="input-wrapper">
<input id="area" max="200" min="1" type="number" value="25"/>
<span class="input-unit">평</span>
</div>
</div>
<div class="card-title" style="margin-top:4px;margin-bottom:12px">자재 등급</div>
<div class="grade-btns">
<div class="grade-btn active" id="g1" onclick="setGrade(1)">
<div class="gn">보급형</div>
<div class="gd">합리적 가격</div>
</div>
<div class="grade-btn" id="g2" onclick="setGrade(2)">
<div class="gn">중급형</div>
<div class="gd">품질 균형</div>
</div>
<div class="grade-btn" id="g3" onclick="setGrade(3)">
<div class="gn">프리미엄</div>
<div class="gd">고급 마감재</div>
</div>
</div>
</div>
<div class="card">
<div class="card-title">공사 범위 선택 (복수 선택 가능)</div>
<div class="check-grid">
<div class="check-item" id="ci-wallpaper" onclick="toggleCheck('wallpaper',this)">
<input checked="" id="wallpaper" type="checkbox"/>
<div><label for="wallpaper">도배 (합지/실크)</label><div class="ci-price">1.5~4만 원/평</div></div>
</div>
<div class="check-item checked" id="ci-floor" onclick="toggleCheck('floor',this)">
<input checked="" id="floor" type="checkbox"/>
<div><label for="floor">바닥 (장판/마루)</label><div class="ci-price">2~18만 원/평</div></div>
</div>
<div class="check-item" id="ci-bathroom" onclick="toggleCheck('bathroom',this)">
<input id="bathroom" type="checkbox"/>
<div><label for="bathroom">욕실 리모델링</label><div class="ci-price">150~350만 원/개</div></div>
</div>
<div class="check-item" id="ci-kitchen" onclick="toggleCheck('kitchen',this)">
<input id="kitchen" type="checkbox"/>
<div><label for="kitchen">주방 (싱크대 교체)</label><div class="ci-price">120~400만 원</div></div>
</div>
<div class="check-item" id="ci-window" onclick="toggleCheck('window',this)">
<input id="window" type="checkbox"/>
<div><label for="window">창호 교체</label><div class="ci-price">80~180만 원/개소</div></div>
</div>
<div class="check-item" id="ci-ceiling" onclick="toggleCheck('ceiling',this)">
<input id="ceiling" type="checkbox"/>
<div><label for="ceiling">천장 도장·몰딩</label><div class="ci-price">1~3만 원/평</div></div>
</div>
<div class="check-item" id="ci-door" onclick="toggleCheck('door',this)">
<input id="door" type="checkbox"/>
<div><label for="label">중문·방문 교체</label><div class="ci-price">50~180만 원</div></div>
</div>
<div class="check-item" id="ci-lighting" onclick="toggleCheck('lighting',this)">
<input id="lighting" type="checkbox"/>
<div><label for="lighting">조명 교체</label><div class="ci-price">1~3만 원/평</div></div>
</div>
</div>
<!-- 욕실 수 -->
<div class="input-group" style="margin-top:16px">
<label>욕실 수 (욕실 선택 시)</label>
<div class="input-wrapper">
<input id="bathroomCount" max="5" min="1" type="number" value="1"/>
<span class="input-unit">개</span>
</div>
</div>
<div class="input-group">
<label>창호 개소 수 (창호 선택 시)</label>
<div class="input-wrapper">
<input id="windowCount" max="20" min="1" type="number" value="3"/>
<span class="input-unit">개소</span>
</div>
</div>
<button class="calc-btn" onclick="calc()">🏗 견적 계산하기</button>
</div>
<div class="result-card" id="resultCard">
<div class="result-title">예상 견적</div>
<div class="main-result">
<div class="label">예상 총 비용 (중간값)</div>
<div class="big" id="r-total">—</div>
<div class="range-row">
<span>최소: <strong id="r-min">—</strong></span>
<span>최대: <strong id="r-max">—</strong></span>
</div>
</div>
<div class="breakdown">
<div class="breakdown-title">항목별 내역</div>
<div id="breakdownList"></div>
</div>
</div>

  <div class="toss-nav">
    <div class="toss-nav-title">함께 쓰면 유용한 계산기</div>
    <div class="toss-nav-grid">
      <a href="/toss/area_converter" class="toss-nav-item"><span class="ni-emoji">📐</span><span class="ni-label">넓이변환</span></a>
      <a href="/toss/loan" class="toss-nav-item"><span class="ni-emoji">🏦</span><span class="ni-label">대출이자</span></a>
      <a href="/toss/acquisition" class="toss-nav-item"><span class="ni-emoji">🏠</span><span class="ni-label">취득세</span></a>
      <a href="/toss/rent_yield" class="toss-nav-item"><span class="ni-emoji">🏡</span><span class="ni-label">임대수익률</span></a>
    </div>
  </div>
</div>
<script>
let gradeLevel = 1;
  const checks = {};

  // 자재 등급 배율 [보급, 중급, 프리미엄]
  const GRADE_MULT = [1.0, 1.6, 2.4];

  // 단가 [최소, 최대] (평당 or 고정, 단위: 만원)
  const PRICES = {
    wallpaper: { type: 'area', min: 1.5, max: 2.5, label: '도배' },
    floor:     { type: 'area', min: 2,   max: 18,  label: '바닥 (장판/마루)' },
    bathroom:  { type: 'count', id: 'bathroomCount', min: 150, max: 350, label: '욕실' },
    kitchen:   { type: 'fixed', min: 120, max: 400, label: '주방 싱크대' },
    window:    { type: 'count', id: 'windowCount', min: 80, max: 180, label: '창호' },
    ceiling:   { type: 'area', min: 1,  max: 3,   label: '천장 도장·몰딩' },
    door:      { type: 'fixed', min: 50, max: 180, label: '중문·방문' },
    lighting:  { type: 'area', min: 1,  max: 3,   label: '조명' },
  };

  function setGrade(g) {
    gradeLevel = g;
    [1,2,3].forEach(i => document.getElementById('g'+i).classList.toggle('active', i === g));
  }

  function toggleCheck(id, el) {
    const cb = document.getElementById(id);
    cb.checked = !cb.checked;
    el.classList.toggle('checked', cb.checked);
  }

  function fmt(n) {
    if (n >= 10000) return (n/10000).toFixed(1) + '억 원';
    return n.toLocaleString() + '만 원';
  }

  function calc() {
    const area = parseFloat(document.getElementById('area').value) || 25;
    const mult = GRADE_MULT[gradeLevel - 1];
    let totalMin = 0, totalMax = 0;
    const rows = [];

    Object.entries(PRICES).forEach(([id, p]) => {
      const cb = document.getElementById(id);
      if (!cb || !cb.checked) return;

      let min, max;
      if (p.type === 'area') {
        const midMin = (p.min + (p.min * 0.7)) / 2 * mult;
        min = p.min * mult * area;
        max = p.max * mult * area;
        // area type: grade multiplier adjusts the mid range
        if (gradeLevel === 1) { min = p.min * area; max = (p.min * 1.8) * area; }
        else if (gradeLevel === 2) { min = (p.min * 1.5) * area; max = ((p.min + p.max)/2 * 1.2) * area; }
        else { min = ((p.min + p.max)/2) * area; max = p.max * area; }
      } else if (p.type === 'count') {
        const count = parseInt(document.getElementById(p.id).value) || 1;
        if (gradeLevel === 1) { min = p.min * count; max = (p.min * 1.5) * count; }
        else if (gradeLevel === 2) { min = ((p.min + p.max)/2 * 0.9) * count; max = ((p.min + p.max)/2 * 1.1) * count; }
        else { min = (p.max * 0.8) * count; max = p.max * count; }
      } else {
        if (gradeLevel === 1) { min = p.min; max = p.min * 1.5; }
        else if (gradeLevel === 2) { min = (p.min + p.max) / 2 * 0.9; max = (p.min + p.max) / 2 * 1.1; }
        else { min = p.max * 0.8; max = p.max; }
      }

      totalMin += min;
      totalMax += max;
      const mid = (min + max) / 2;
      rows.push({ label: p.label, mid });
    });

    const totalMid = (totalMin + totalMax) / 2;
    document.getElementById('r-total').textContent = fmt(Math.round(totalMid));
    document.getElementById('r-min').textContent = fmt(Math.round(totalMin));
    document.getElementById('r-max').textContent = fmt(Math.round(totalMax));

    const list = document.getElementById('breakdownList');
    list.innerHTML = rows.map(r =>
      `<div class="bk-row"><span class="bk-name">${r.label}</span><span class="bk-val">${fmt(Math.round(r.mid))}</span></div>`
    ).join('') + `<div class="bk-row" style="font-weight:900;margin-top:4px"><span style="color:var(--text)">합계</span><span class="bk-val">${fmt(Math.round(totalMid))}</span></div>`;

    document.getElementById('resultCard').classList.add('visible');
  }

  window.onload = () => {
    // 초기 체크 상태 동기화
    ['wallpaper'].forEach(id => {
      const el = document.getElementById('ci-' + id);
      if (el) el.classList.add('checked');
    });
    document.getElementById('ci-floor').classList.add('checked');
    document.getElementById('floor').checked = true;
  };
</script>
</body>
</html>
