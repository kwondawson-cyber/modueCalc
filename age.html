<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>만 나이 계산기 | 모두의계산기</title>
  <meta name="description" content="만 나이 계산기. 생년월일을 입력하면 만 나이, 한국 나이, 연 나이를 한번에 계산해드립니다. 2025년 만 나이 통일법 기준." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #0095ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }

    .nav {
      text-align: center;
      margin-bottom: 32px;
    }

    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: var(--text-muted);
      font-size: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .input-group input[type="date"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .input-group input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }

    .calc-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #000;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: 0.5px;
    }

    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,170,0.3);
    }

    /* 결과 */
    .result-card {
      display: none;
      animation: fadeUp 0.4s ease;
    }

    .result-card.visible { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .age-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .age-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .age-box.main {
      border-color: rgba(0,212,170,0.4);
      background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(0,149,255,0.04));
    }

    .age-box .label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .age-box .value {
      font-family: 'Montserrat', sans-serif;
      font-size: 36px;
      font-weight: 900;
      color: var(--text);
      line-height: 1;
    }

    .age-box.main .value {
      color: var(--accent);
    }

    .age-box .unit {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* 상세 정보 */
    .detail-list .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .detail-list .detail-item:last-child {
      border-bottom: none;
    }

    .detail-item .d-label {
      color: var(--text-muted);
      font-weight: 400;
    }

    .detail-item .d-value {
      font-weight: 700;
      color: var(--text);
    }

    .detail-item .d-value.accent {
      color: var(--accent);
    }

    /* 생일 카운트다운 */
    .birthday-box {
      background: linear-gradient(135deg, rgba(0,149,255,0.1), rgba(0,212,170,0.05));
      border: 1px solid rgba(0,149,255,0.3);
      border-radius: 12px;
      padding: 20px 24px;
      text-align: center;
      margin-top: 16px;
    }

    .birthday-box .b-label {
      font-size: 12px;
      color: var(--accent2);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .birthday-box .b-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #fff;
    }

    .birthday-box .b-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .notice {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(255,165,0,0.05);
      border: 1px solid rgba(255,165,0,0.15);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    @media (max-width: 480px) {
      .age-grid { grid-template-columns: 1fr; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="nav">
      <a href="/">← 모두의계산기</a>
    </div>

    <div class="header">
      <h1>만 나이<br>계산기</h1>
      <p>만 나이 · 한국 나이 · 연 나이 한번에</p>
    </div>

    <div class="card">
      <div class="card-title">생년월일 입력</div>
      <div class="input-group">
        <label>생년월일</label>
        <input type="date" id="birthdate" />
      </div>
      <div class="input-group">
        <label>기준일 (오늘)</label>
        <input type="date" id="basedate" />
      </div>
      <button class="calc-btn" onclick="calculate()">🎂 나이 계산하기</button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="card">
        <div class="age-grid">
          <div class="age-box main">
            <div class="label">만 나이</div>
            <div class="value" id="manAge">-</div>
            <div class="unit">세</div>
          </div>
          <div class="age-box">
            <div class="label">한국 나이</div>
            <div class="value" id="koreanAge">-</div>
            <div class="unit">세</div>
          </div>
          <div class="age-box">
            <div class="label">연 나이</div>
            <div class="value" id="yearAge">-</div>
            <div class="unit">세</div>
          </div>
        </div>

        <div class="detail-list">
          <div class="detail-item">
            <span class="d-label">생년월일</span>
            <span class="d-value" id="d-birth">-</span>
          </div>
          <div class="detail-item">
            <span class="d-label">살아온 날수</span>
            <span class="d-value accent" id="d-days">-</span>
          </div>
          <div class="detail-item">
            <span class="d-label">살아온 개월수</span>
            <span class="d-value" id="d-months">-</span>
          </div>
          <div class="detail-item">
            <span class="d-label">띠</span>
            <span class="d-value" id="d-zodiac">-</span>
          </div>
          <div class="detail-item">
            <span class="d-label">별자리</span>
            <span class="d-value" id="d-star">-</span>
          </div>
        </div>

        <div class="birthday-box" id="birthdayBox">
          <div class="b-label">🎉 다음 생일까지</div>
          <div class="b-value" id="b-days">-</div>
          <div class="b-sub" id="b-date">-</div>
        </div>
      </div>

      <div class="notice">
        <strong style="color:orange">ℹ️ 만 나이란?</strong> 출생일을 기준으로 생일이 지날 때마다 1살씩 증가하는 나이 계산법입니다. 2023년 6월부터 법적·사회적 나이 기준으로 통일되었습니다.
      </div>
    </div>

  </div>

  <script>
    // 오늘 날짜 기본값 설정
    const today = new Date();
    const todayStr = today.toISOString().split('T')[0];
    document.getElementById('basedate').value = todayStr;

    // 기본 생년월일 (30년 전)
    const defaultBirth = new Date(today.getFullYear() - 30, today.getMonth(), today.getDate());
    document.getElementById('birthdate').value = defaultBirth.toISOString().split('T')[0];

    const zodiacList = ['원숭이','닭','개','돼지','쥐','소','호랑이','토끼','용','뱀','말','양'];
    const starSigns = [
      { name: '염소자리', end: [1,19] },
      { name: '물병자리', end: [2,18] },
      { name: '물고기자리', end: [3,20] },
      { name: '양자리', end: [4,19] },
      { name: '황소자리', end: [5,20] },
      { name: '쌍둥이자리', end: [6,20] },
      { name: '게자리', end: [7,22] },
      { name: '사자자리', end: [8,22] },
      { name: '처녀자리', end: [9,22] },
      { name: '천칭자리', end: [10,22] },
      { name: '전갈자리', end: [11,21] },
      { name: '사수자리', end: [12,31] },
    ];

    function getZodiac(year) {
      return zodiacList[year % 12];
    }

    function getStar(month, day) {
      for (const s of starSigns) {
        if (month < s.end[0] || (month === s.end[0] && day <= s.end[1])) return s.name;
      }
      return '염소자리';
    }

    function fmt(n) {
      return n.toLocaleString('ko-KR');
    }

    function calculate() {
      const birthVal = document.getElementById('birthdate').value;
      const baseVal = document.getElementById('basedate').value;

      if (!birthVal || !baseVal) { alert('날짜를 입력해주세요.'); return; }

      const birth = new Date(birthVal);
      const base = new Date(baseVal);

      if (birth >= base) { alert('생년월일이 기준일보다 이전이어야 합니다.'); return; }

      // 만 나이
      let manAge = base.getFullYear() - birth.getFullYear();
      const monthDiff = base.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && base.getDate() < birth.getDate())) manAge--;

      // 한국 나이
      const koreanAge = base.getFullYear() - birth.getFullYear() + 1;

      // 연 나이
      const yearAge = base.getFullYear() - birth.getFullYear();

      // 살아온 날수
      const diffMs = base - birth;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const diffMonths = manAge * 12 + (base.getMonth() - birth.getMonth()) + (base.getDate() >= birth.getDate() ? 0 : -1);

      // 다음 생일
      let nextBirthday = new Date(base.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday <= base) nextBirthday.setFullYear(base.getFullYear() + 1);
      const daysToNext = Math.ceil((nextBirthday - base) / (1000 * 60 * 60 * 24));

      // 띠, 별자리
      const zodiac = getZodiac(birth.getFullYear());
      const star = getStar(birth.getMonth() + 1, birth.getDate());

      // 표시
      document.getElementById('manAge').textContent = manAge;
      document.getElementById('koreanAge').textContent = koreanAge;
      document.getElementById('yearAge').textContent = yearAge;

      const birthFormatted = `${birth.getFullYear()}년 ${birth.getMonth()+1}월 ${birth.getDate()}일`;
      document.getElementById('d-birth').textContent = birthFormatted;
      document.getElementById('d-days').textContent = `${fmt(diffDays)}일`;
      document.getElementById('d-months').textContent = `${fmt(diffMonths)}개월`;
      document.getElementById('d-zodiac').textContent = zodiac + '띠';
      document.getElementById('d-star').textContent = star;

      if (daysToNext === 0) {
        document.getElementById('b-days').textContent = '🎂 오늘이 생일!';
        document.getElementById('b-date').textContent = '생일 축하드립니다!';
      } else {
        document.getElementById('b-days').textContent = `${fmt(daysToNext)}일`;
        const nbFormatted = `${nextBirthday.getFullYear()}년 ${nextBirthday.getMonth()+1}월 ${nextBirthday.getDate()}일`;
        document.getElementById('b-date').textContent = nbFormatted;
      }

      const resultCard = document.getElementById('resultCard');
      resultCard.classList.add('visible');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // 자동 계산
    window.onload = () => calculate();
  </script>
<script src="/share.js"></script>
</body>
</html>
