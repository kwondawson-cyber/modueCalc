<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>부동산 중개수수료 계산기 | 모두의계산기</title>
  <meta name="description" content="부동산 중개수수료 계산기. 매매, 전세, 월세 중개보수를 2024년 기준으로 계산하세요." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
      --accent: #00d4aa; --accent2: #0095ff; --text: #e6edf3; --text-muted: #8b949e;
      --danger: #ff6b6b; --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }
    .container { max-width: 640px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
    .nav { text-align: center; margin-bottom: 32px; }
    .nav a { font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 3px; color: var(--accent); text-decoration: none; text-transform: uppercase; }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: clamp(26px, 5vw, 40px); font-weight: 900; line-height: 1.1; margin-bottom: 10px; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .header p { color: var(--text-muted); font-size: 14px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }
    .tab-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 24px; }
    .tab-btn { padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-size: 14px; font-weight: 600; font-family: 'Noto Sans KR', sans-serif; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { background: rgba(0,212,170,0.1); border-color: rgba(0,212,170,0.4); color: var(--accent); }
    .input-group { margin-bottom: 18px; }
    .input-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 7px; }
    .input-wrapper { position: relative; }
    .input-wrapper input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 13px 60px 13px 16px; font-size: 20px; font-weight: 700; font-family: 'Montserrat', sans-serif; color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-wrapper input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,170,0.1); }
    .input-unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--text-muted); font-weight: 500; pointer-events: none; }
    .hint { font-size: 11px; color: var(--text-muted); margin-top: 5px; }
    .calc-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 12px; font-size: 16px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; color: #000; cursor: pointer; margin-top: 4px; transition: transform 0.15s, box-shadow 0.15s; }
    .calc-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,170,0.3); }
    /* 결과 */
    .result-card { display: none; animation: fadeUp 0.4s ease; }
    .result-card.visible { display: block; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .result-highlight { background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,149,255,0.05)); border: 1px solid rgba(0,212,170,0.3); border-radius: var(--radius); padding: 24px 28px; text-align: center; margin-bottom: 16px; }
    .r-label { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .r-amount { font-family: 'Montserrat', sans-serif; font-size: clamp(36px, 8vw, 52px); font-weight: 900; color: #fff; }
    .r-amount span { font-size: 18px; color: var(--text-muted); }
    .r-sub { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
    .detail-item { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
    .detail-item:last-child { border-bottom: none; }
    .detail-item .d-label { color: var(--text-muted); }
    .detail-item .d-value { font-weight: 700; }
    .detail-item .d-value.accent { color: var(--accent); }
    /* 요율표 */
    .rate-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
    .rate-table th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
    .rate-table td { padding: 10px 10px; border-bottom: 1px solid rgba(48,54,61,0.5); }
    .rate-table tr:last-child td { border-bottom: none; }
    .rate-table tr.current td { background: rgba(0,212,170,0.07); font-weight: 700; color: var(--accent); }
    .notice { margin-top: 16px; padding: 13px 16px; background: rgba(255,165,0,0.05); border: 1px solid rgba(255,165,0,0.15); border-radius: 10px; font-size: 12px; color: var(--text-muted); line-height: 1.7; }
    @media (max-width: 480px) { .card { padding: 20px 16px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">← 모두의계산기</a></div>
    <div class="header">
      <h1>부동산 중개수수료<br>계산기</h1>
      <p>매매 · 전세 · 월세 중개보수 계산</p>
    </div>

    <div class="card">
      <div class="card-title">거래 유형 선택</div>
      <div class="tab-group">
        <button class="tab-btn active" onclick="setType('buy')" id="tab-buy">🏠 매매</button>
        <button class="tab-btn" onclick="setType('jeonse')" id="tab-jeonse">🔑 전세</button>
        <button class="tab-btn" onclick="setType('rent')" id="tab-rent">📋 월세</button>
      </div>

      <div id="inputs-buy">
        <div class="input-group">
          <label>매매가</label>
          <div class="input-wrapper">
            <input type="number" id="buyPrice" value="500000000" />
            <span class="input-unit">원</span>
          </div>
          <div class="hint" id="buyHint"></div>
        </div>
      </div>

      <div id="inputs-jeonse" style="display:none">
        <div class="input-group">
          <label>전세 보증금</label>
          <div class="input-wrapper">
            <input type="number" id="jeonsePrice" value="300000000" />
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div id="inputs-rent" style="display:none">
        <div class="input-group">
          <label>보증금</label>
          <div class="input-wrapper">
            <input type="number" id="rentDeposit" value="10000000" />
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label>월 임대료</label>
          <div class="input-wrapper">
            <input type="number" id="rentMonthly" value="800000" />
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">🏡 수수료 계산하기</button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-highlight">
        <div class="r-label">중개보수 (최대)</div>
        <div class="r-amount" id="r-fee">-<span>원</span></div>
        <div class="r-sub" id="r-sub">-</div>
      </div>

      <div class="card">
        <div class="card-title">계산 상세</div>
        <div class="detail-item">
          <span class="d-label">거래금액 (기준금액)</span>
          <span class="d-value" id="d-base">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">적용 요율</span>
          <span class="d-value accent" id="d-rate">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">한도액</span>
          <span class="d-value" id="d-limit">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">VAT 포함 (10%)</span>
          <span class="d-value" id="d-vat">-</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title" id="rateTableTitle">매매 요율표</div>
        <table class="rate-table" id="rateTable"></table>
      </div>

      <div class="notice">
        <strong style="color:orange">⚠️ 안내</strong> 중개보수는 법정 상한 요율 이내에서 협의 가능합니다. 실제 수수료는 공인중개사와 협의하여 결정하세요. VAT는 별도 청구될 수 있습니다.
      </div>
    </div>
  </div>

  <script>
    let tradeType = 'buy';

    // 매매 요율 (2021년 10월 개정)
    const buyRates = [
      { min: 0,         max: 50000000,  rate: 0.006, limit: 250000,   label: '5천만원 미만' },
      { min: 50000000,  max: 200000000, rate: 0.005, limit: 800000,   label: '5천만~2억' },
      { min: 200000000, max: 900000000, rate: 0.004, limit: null,      label: '2억~9억' },
      { min: 900000000, max: 1200000000,rate: 0.005, limit: null,      label: '9억~12억' },
      { min: 1200000000,max: 1500000000,rate: 0.006, limit: null,      label: '12억~15억' },
      { min: 1500000000,max: Infinity,  rate: 0.007, limit: null,      label: '15억 이상' },
    ];
    // 전세/월세 요율
    const jeonseRates = [
      { min: 0,         max: 50000000,  rate: 0.005, limit: 200000,   label: '5천만원 미만' },
      { min: 50000000,  max: 100000000, rate: 0.004, limit: 300000,   label: '5천만~1억' },
      { min: 100000000, max: 300000000, rate: 0.003, limit: null,      label: '1억~3억' },
      { min: 300000000, max: 600000000, rate: 0.004, limit: null,      label: '3억~6억' },
      { min: 600000000, max: Infinity,  rate: 0.008, limit: null,      label: '6억 이상' },
    ];

    function setType(t) {
      tradeType = t;
      ['buy','jeonse','rent'].forEach(x => {
        document.getElementById(`tab-${x}`).classList.toggle('active', x === t);
        document.getElementById(`inputs-${x}`).style.display = x === t ? 'block' : 'none';
      });
    }

    function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

    function calcFee(amount, rates) {
      const row = rates.find(r => amount >= r.min && amount < r.max) || rates[rates.length-1];
      let fee = amount * row.rate;
      if (row.limit) fee = Math.min(fee, row.limit);
      return { fee, rate: row.rate, limit: row.limit, rowLabel: row.label };
    }

    function calculate() {
      let amount = 0;
      let label = '';

      if (tradeType === 'buy') {
        amount = parseFloat(document.getElementById('buyPrice').value) || 0;
        label = '매매가';
      } else if (tradeType === 'jeonse') {
        amount = parseFloat(document.getElementById('jeonsePrice').value) || 0;
        label = '전세 보증금';
      } else {
        const deposit = parseFloat(document.getElementById('rentDeposit').value) || 0;
        const monthly = parseFloat(document.getElementById('rentMonthly').value) || 0;
        // 환산보증금 = 보증금 + 월세 × 100
        amount = deposit + monthly * 100;
        label = `환산보증금 (${fmt(deposit)} + ${fmt(monthly)}×100)`;
      }

      const rates = tradeType === 'buy' ? buyRates : jeonseRates;
      const { fee, rate, limit } = calcFee(amount, rates);
      const vat = fee * 1.1;

      document.getElementById('r-fee').innerHTML = `${fmt(fee)}<span>원</span>`;
      document.getElementById('r-sub').textContent = `VAT 포함 ${fmt(vat)}원`;
      document.getElementById('d-base').textContent = `${fmt(amount)}원 (${label})`;
      document.getElementById('d-rate').textContent = `${(rate * 100).toFixed(1)}% (상한)`;
      document.getElementById('d-limit').textContent = limit ? `${fmt(limit)}원` : '한도 없음';
      document.getElementById('d-vat').textContent = `${fmt(vat)}원`;

      // 요율표
      const title = tradeType === 'buy' ? '매매 요율표' : '전세/월세 요율표';
      document.getElementById('rateTableTitle').textContent = title;
      const currentRow = rates.find(r => amount >= r.min && amount < r.max) || rates[rates.length-1];
      document.getElementById('rateTable').innerHTML = `
        <thead><tr><th>거래금액</th><th>상한 요율</th><th>한도액</th></tr></thead>
        <tbody>
          ${rates.map(r => `
            <tr class="${r === currentRow ? 'current' : ''}">
              <td>${r.label}</td>
              <td>${(r.rate * 100).toFixed(1)}%</td>
              <td>${r.limit ? fmt(r.limit)+'원' : '-'}</td>
            </tr>`).join('')}
        </tbody>`;

      const rc = document.getElementById('resultCard');
      rc.classList.add('visible');
      rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    window.onload = () => calculate();
  </script>
<script src="/share.js"></script>
</body>
</html>
