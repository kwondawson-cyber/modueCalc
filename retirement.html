<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>퇴직금 계산기 | 모두의계산기</title>
  <meta name="description" content="퇴직금 계산기. 재직기간과 평균임금으로 퇴직금을 정확하게 계산하세요. 2025년 근로기준법 기준." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #0095ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --danger: #ff6b6b;
      --warning: #ffa500;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }
    .nav { text-align: center; margin-bottom: 32px; }
    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--text-muted); font-size: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .input-group { margin-bottom: 20px; }
    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .input-wrapper { position: relative; }
    .input-wrapper input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 60px 14px 18px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper input[type="date"] {
      padding: 14px 18px;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
    }
    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    .input-unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      pointer-events: none;
    }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }
    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .calc-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #000;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,170,0.3);
    }
    /* 결과 */
    .result-card { display: none; animation: fadeUp 0.4s ease; }
    .result-card.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-highlight {
      background: linear-gradient(135deg, rgba(0,212,170,0.1), rgba(0,149,255,0.05));
      border: 1px solid rgba(0,212,170,0.3);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 20px;
      text-align: center;
    }
    .result-label {
      font-size: 13px;
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .result-amount {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 900;
      color: #fff;
      letter-spacing: -1px;
    }
    .result-amount span { font-size: 20px; color: var(--text-muted); font-weight: 500; }
    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }
    .detail-item:last-child { border-bottom: none; }
    .detail-item .d-label { color: var(--text-muted); }
    .detail-item .d-value { font-weight: 700; }
    .detail-item .d-value.accent { color: var(--accent); }
    .notice {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(255,165,0,0.05);
      border: 1px solid rgba(255,165,0,0.15);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
    }
    @media (max-width: 500px) {
      .input-row { grid-template-columns: 1fr; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">← 모두의계산기</a></div>

    <div class="header">
      <h1>퇴직금<br>계산기</h1>
      <p>2025년 근로기준법 기준 · 퇴직급여 보장법</p>
    </div>

    <div class="card">
      <div class="card-title">재직 기간</div>
      <div class="input-row">
        <div class="input-group">
          <label>입사일</label>
          <div class="input-wrapper">
            <input type="date" id="startDate" />
          </div>
        </div>
        <div class="input-group">
          <label>퇴사일</label>
          <div class="input-wrapper">
            <input type="date" id="endDate" />
          </div>
        </div>
      </div>

      <hr class="divider" />

      <div class="card-title">최근 3개월 급여</div>
      <div class="section-label">퇴직 전 3개월간 받은 금액을 입력하세요</div>

      <div class="input-group">
        <label>월 기본급 (세전)</label>
        <div class="input-wrapper">
          <input type="number" id="baseSalary" placeholder="0" />
          <span class="input-unit">원</span>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label>월 고정 수당 합계</label>
          <div class="input-wrapper">
            <input type="number" id="allowance" placeholder="0" />
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="input-group">
          <label>연간 상여금 합계</label>
          <div class="input-wrapper">
            <input type="number" id="bonus" placeholder="0" />
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>연간 연차수당 합계</label>
        <div class="input-wrapper">
          <input type="number" id="vacation" placeholder="0" />
          <span class="input-unit">원</span>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()">💰 퇴직금 계산하기</button>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-highlight">
        <div class="result-label">예상 퇴직금</div>
        <div class="result-amount" id="retirementPay">—<span>원</span></div>
      </div>

      <div class="card">
        <div class="card-title">계산 상세</div>
        <div class="detail-item">
          <span class="d-label">재직 기간</span>
          <span class="d-value accent" id="d-period">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">1일 평균임금</span>
          <span class="d-value" id="d-daily">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">30일분 평균임금</span>
          <span class="d-value" id="d-monthly">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">근속연수</span>
          <span class="d-value" id="d-years">-</span>
        </div>
        <div class="detail-item">
          <span class="d-label">계산식</span>
          <span class="d-value" id="d-formula">-</span>
        </div>
      </div>

      <div class="notice">
        <strong style="color:orange">⚠️ 안내</strong> 본 계산기는 <strong style="color:var(--text)">근로기준법 제34조</strong> 기준으로 계산됩니다. 1년 미만 근무 시 퇴직금이 발생하지 않으며, 실제 퇴직금은 회사 규정 및 개인 상황에 따라 다를 수 있습니다. 정확한 금액은 고용노동부 또는 노무사에게 문의하세요.
      </div>
    </div>
  </div>

  <script>
    // 기본값 설정
    const today = new Date();
    const threeYearsAgo = new Date(today.getFullYear() - 3, today.getMonth(), today.getDate());
    document.getElementById('endDate').value = today.toISOString().split('T')[0];
    document.getElementById('startDate').value = threeYearsAgo.toISOString().split('T')[0];
    document.getElementById('baseSalary').value = 3000000;

    function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }

    function calculate() {
      const start = new Date(document.getElementById('startDate').value);
      const end = new Date(document.getElementById('endDate').value);
      const baseSalary = parseFloat(document.getElementById('baseSalary').value) || 0;
      const allowance = parseFloat(document.getElementById('allowance').value) || 0;
      const bonus = parseFloat(document.getElementById('bonus').value) || 0;
      const vacation = parseFloat(document.getElementById('vacation').value) || 0;

      if (!document.getElementById('startDate').value || !document.getElementById('endDate').value) {
        alert('날짜를 입력해주세요.'); return;
      }
      if (start >= end) { alert('퇴사일이 입사일보다 이후여야 합니다.'); return; }

      // 재직일수
      const diffMs = end - start;
      const totalDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));

      if (totalDays < 365) {
        alert('1년 미만 근무 시 퇴직금이 발생하지 않습니다.\n(재직일수: ' + totalDays + '일)');
        return;
      }

      // 재직기간 텍스트
      let years = end.getFullYear() - start.getFullYear();
      let months = end.getMonth() - start.getMonth();
      let days = end.getDate() - start.getDate();
      if (days < 0) { months--; days += 30; }
      if (months < 0) { years--; months += 12; }
      const periodText = `${years}년 ${months}개월 ${days}일 (총 ${fmt(totalDays)}일)`;

      // 평균임금 계산 (3개월 기준 = 91일)
      const last3MonthsWage = (baseSalary + allowance) * 3;
      const bonusPortion = bonus * (3 / 12);
      const vacationPortion = vacation * (3 / 12);
      const totalWage3Months = last3MonthsWage + bonusPortion + vacationPortion;
      const dailyWage = totalWage3Months / 91;

      // 퇴직금 = 1일 평균임금 × 30일 × (재직일수 / 365)
      const retirementPay = dailyWage * 30 * (totalDays / 365);

      // 근속연수 (소수점 표시)
      const serviceYears = (totalDays / 365).toFixed(2);

      // 결과 표시
      document.getElementById('retirementPay').innerHTML = `${fmt(retirementPay)}<span>원</span>`;
      document.getElementById('d-period').textContent = periodText;
      document.getElementById('d-daily').textContent = `${fmt(dailyWage)}원`;
      document.getElementById('d-monthly').textContent = `${fmt(dailyWage * 30)}원`;
      document.getElementById('d-years').textContent = `${serviceYears}년`;
      document.getElementById('d-formula').textContent = `${fmt(dailyWage * 30)}원 × ${serviceYears}년`;

      const resultCard = document.getElementById('resultCard');
      resultCard.classList.add('visible');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    window.onload = () => calculate();
  </script>
</body>
</html>
