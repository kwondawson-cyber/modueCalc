<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한글 주소 영문 변환기 | 모두의계산기</title>
  <meta name="description" content="한글 주소를 영문 주소로 변환하세요. 도로명주소 기준 영문 변환 및 우편번호 조회." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-size:16px;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;resize:vertical;min-height:80px;transition:border-color .2s;line-height:1.6}
    .input-group textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-group textarea::placeholder{color:#30363d}
    .example-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
    .chip{padding:7px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-muted);cursor:pointer;transition:all .15s}
    .chip:hover{border-color:rgba(0,212,170,0.4);color:var(--accent)}
    .info-box{background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.15);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--text-muted);margin-bottom:18px;line-height:1.8}
    .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .calc-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .calc-btn.sec{background:var(--surface2);border:1px solid var(--border);color:var(--text-muted)}
    .calc-btn.sec:hover{border-color:var(--accent);color:var(--accent);box-shadow:none;transform:none}
    .result-card{display:none;animation:fadeUp .4s ease}.result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-box{background:var(--surface2);border:1px solid rgba(0,212,170,0.3);border-radius:14px;padding:20px 22px;margin-bottom:14px;position:relative}
    .result-box label{font-size:11px;color:var(--accent);font-weight:700;letter-spacing:1px;display:block;margin-bottom:10px;text-transform:uppercase}
    .result-text{font-size:18px;font-weight:700;color:var(--text);line-height:1.6;font-family:'Montserrat',sans-serif;word-break:break-word}
    .copy-btn{position:absolute;top:16px;right:16px;padding:6px 12px;background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);border-radius:8px;font-size:12px;font-weight:600;color:var(--accent);cursor:pointer;transition:all .15s}
    .copy-btn:hover{background:rgba(0,212,170,0.2)}
    .addr-parts{display:grid;gap:8px;margin-top:14px}
    .addr-part{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:12px}
    .ap-label{color:var(--text-muted);font-size:12px;flex-shrink:0}
    .ap-val{font-weight:600;text-align:right;font-family:'Montserrat',sans-serif;word-break:break-all}
    .ap-val.accent{color:var(--accent)}
    .loading-overlay{display:none;text-align:center;padding:30px;color:var(--text-muted);font-size:14px}
    .loading-overlay.show{display:block}
    .spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .notice{padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7;margin-top:12px}
    .err-box{background:rgba(255,107,107,0.06);border:1px solid rgba(255,107,107,0.2);border-radius:14px;padding:20px 22px;margin-bottom:14px;font-size:14px;color:#ff6b6b;line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}.btn-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← 모두의계산기</a></div>
  <div class="header">
    <h1>한글 주소<br>영문 변환기</h1>
    <p>도로명주소 공식 API 기반 영문 변환</p>
  </div>

  <div class="card">
    <div class="card-title">주소 입력</div>
    <div class="input-group">
      <label>한글 주소 (도로명주소 권장)</label>
      <textarea id="addressInput" placeholder="예) 서울특별시 강남구 테헤란로 421 202호"></textarea>
    </div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">예시 주소:</div>
      <div class="example-chips">
        <div class="chip" onclick="setAddr('서울특별시 강남구 테헤란로 421')">강남 테헤란로</div>
        <div class="chip" onclick="setAddr('서울특별시 종로구 세종대로 175')">종로 세종대로</div>
        <div class="chip" onclick="setAddr('부산광역시 해운대구 해운대해변로 264')">부산 해운대</div>
        <div class="chip" onclick="setAddr('제주특별자치도 제주시 공항로 2')">제주 공항로</div>
        <div class="chip" onclick="setAddr('경기도 성남시 분당구 판교역로 235')">판교역로</div>
      </div>
    </div>
    <div class="info-box">📌 행정안전부 도로명주소 공식 API 기반 · 우편번호 포함<br>📌 상세주소(동·호수)는 변환 후 직접 추가하세요</div>
    <div class="btn-row">
      <button class="calc-btn" onclick="convertAddress()">🌐 영문 변환하기</button>
      <button class="calc-btn sec" onclick="clearAll()">🗑 초기화</button>
    </div>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div><br>변환 중...
  </div>

  <div class="result-card" id="resultCard">
    <div id="resultBody"></div>
    <a href="https://www.juso.go.kr/openIndexPage.do" target="_blank" class="notice" style="display:block;text-decoration:none;cursor:pointer;text-align:center">
      🔍 도로명주소 공식 사이트에서 직접 확인하기 →
    </a>
  </div>
</div>

<script>
  const CONF_KEY = 'devU01TX0FVVEgyMDI2MDMxMTIyMjQwMDExNzcxODg=';
  // CORS 프록시 (공개 프록시 2개 순차 시도)
  const PROXIES = [
    'https://corsproxy.io/?',
    'https://api.allorigins.win/get?url='
  ];

  function setAddr(addr){ document.getElementById('addressInput').value = addr; }
  function clearAll(){
    document.getElementById('addressInput').value = '';
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('loadingOverlay').classList.remove('show');
  }
  function copyText(id){
    const txt = document.getElementById(id).textContent;
    navigator.clipboard.writeText(txt).then(()=>{
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ 복사됨';
      setTimeout(()=>btn.textContent=orig, 1500);
    });
  }

  async function fetchWithProxy(apiUrl, proxyIdx = 0) {
    if (proxyIdx >= PROXIES.length) throw new Error('모든 프록시 실패');
    const proxy = PROXIES[proxyIdx];
    const fullUrl = proxy + encodeURIComponent(apiUrl);
    const res = await fetch(fullUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    // allorigins는 {contents: "..."} 형태
    try {
      const outer = JSON.parse(text);
      if (outer.contents) return JSON.parse(outer.contents);
      return outer;
    } catch(e) {
      return JSON.parse(text);
    }
  }

  async function convertAddress(){
    const input = document.getElementById('addressInput').value.trim();
    if(!input){ alert('주소를 입력해주세요.'); return; }

    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('loadingOverlay').classList.add('show');

    const apiUrl = `https://business.juso.go.kr/addrlink/addrEngApi.do`
      + `?currentPage=1&countPerPage=5`
      + `&keyword=${encodeURIComponent(input)}`
      + `&confmKey=${CONF_KEY}`
      + `&resultType=json`;

    let data = null;
    for (let i = 0; i < PROXIES.length; i++) {
      try {
        data = await fetchWithProxy(apiUrl, i);
        break;
      } catch(e) {
        console.warn('Proxy ' + i + ' failed:', e);
      }
    }

    document.getElementById('loadingOverlay').classList.remove('show');

    const juso = data?.results?.juso;
    if (juso && juso.length > 0) {
      showResult(juso[0]);
    } else {
      showError(input);
    }
  }

  function showResult(item){
    const eng = (item.engAddr || '').trim();
    const zip = item.zipNo || '';
    const roadEng = item.rnEng || '';
    const siNm = item.siNm || '';
    const sggNm = item.sggNm || '';
    const buldMnnm = item.buldMnnm || '';
    const buldSlno = item.buldSlno && item.buldSlno !== '0' ? '-' + item.buldSlno : '';
    const buldNo = buldMnnm ? buldMnnm + buldSlno : '';

    const fullAddr = eng + ', Republic of Korea';
    const postalAddr = zip ? eng + ', ' + zip + ', Republic of Korea' : fullAddr;

    document.getElementById('resultBody').innerHTML = `
      <div class="result-box">
        <label>영문 주소 (Full)</label>
        <button class="copy-btn" onclick="copyText('r-full')">복사</button>
        <div class="result-text" id="r-full">${fullAddr}</div>
      </div>
      <div class="result-box">
        <label>우편번호 포함 (국제 우편용)</label>
        <button class="copy-btn" onclick="copyText('r-postal')">복사</button>
        <div class="result-text" id="r-postal">${postalAddr}</div>
      </div>
      <div class="addr-parts">
        <div class="addr-part"><span class="ap-label">시/도</span><span class="ap-val">${siNm||'-'}</span></div>
        <div class="addr-part"><span class="ap-label">시군구</span><span class="ap-val">${sggNm||'-'}</span></div>
        <div class="addr-part"><span class="ap-label">도로명 (영문)</span><span class="ap-val">${roadEng||'-'}</span></div>
        <div class="addr-part"><span class="ap-label">건물번호</span><span class="ap-val">${buldNo||'-'}</span></div>
        <div class="addr-part"><span class="ap-label">우편번호</span><span class="ap-val accent">${zip||'미확인'}</span></div>
      </div>
    `;

    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('resultCard').scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  function showError(input){
    document.getElementById('resultBody').innerHTML = `
      <div class="err-box">
        ⚠️ 주소를 찾지 못했어요.<br><br>
        <strong>도로명주소로 다시 시도해보세요</strong><br>
        · 지번 주소 → 도로명 주소로 변경<br>
        · 쉼표(,) 제거 후 입력<br>
        · 상세주소(동·호수) 빼고 도로명+번지만 입력<br><br>
        예) <span style="color:var(--accent)">서울특별시 강남구 테헤란로 421</span>
      </div>
    `;
    document.getElementById('resultCard').classList.add('visible');
  }
</script>
<script src="/share.js"></script>
<script src="/calculator.js"></script>
</body>
</html>
