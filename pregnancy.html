<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>임신 주수 계산기 | 모두의계산기</title>
  <meta name="description" content="임신 주수 계산기. 마지막 생리일 또는 출산예정일로 현재 임신 주수와 분만 예정일을 계산하세요." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--pink:#ff8fab;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(28px,6vw,44px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--pink) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--pink);text-transform:uppercase;margin-bottom:20px}
    .tab-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
    .tab-btn{padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:14px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .2s}
    .tab-btn.active{background:rgba(255,143,171,0.1);border-color:rgba(255,143,171,0.4);color:var(--pink)}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-group input[type="date"]{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:16px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;transition:border-color .2s}
    .input-group input[type="date"]:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,143,171,0.1)}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--pink),#ff6b9d);border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#fff;cursor:pointer;margin-top:4px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,143,171,0.4)}
    .result-card{display:none;animation:fadeUp .4s ease}
    .result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-highlight{background:linear-gradient(135deg,rgba(255,143,171,0.1),rgba(255,107,157,0.05));border:1px solid rgba(255,143,171,0.3);border-radius:16px;padding:24px 28px;text-align:center;margin-bottom:16px}
    .r-label{font-size:12px;color:var(--pink);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .r-weeks{font-family:'Montserrat',sans-serif;font-size:64px;font-weight:900;color:#fff;line-height:1}
    .r-weeks span{font-size:22px;color:var(--text-muted)}
    .r-sub{font-size:14px;color:var(--text-muted);margin-top:8px}
    /* 진행바 */
    .progress-bar{margin:20px 0;background:var(--surface2);border-radius:8px;height:10px;overflow:hidden}
    .progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--pink),#ff6b9d);transition:width .5s ease}
    .progress-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .detail-item .d-label{color:var(--text-muted)}
    .detail-item .d-value{font-weight:700}
    .detail-item .d-value.pink{color:var(--pink)}
    /* 트라이메스터 */
    .trimester-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:4px}
    .tri-box{padding:14px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-align:center}
    .tri-box.current{border-color:rgba(255,143,171,0.4);background:rgba(255,143,171,0.08)}
    .tri-box .tri-name{font-size:12px;font-weight:700;margin-bottom:4px}
    .tri-box .tri-weeks{font-size:11px;color:var(--text-muted)}
    .notice{margin-top:16px;padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}.trimester-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← 모두의계산기</a></div>
  <div class="header">
    <h1>임신 주수<br>계산기</h1>
    <p>현재 주수 · 분만예정일 · 트라이메스터</p>
  </div>

  <div class="card">
    <div class="card-title">계산 기준</div>
    <div class="tab-group">
      <button class="tab-btn active" onclick="setMode('lmp')" id="tab-lmp">🩸 마지막 생리일 기준</button>
      <button class="tab-btn" onclick="setMode('due')" id="tab-due">📅 출산예정일 기준</button>
    </div>
    <div id="sec-lmp">
      <div class="input-group">
        <label>마지막 생리 시작일</label>
        <input type="date" id="lmpDate" />
      </div>
    </div>
    <div id="sec-due" style="display:none">
      <div class="input-group">
        <label>출산 예정일</label>
        <input type="date" id="dueDate" />
      </div>
    </div>
    <button class="calc-btn" onclick="calculate()">🤰 주수 계산하기</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-highlight">
      <div class="r-label">현재 임신 주수</div>
      <div class="r-weeks" id="r-weeks">-<span>주</span> <span id="r-days-extra" style="font-size:32px">-일</span></div>
      <div class="r-sub" id="r-sub">-</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-labels"><span>1주</span><span>10주</span><span>20주</span><span>30주</span><span>40주</span></div>
    </div>

    <div class="card">
      <div class="card-title">주요 날짜</div>
      <div class="detail-item"><span class="d-label">마지막 생리일 (LMP)</span><span class="d-value" id="d-lmp">-</span></div>
      <div class="detail-item"><span class="d-label">분만 예정일 (EDC)</span><span class="d-value pink" id="d-due">-</span></div>
      <div class="detail-item"><span class="d-label">출산까지 남은 날</span><span class="d-value" id="d-remain">-</span></div>
      <div class="detail-item"><span class="d-label">임신 진행률</span><span class="d-value" id="d-pct">-</span></div>
    </div>

    <div class="card">
      <div class="card-title">임신 시기</div>
      <div class="trimester-grid">
        <div class="tri-box" id="tri1">
          <div class="tri-name">🌱 초기</div>
          <div class="tri-weeks">1~12주</div>
        </div>
        <div class="tri-box" id="tri2">
          <div class="tri-name">🌸 중기</div>
          <div class="tri-weeks">13~27주</div>
        </div>
        <div class="tri-box" id="tri3">
          <div class="tri-name">🌟 후기</div>
          <div class="tri-weeks">28~40주</div>
        </div>
      </div>
    </div>

    <div class="notice">
      <strong style="color:orange">ℹ️ 안내</strong> 임신 주수는 마지막 생리 첫날부터 계산하는 것이 의학적 기준입니다. 실제 분만 예정일은 초음파 검사 결과와 다를 수 있습니다.
    </div>
  </div>
</div>
<script>
  let calcMode='lmp';
  const today=new Date(); today.setHours(0,0,0,0);
  const pad=n=>String(n).padStart(2,'0');
  document.getElementById('lmpDate').value=`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

  function setMode(m){
    calcMode=m;
    document.getElementById('tab-lmp').classList.toggle('active',m==='lmp');
    document.getElementById('tab-due').classList.toggle('active',m==='due');
    document.getElementById('sec-lmp').style.display=m==='lmp'?'block':'none';
    document.getElementById('sec-due').style.display=m==='due'?'block':'none';
  }

  function fmtDate(d){
    const wd=['일','월','화','수','목','금','토'];
    return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wd[d.getDay()]})`;
  }

  function calculate(){
    let lmp;
    if(calcMode==='lmp'){
      const v=document.getElementById('lmpDate').value;
      if(!v){alert('마지막 생리일을 선택해주세요.');return;}
      lmp=new Date(v); lmp.setHours(0,0,0,0);
    } else {
      const v=document.getElementById('dueDate').value;
      if(!v){alert('출산예정일을 선택해주세요.');return;}
      const due=new Date(v); due.setHours(0,0,0,0);
      lmp=new Date(due.getTime()-280*24*60*60*1000);
    }
    const due=new Date(lmp.getTime()+280*24*60*60*1000);
    const totalDays=Math.floor((today-lmp)/(1000*60*60*24));
    const weeks=Math.floor(totalDays/7);
    const days=totalDays%7;
    const pct=Math.min(100,Math.max(0,(totalDays/280*100)));
    const remain=Math.max(0,Math.floor((due-today)/(1000*60*60*24)));

    document.getElementById('r-weeks').childNodes[0].textContent=weeks;
    document.getElementById('r-days-extra').textContent=`${days}일`;
    document.getElementById('r-sub').textContent=`분만예정일: ${fmtDate(due)}`;
    document.getElementById('progressFill').style.width=`${pct}%`;
    document.getElementById('d-lmp').textContent=fmtDate(lmp);
    document.getElementById('d-due').textContent=fmtDate(due);
    document.getElementById('d-remain').textContent=remain>0?`${remain}일 남음`:'출산 예정일이 지났습니다';
    document.getElementById('d-pct').textContent=`${pct.toFixed(1)}%`;

    ['tri1','tri2','tri3'].forEach(id=>document.getElementById(id).classList.remove('current'));
    if(weeks<=12) document.getElementById('tri1').classList.add('current');
    else if(weeks<=27) document.getElementById('tri2').classList.add('current');
    else document.getElementById('tri3').classList.add('current');

    const rc=document.getElementById('resultCard');
    rc.classList.add('visible');
    rc.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  window.onload=()=>calculate();
</script>
<script src="/share.js"></script>
</body>
</html>
