<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>증여세·상속세 계산기 | 모두의계산기</title>
  <meta name="description" content="증여세·상속세 계산기. 증여재산 공제 후 예상 세액을 2024년 기준으로 계산하세요." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#00d4aa;--accent2:#0095ff;--text:#e6edf3;--text-muted:#8b949e;--danger:#ff6b6b;--radius:16px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .container{max-width:640px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
    .nav{text-align:center;margin-bottom:32px}.nav a{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--accent);text-decoration:none;text-transform:uppercase}
    .header{text-align:center;margin-bottom:40px}
    .header h1{font-size:clamp(26px,5vw,40px);font-weight:900;line-height:1.1;margin-bottom:10px;background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .header p{color:var(--text-muted);font-size:14px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px}
    .card-title{font-size:12px;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:20px}
    .tab-group{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
    .tab-btn{padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;font-family:'Noto Sans KR',sans-serif;color:var(--text-muted);cursor:pointer;transition:all .2s}
    .tab-btn.active{background:rgba(0,212,170,0.1);border-color:rgba(0,212,170,0.4);color:var(--accent)}
    .input-group{margin-bottom:18px}
    .input-group label{display:block;font-size:13px;font-weight:500;color:var(--text-muted);margin-bottom:7px}
    .input-wrapper{position:relative}
    .input-wrapper input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 60px 13px 16px;font-size:20px;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s}
    .input-wrapper input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,170,0.1)}
    .input-unit{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-muted);font-weight:500;pointer-events:none}
    .select-wrapper select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;font-size:15px;font-weight:500;font-family:'Noto Sans KR',sans-serif;color:var(--text);outline:none;cursor:pointer}
    .deduct-box{background:rgba(0,149,255,0.06);border:1px solid rgba(0,149,255,0.15);border-radius:10px;padding:14px 16px;font-size:13px;color:var(--text-muted);margin-bottom:18px;line-height:1.8}
    .deduct-box strong{color:var(--accent)}
    .calc-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;font-size:16px;font-weight:700;font-family:'Noto Sans KR',sans-serif;color:#000;cursor:pointer;margin-top:4px;transition:transform .15s,box-shadow .15s}
    .calc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,212,170,0.3)}
    .result-card{display:none;animation:fadeUp .4s ease}
    .result-card.visible{display:block}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .result-highlight{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(0,149,255,0.05));border:1px solid rgba(0,212,170,0.3);border-radius:var(--radius);padding:24px 28px;text-align:center;margin-bottom:16px}
    .r-label{font-size:12px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
    .r-amount{font-family:'Montserrat',sans-serif;font-size:clamp(34px,7vw,50px);font-weight:900;color:#fff}
    .r-amount span{font-size:18px;color:var(--text-muted)}
    .detail-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px}
    .detail-item:last-child{border-bottom:none}
    .detail-item .d-label{color:var(--text-muted)}
    .detail-item .d-value{font-weight:700}
    .detail-item .d-value.accent{color:var(--accent)}
    .detail-item .d-value.danger{color:var(--danger)}
    .rate-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
    .rate-table th{text-align:left;padding:8px 10px;color:var(--text-muted);font-size:11px;font-weight:600;border-bottom:1px solid var(--border)}
    .rate-table td{padding:10px 10px;border-bottom:1px solid rgba(48,54,61,0.5)}
    .rate-table tr:last-child td{border-bottom:none}
    .rate-table tr.current td{background:rgba(0,212,170,0.07);color:var(--accent);font-weight:700}
    .notice{margin-top:16px;padding:13px 16px;background:rgba(255,165,0,0.05);border:1px solid rgba(255,165,0,0.15);border-radius:10px;font-size:12px;color:var(--text-muted);line-height:1.7}
    @media(max-width:480px){.card{padding:20px 16px}}
  </style>
</head>
<body>
<div class="container">
  <div class="nav"><a href="/">← 모두의계산기</a></div>
  <div class="header">
    <h1>증여세 · 상속세<br>계산기</h1>
    <p>공제 적용 후 예상 세액 계산</p>
  </div>

  <div class="card">
    <div class="card-title">유형 선택</div>
    <div class="tab-group">
      <button class="tab-btn active" onclick="setMode('gift')" id="tab-gift">🎁 증여세</button>
      <button class="tab-btn" onclick="setMode('inherit')" id="tab-inherit">🏛️ 상속세</button>
    </div>

    <div class="input-group">
      <label id="amountLabel">증여재산 총액</label>
      <div class="input-wrapper">
        <input type="number" id="amount" value="500000000" />
        <span class="input-unit">원</span>
      </div>
    </div>

    <div id="giftSection">
      <div class="input-group">
        <label>증여자 관계</label>
        <div class="select-wrapper">
          <select id="relation" onchange="updateDeduct()">
            <option value="600000000">직계존속 (부모→자녀) — 공제 5천만원</option>
            <option value="50000000">직계존속 (조부모→손자녀) — 공제 5천만원</option>
            <option value="60000000">배우자 — 공제 6억원</option>
            <option value="10000000">기타 친족 — 공제 1천만원</option>
            <option value="0">타인 — 공제 없음</option>
          </select>
        </div>
      </div>
      <div class="deduct-box" id="deductInfo">📌 직계존속(부모→자녀): <strong>5천만원</strong> 공제 (미성년자 2천만원)</div>
    </div>

    <div id="inheritSection" style="display:none">
      <div class="input-group">
        <label>상속인 구성</label>
        <div class="select-wrapper">
          <select id="inheritType">
            <option value="spouse_child">배우자 + 자녀 있음</option>
            <option value="spouse_only">배우자만 있음</option>
            <option value="child_only">자녀만 있음 (배우자 없음)</option>
          </select>
        </div>
      </div>
      <div class="deduct-box">📌 기본공제 <strong>2억원</strong> + 배우자공제 최소 <strong>5억원</strong> (최대 30억)</div>
    </div>

    <button class="calc-btn" onclick="calculate()">🧮 세액 계산하기</button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-highlight">
      <div class="r-label" id="r-label">예상 증여세</div>
      <div class="r-amount" id="r-tax">-<span>원</span></div>
      <div class="r-sub" id="r-sub">-</div>
    </div>
    <div class="card">
      <div class="card-title">계산 상세</div>
      <div class="detail-item"><span class="d-label" id="d-l1">증여재산 총액</span><span class="d-value" id="d-v1">-</span></div>
      <div class="detail-item"><span class="d-label" id="d-l2">공제액</span><span class="d-value" id="d-v2">-</span></div>
      <div class="detail-item"><span class="d-label">과세표준</span><span class="d-value accent" id="d-taxbase">-</span></div>
      <div class="detail-item"><span class="d-label">적용 세율</span><span class="d-value accent" id="d-rate">-</span></div>
      <div class="detail-item"><span class="d-label" style="font-weight:700">납부세액</span><span class="d-value danger" id="d-tax">-</span></div>
    </div>
    <div class="card">
      <div class="card-title">세율표 (증여세·상속세 동일)</div>
      <table class="rate-table">
        <thead><tr><th>과세표준</th><th>세율</th><th>누진공제</th></tr></thead>
        <tbody id="rateBody"></tbody>
      </table>
    </div>
    <div class="notice">
      <strong style="color:orange">⚠️ 안내</strong> 신고세액공제(3%), 채무공제, 10년 내 사전증여 합산 등은 반영되지 않습니다. 고액 자산은 반드시 세무사와 상담하세요.
    </div>
  </div>
</div>
<script>
  let mode='gift';
  const brackets=[
    {limit:100000000,rate:0.10,deduct:0,label:'1억 이하'},
    {limit:500000000,rate:0.20,deduct:10000000,label:'1억~5억'},
    {limit:1000000000,rate:0.30,deduct:60000000,label:'5억~10억'},
    {limit:3000000000,rate:0.40,deduct:160000000,label:'10억~30억'},
    {limit:Infinity,rate:0.50,deduct:460000000,label:'30억 초과'},
  ];

  function setMode(m){
    mode=m;
    document.getElementById('tab-gift').classList.toggle('active',m==='gift');
    document.getElementById('tab-inherit').classList.toggle('active',m==='inherit');
    document.getElementById('giftSection').style.display=m==='gift'?'block':'none';
    document.getElementById('inheritSection').style.display=m==='inherit'?'block':'none';
    document.getElementById('amountLabel').textContent=m==='gift'?'증여재산 총액':'상속재산 총액';
  }

  function updateDeduct(){
    const sel=document.getElementById('relation');
    const opt=sel.options[sel.selectedIndex].text;
    const map={
      '직계존속 (부모→자녀)':'5천만원 공제 (미성년자 2천만원)',
      '직계존속 (조부모→손자녀)':'5천만원 공제',
      '배우자':'6억원 공제',
      '기타 친족':'1천만원 공제',
      '타인':'공제 없음',
    };
    const key=Object.keys(map).find(k=>opt.includes(k));
    document.getElementById('deductInfo').innerHTML=`📌 ${key}: <strong>${map[key]}</strong>`;
  }

  function calcTax(base){
    if(base<=0)return 0;
    const b=brackets.find(r=>base<=r.limit)||brackets[brackets.length-1];
    return base*b.rate-b.deduct;
  }

  function calculate(){
    const amount=parseFloat(document.getElementById('amount').value)||0;
    let deduct=0,taxBase=0,tax=0,rateLabel='';

    if(mode==='gift'){
      deduct=parseInt(document.getElementById('relation').value);
      // 배우자는 6억
      const relSel=document.getElementById('relation');
      if(relSel.selectedIndex===2) deduct=600000000;
      else deduct=50000000;
      if(relSel.selectedIndex===2) deduct=600000000;
      else if(relSel.selectedIndex===3) deduct=10000000;
      else if(relSel.selectedIndex===4) deduct=0;
      else deduct=50000000;
      taxBase=Math.max(0,amount-deduct);
    } else {
      const itype=document.getElementById('inheritType').value;
      let baseDeduct=200000000;
      let spouseDeduct=itype.includes('spouse')?500000000:0;
      deduct=baseDeduct+spouseDeduct;
      taxBase=Math.max(0,amount-deduct);
    }

    tax=calcTax(taxBase);
    const b=brackets.find(r=>taxBase<=r.limit)||brackets[brackets.length-1];
    rateLabel=`${(b.rate*100).toFixed(0)}% (누진)`;

    document.getElementById('r-label').textContent=mode==='gift'?'예상 증여세':'예상 상속세';
    document.getElementById('r-tax').innerHTML=`${Math.round(tax).toLocaleString()}<span>원</span>`;
    document.getElementById('r-sub').textContent=taxBase<=0?'공제액 이하 → 세금 없음':`과세표준 ${Math.round(taxBase).toLocaleString()}원`;
    document.getElementById('d-l1').textContent=mode==='gift'?'증여재산 총액':'상속재산 총액';
    document.getElementById('d-v1').textContent=`${Math.round(amount).toLocaleString()}원`;
    document.getElementById('d-l2').textContent=mode==='gift'?'증여재산 공제':'기본+배우자 공제';
    document.getElementById('d-v2').textContent=`-${Math.round(deduct).toLocaleString()}원`;
    document.getElementById('d-taxbase').textContent=`${Math.round(taxBase).toLocaleString()}원`;
    document.getElementById('d-rate').textContent=taxBase<=0?'-':rateLabel;
    document.getElementById('d-tax').textContent=`${Math.round(tax).toLocaleString()}원`;

    const currentB=brackets.find(r=>taxBase<=r.limit)||brackets[brackets.length-1];
    document.getElementById('rateBody').innerHTML=brackets.map(br=>`
      <tr class="${br===currentB&&taxBase>0?'current':''}">
        <td>${br.label}</td><td>${(br.rate*100).toFixed(0)}%</td><td>${(br.deduct/10000).toLocaleString()}만원</td>
      </tr>`).join('');

    const rc=document.getElementById('resultCard');
    rc.classList.add('visible');
    rc.scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  window.onload=()=>calculate();
</script>
</body>
</html>
