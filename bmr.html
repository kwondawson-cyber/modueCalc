<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기초대사량 계산기 | 모두의계산기</title>
  <meta name="description" content="기초대사량 계산기. 나이, 성별, 키, 몸무게, 활동량으로 하루 권장 칼로리와 기초대사량을 계산하세요." />
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6079812618767597" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #0095ff;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 20px 80px;
      position: relative;
      z-index: 1;
    }
    .nav { text-align: center; margin-bottom: 32px; }
    .nav a {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
      text-transform: uppercase;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--text-muted); font-size: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .input-group { margin-bottom: 20px; }
    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .input-wrapper { position: relative; }
    .input-wrapper input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 50px 14px 18px;
      font-size: 22px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    .input-unit {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      pointer-events: none;
    }
    input[type="range"] {
      width: 100%;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 4px;
      background: var(--surface2);
      outline: none;
      cursor: pointer;
      margin-top: 8px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0,212,170,0.5);
    }
    /* 성별 탭 */
    .gender-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .gender-btn {
      padding: 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .gender-btn.active {
      background: rgba(0,212,170,0.1);
      border-color: rgba(0,212,170,0.4);
      color: var(--accent);
    }
    /* 활동량 선택 */
    .activity-group { display: flex; flex-direction: column; gap: 8px; }
    .activity-btn {
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .activity-btn.active {
      background: rgba(0,212,170,0.08);
      border-color: rgba(0,212,170,0.3);
      color: var(--text);
    }
    .activity-btn .a-name { font-size: 14px; font-weight: 600; }
    .activity-btn .a-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .activity-btn .a-factor {
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
      margin-left: 12px;
    }
    .calc-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      color: #000;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .calc-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,212,170,0.3);
    }
    /* 결과 */
    .result-card { display: none; animation: fadeUp 0.4s ease; }
    .result-card.visible { display: block; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    .result-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 16px;
      text-align: center;
    }
    .result-box.main {
      border-color: rgba(0,212,170,0.4);
      background: linear-gradient(135deg, rgba(0,212,170,0.08), rgba(0,149,255,0.04));
    }
    .result-box .r-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.5px; }
    .result-box .r-value {
      font-family: 'Montserrat', sans-serif;
      font-size: 32px;
      font-weight: 900;
    }
    .result-box.main .r-value { color: var(--accent); }
    .result-box .r-unit { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    /* 목적별 칼로리 */
    .goal-list { display: flex; flex-direction: column; gap: 10px; }
    .goal-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .goal-item .g-left { display: flex; align-items: center; gap: 10px; }
    .goal-item .g-emoji { font-size: 20px; }
    .goal-item .g-name { font-size: 14px; font-weight: 600; }
    .goal-item .g-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .goal-item .g-cal {
      font-family: 'Montserrat', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }
    .goal-item .g-unit { font-size: 11px; color: var(--text-muted); }
    .notice {
      margin-top: 20px;
      padding: 14px 18px;
      background: rgba(255,165,0,0.05);
      border: 1px solid rgba(255,165,0,0.15);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.7;
    }
    @media (max-width: 480px) {
      .input-row { grid-template-columns: 1fr; }
      .result-grid { grid-template-columns: 1fr; }
      .card { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav"><a href="/">← 모두의계산기</a></div>

    <div class="header">
      <h1>기초대사량<br>계산기</h1>
      <p>BMR · 하루 권장 칼로리 · 목적별 칼로리</p>
    </div>

    <div class="card">
      <div class="card-title">신체 정보</div>

      <div class="input-group">
        <label>성별</label>
        <div class="gender-group">
          <button class="gender-btn active" onclick="setGender('male')" id="btn-male">👨 남성</button>
          <button class="gender-btn" onclick="setGender('female')" id="btn-female">👩 여성</button>
        </div>
      </div>

      <div class="input-row" style="margin-bottom:20px">
        <div class="input-group" style="margin-bottom:0">
          <label>나이</label>
          <div class="input-wrapper">
            <input type="number" id="age" value="30" min="10" max="100" />
            <span class="input-unit">세</span>
          </div>
        </div>
        <div class="input-group" style="margin-bottom:0">
          <label>키</label>
          <div class="input-wrapper">
            <input type="number" id="height" value="170" min="100" max="250" />
            <span class="input-unit">cm</span>
          </div>
        </div>
      </div>

      <div class="input-group">
        <label>몸무게</label>
        <div class="input-wrapper">
          <input type="number" id="weight" value="65" min="20" max="200" />
          <span class="input-unit">kg</span>
        </div>
        <input type="range" id="weightSlider" min="30" max="150" step="0.5" value="65" />
      </div>
    </div>

    <div class="card">
      <div class="card-title">활동량</div>
      <div class="activity-group">
        <button class="activity-btn" onclick="setActivity(1.2, this)">
          <div><div class="a-name">🛋️ 거의 활동 없음</div><div class="a-desc">주로 앉아서 생활, 운동 거의 안 함</div></div>
          <span class="a-factor">×1.2</span>
        </button>
        <button class="activity-btn active" onclick="setActivity(1.375, this)">
          <div><div class="a-name">🚶 가벼운 활동</div><div class="a-desc">주 1~3회 가벼운 운동</div></div>
          <span class="a-factor">×1.375</span>
        </button>
        <button class="activity-btn" onclick="setActivity(1.55, this)">
          <div><div class="a-name">🏃 보통 활동</div><div class="a-desc">주 3~5회 중간 강도 운동</div></div>
          <span class="a-factor">×1.55</span>
        </button>
        <button class="activity-btn" onclick="setActivity(1.725, this)">
          <div><div class="a-name">💪 활동적</div><div class="a-desc">주 6~7회 고강도 운동</div></div>
          <span class="a-factor">×1.725</span>
        </button>
        <button class="activity-btn" onclick="setActivity(1.9, this)">
          <div><div class="a-name">🏋️ 매우 활동적</div><div class="a-desc">하루 2회 운동 또는 육체노동</div></div>
          <span class="a-factor">×1.9</span>
        </button>
      </div>
    </div>

    <button class="calc-btn" onclick="calculate()">🔥 기초대사량 계산하기</button>

    <div class="result-card" id="resultCard" style="margin-top:20px">
      <div class="card">
        <div class="result-grid">
          <div class="result-box main">
            <div class="r-label">기초대사량 (BMR)</div>
            <div class="r-value" id="r-bmr">-</div>
            <div class="r-unit">kcal/일</div>
          </div>
          <div class="result-box">
            <div class="r-label">하루 권장 칼로리</div>
            <div class="r-value" id="r-tdee">-</div>
            <div class="r-unit">kcal/일</div>
          </div>
        </div>

        <div class="card-title">목적별 하루 칼로리</div>
        <div class="goal-list">
          <div class="goal-item">
            <div class="g-left">
              <span class="g-emoji">⚡</span>
              <div>
                <div class="g-name">체중 감량</div>
                <div class="g-desc">하루 500kcal 적게 섭취</div>
              </div>
            </div>
            <div style="text-align:right">
              <div class="g-cal" id="g-lose">-</div>
              <div class="g-unit">kcal</div>
            </div>
          </div>
          <div class="goal-item">
            <div class="g-left">
              <span class="g-emoji">✅</span>
              <div>
                <div class="g-name">체중 유지</div>
                <div class="g-desc">현재 체중 유지</div>
              </div>
            </div>
            <div style="text-align:right">
              <div class="g-cal" id="g-maintain">-</div>
              <div class="g-unit">kcal</div>
            </div>
          </div>
          <div class="goal-item">
            <div class="g-left">
              <span class="g-emoji">💪</span>
              <div>
                <div class="g-name">근육 증가</div>
                <div class="g-desc">하루 300kcal 더 섭취</div>
              </div>
            </div>
            <div style="text-align:right">
              <div class="g-cal" id="g-gain">-</div>
              <div class="g-unit">kcal</div>
            </div>
          </div>
        </div>
      </div>

      <div class="notice">
        <strong style="color:orange">ℹ️ 안내</strong> Mifflin-St Jeor 공식으로 계산됩니다. 기초대사량은 개인의 근육량, 건강 상태에 따라 다를 수 있으며 본 결과는 참고용입니다.
      </div>
    </div>
  </div>

  <script>
    let gender = 'male';
    let activityFactor = 1.375;

    document.getElementById('weightSlider').addEventListener('input', e => {
      document.getElementById('weight').value = e.target.value;
    });
    document.getElementById('weight').addEventListener('input', e => {
      document.getElementById('weightSlider').value = e.target.value;
    });

    function setGender(g) {
      gender = g;
      document.getElementById('btn-male').classList.toggle('active', g === 'male');
      document.getElementById('btn-female').classList.toggle('active', g === 'female');
    }

    function setActivity(factor, el) {
      activityFactor = factor;
      document.querySelectorAll('.activity-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }

    function calculate() {
      const age = parseFloat(document.getElementById('age').value) || 0;
      const h = parseFloat(document.getElementById('height').value) || 0;
      const w = parseFloat(document.getElementById('weight').value) || 0;
      if (!age || !h || !w) { alert('모든 값을 입력해주세요.'); return; }

      // Mifflin-St Jeor 공식
      let bmr;
      if (gender === 'male') {
        bmr = 10 * w + 6.25 * h - 5 * age + 5;
      } else {
        bmr = 10 * w + 6.25 * h - 5 * age - 161;
      }

      const tdee = bmr * activityFactor;

      document.getElementById('r-bmr').textContent = Math.round(bmr).toLocaleString();
      document.getElementById('r-tdee').textContent = Math.round(tdee).toLocaleString();
      document.getElementById('g-lose').textContent = Math.round(tdee - 500).toLocaleString();
      document.getElementById('g-maintain').textContent = Math.round(tdee).toLocaleString();
      document.getElementById('g-gain').textContent = Math.round(tdee + 300).toLocaleString();

      const resultCard = document.getElementById('resultCard');
      resultCard.classList.add('visible');
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    window.onload = () => calculate();
  </script>
</body>
</html>
